  showPartialTranscription(text) {
    const input = document.getElementById('text-input');
    if (!input) return;
    input.value = text;
    input.style.color = 'var(--text3)';
    this._partialTranscription = true;
    input.dispatchEvent(new Event('input'));
  },

  showFinalTranscription(text) {
    this.onSTTResult(text);
  },

  onSTTResult(text) {
    const input = document.getElementById('text-input');
    if (!input || !text) return;

    this._injectingSTT = true;
    input.value = text;
    input.style.color = 'var(--text)';
    this._partialTranscription = false;
    input.dispatchEvent(new Event('input'));
    this._injectingSTT = false;

    input.focus();

    if (this.conversationMode === 'vocal') {
      this._startVocalCountdown(text);
    }
  },

  _removeVocalCountdownListeners() {
    if (!this._vocalCountdownListeners) return;
    const { input, onKeydown, onInput } = this._vocalCountdownListeners;
    input.removeEventListener('keydown', onKeydown);
    input.removeEventListener('input', onInput);
    this._vocalCountdownListeners = null;
  },

  _cancelCountdown() {
    if (this._vocalCountdownTimer) {
      clearTimeout(this._vocalCountdownTimer);
      this._vocalCountdownTimer = null;
    }
    this._countdownActive = false;
    const input = document.getElementById('text-input');
    if (input) {
      input.style.outline = '';
      input.style.borderColor = '';
    }
    this._removeVocalCountdownListeners();
  },

  _startVocalCountdown(text) {
    if (this._vocalCountdownTimer) {
      clearTimeout(this._vocalCountdownTimer);
      this._vocalCountdownTimer = null;
    }
    this._removeVocalCountdownListeners();

    this._countdownActive = true;
    this._originalTranscription = text;

    const input = document.getElementById('text-input');
    if (!input) return;

    input.style.outline = '2px solid rgba(108,142,255,0.7)';

    const cleanup = () => {
      this._countdownActive = false;
      input.style.outline = '';
      input.removeEventListener('keydown', onKeyDown);
      input.removeEventListener('input', onInput);
      this._vocalCountdownListeners = null;
    };

    const onKeyDown = (e) => {
      if (e.key === 'Escape') {
        clearTimeout(this._vocalCountdownTimer);
        this._vocalCountdownTimer = null;
        cleanup();
        this._injectingSTT = true;
        input.value = '';
        input.dispatchEvent(new Event('input'));
        this._injectingSTT = false;
      } else if (e.key === 'Enter' && !e.shiftKey) {
        clearTimeout(this._vocalCountdownTimer);
        this._vocalCountdownTimer = null;
        cleanup();
      } else {
        clearTimeout(this._vocalCountdownTimer);
        this._vocalCountdownTimer = null;
        cleanup();
      }
    };

    const onInput = () => {
      if (this._injectingSTT) return;
      if (this._countdownActive && input.value !== this._originalTranscription) {
        clearTimeout(this._vocalCountdownTimer);
        this._vocalCountdownTimer = null;
        cleanup();
      }
    };

    input.addEventListener('keydown', onKeyDown);
    input.addEventListener('input', onInput);
    this._vocalCountdownListeners = { input, onKeydown: onKeyDown, onInput };

    this._vocalCountdownTimer = setTimeout(() => {
      cleanup();
      const currentText = input.value.trim();
      if (currentText && currentText === this._originalTranscription.trim()) {
        this.sendText();
      }
      this._vocalCountdownTimer = null;
    }, 1500);
  },

  showChecklistProgress(section, item, total) {
    const chat = document.getElementById('chat-messages');
    let bar = document.getElementById('checklist-progress');
    if (!bar) {
      bar = document.createElement('div');

      bar.style.cssText = 'position:sticky;top:0;margin:8px 16px;padding:10px 16px;border-radius:14px;font-size:13px;z-index:10';

  updateFocusIndicator(active) {
    this._focusActive = !!active;
    const el = document.getElementById('focus-indicator');
    if (el) el.style.display = active ? 'block' : 'none';
  },

  async refreshFocusState() {
    try {
      let raw = this.api('is_focus_active');
      if (raw?.then) raw = await raw;
      const active = raw === true || raw === 'true';
      this.updateFocusIndicator(active);
      const el = document.getElementById('set-focus');
      if (el) el.checked = active;
    } catch (e) { /* ignore */ }

    if (p?.then) await p;
    this.updateFocusIndicator(enabled);
    this.showToast(enabled ? 'Mode focus activé' : 'Mode focus désactivé', 'info');

  async loadConfigFlags() {
    try {
      let raw = this.api('get_config_flags');
      if (raw?.then) raw = await raw;
      const d = JSON.parse(raw || '{}');
      const ww = document.getElementById('set-wake-word');
      const rt = document.getElementById('set-realtime-stt');
      const db = document.getElementById('set-daily-brief');
      const gm = document.getElementById('set-german-mode');
      const fc = document.getElementById('set-focus');
      const di = document.getElementById('set-device-index');
      const wm = document.getElementById('set-whisper-model');
      if (ww) ww.checked = !!d.wake_word_enabled;
      if (rt) rt.checked = !!d.realtime_transcription;
      if (db) db.checked = d.daily_brief_enabled !== false;
      if (gm) gm.checked = !!d.german_mode;
      if (fc) fc.checked = !!d.focus_mode;
      if (di && d.device_index != null) di.value = d.device_index;
      if (wm && d.whisper_model) wm.value = d.whisper_model;
    } catch (e) { console.warn('loadConfigFlags', e); }

      'info'
    );

  updateWeather(text) {
    this.weatherText = text || '';
    this.refreshClockLine();
  },

  async _fetchAvailableModels() {
    const fn = window.pywebview?.api?.get_available_models;
    if (!fn) {
      throw new Error('API pywebview indisponible');
    }
    const raw = await Promise.resolve(fn());
    if (typeof raw === 'string') {
      return JSON.parse(raw || '{}');
    }
    return raw || {};
  },

  setModel(roleOrName, modelName) {
    if (modelName !== undefined) {
      return this._applyModelRole(roleOrName, modelName);
    }
    const el = document.getElementById('model-display');
    if (el) el.textContent = roleOrName ? roleOrName : '';
    this.updateModelPickerLabel(roleOrName || 'auto');
  },

  normModelId(id) {
    return String(id || '').replace(/:latest$/, '');
  },

  async loadModelPicker() {
    const menu = document.getElementById('model-picker-menu');
    if (menu && document.getElementById('model-picker')?.classList.contains('open')) {
      menu.innerHTML = `<div class="model-option-sub" style="padding:10px 12px;color:var(--text3)">Chargement…</div>`;
    }
    try {
      const data = await this._fetchAvailableModels();
      this._modelPickerData = data;
      this.renderModelMenu(data);
      this.updateModelPickerLabel(data.current || 'auto');
      if (document.getElementById('model-picker')?.classList.contains('open')) {
        this.positionModelMenu();
      }
    } catch (e) {
      console.warn('loadModelPicker', e);
      if (menu) {
        menu.innerHTML = `<div class="model-option-sub" style="padding:10px 12px;color:var(--text3)">
          Impossible de charger les modèles — Ollama démarré ?
        </div>`;
      }
    }
  },

  positionModelMenu() {
    const btn = document.getElementById('model-picker-btn');
    const menu = document.getElementById('model-picker-menu');
    const picker = document.getElementById('model-picker');
    if (!btn || !menu || !picker?.classList.contains('open')) return;

    if (menu.parentElement !== document.body) {
      menu._modelPickerHome = picker;
      document.body.appendChild(menu);
    }

    const r = btn.getBoundingClientRect();
    const menuW = Math.max(280, r.width);
    let left = r.left;
    if (left + menuW > window.innerWidth - 12) {
      left = Math.max(12, window.innerWidth - menuW - 12);
    }
    menu.style.top = `${Math.round(r.bottom + 6)}px`;
    menu.style.left = `${Math.round(left)}px`;
    menu.style.minWidth = `${Math.round(menuW)}px`;
  },

  _restoreModelMenuHome() {
    const menu = document.getElementById('model-picker-menu');
    const home = menu?._modelPickerHome || document.getElementById('model-picker');
    if (menu && home && menu.parentElement === document.body) {
      home.appendChild(menu);
    }
  },

  toggleAccordion(id) {
    const body = document.getElementById(`acc-${id}`);
    const chevron = document.getElementById(`chevron-${id}`);
    if (!body) return;

    const isCollapsed = body.classList.contains('collapsed');
    body.classList.toggle('collapsed', !isCollapsed);
    if (chevron) chevron.textContent = isCollapsed ? '▾' : '▸';

    if (id === 'modeles' && isCollapsed) {
      this.loadModelSettings();
    }
  },

  async loadModelSettings() {
    const container = document.getElementById('model-settings');
    if (!container) return;

    container.innerHTML = '<div style="color:var(--text3);font-size:12px">Chargement...</div>';

    let data;
    try {
      data = await this._fetchAvailableModels();
    } catch (e) {
      container.innerHTML = `<div style="color:var(--error);font-size:12px">Erreur: ${this.esc(e.message || e)}</div>`;
      return;
    }

    if (!data.ollama_running) {
      container.innerHTML = `
        <div style="color:var(--error,#f87171);font-size:12px;padding:10px;
                    background:rgba(239,68,68,0.08);border-radius:8px">
          ⚠️ Ollama non disponible<br>
          <span style="opacity:0.7">Lance Ollama puis redémarre ARIA</span>
        </div>`;
      return;
    }

    if (!data.local_models || data.local_models.length === 0) {
      container.innerHTML = `
        <div style="color:var(--text3);font-size:12px;padding:10px">
          Aucun modèle installé.<br>
          <code style="font-size:10px">ollama pull llama3.2:1b</code>
        </div>`;
      return;
    }

    const roles = [
      { key: 'intent', label: '⚡ Classification (1B)', desc: 'Ultra-rapide' },
      { key: 'fast', label: '💬 Réponses rapides', desc: 'Quotidien' },
      { key: 'heavy', label: '🧠 Analyse approfondie', desc: 'Maths, aviation' },
      { key: 'vision', label: '👁️ Vision (images)', desc: 'Photos, docs' },
    ];
    const configured = data.configured || {};

    container.innerHTML = roles.map(r => `
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--text2);font-weight:500">${r.label}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:5px">${r.desc}</div>
        <select
          id="model-select-${r.key}"
          style="width:100%;background:var(--surface,#1a1a24);border:1px solid var(--border,rgba(255,255,255,0.08));
                 border-radius:8px;padding:7px 10px;color:var(--text,#f1f1f3);
                 font-family:inherit;font-size:12px;cursor:pointer;outline:none"
          onchange="aria.setModel('${r.key}', this.value)"
        >
          ${data.local_models.map(m => `
            <option value="${this.esc(m)}" ${this.normModelId(m) === this.normModelId(configured[r.key]) ? 'selected' : ''}>
              ${this.esc(m)}
            </option>
          `).join('')}
        </select>
      </div>
    `).join('');
  },

  async _applyModelRole(role, modelName) {
    try {
      const fn = window.pywebview?.api?.set_model;
      if (!fn) throw new Error('API set_model indisponible');
      const raw = await Promise.resolve(fn(role, modelName));
      const result = JSON.parse(raw || '{}');
      if (result.success) {
        this.showToast(`${role} → ${modelName}`, 'success');
        this.loadModelPicker();
      } else {
        this.showToast('Erreur: ' + (result.error || '?'), 'error');
      }
    } catch (e) {
      this.showToast('Erreur set_model: ' + (e.message || e), 'error');
    }
  },

  updateModelPickerLabel(current) {
    const label = document.getElementById('model-picker-label');
    const btn = document.getElementById('model-picker-btn');
    const sidebarLbl = document.getElementById('sidebar-model-label');
    if (!label) return;
    const cur = current || 'auto';
    if (cur === 'auto') {
      label.textContent = 'Auto';
      if (btn) btn.title = 'Auto — rapide + réflexion si besoin';
      if (sidebarLbl) sidebarLbl.textContent = 'auto';
      return;
    }
    const options = this._modelPickerData?.options || [];
    const match = options.find(o => this.normModelId(o.id) === this.normModelId(cur));
    const short = match?.label || this.normModelId(cur);
    label.textContent = short;
    if (sidebarLbl) sidebarLbl.textContent = short.toLowerCase();
    if (btn) btn.title = match?.subtitle || cur;
  },

  renderModelMenu(data) {
    const menu = document.getElementById('model-picker-menu');
    if (!menu) return;
    const current = data.current || 'auto';
    let options = data.options || [];

    if ((!options.length || (options.length === 1 && options[0].id === 'auto'))
        && data.local_models?.length) {
      options = [
        { id: 'auto', label: 'Auto', subtitle: 'Routage intelligent' },
        ...data.local_models.map(m => ({
          id: m,
          label: this.normModelId(m),
          subtitle: 'Installé localement',
        })),
      ];
    }

    if (!data.ollama_running && !data.local_models?.length) {
      menu.innerHTML = `<div class="model-option-sub" style="padding:10px 12px;color:var(--error,#f87171)">
        ⚠️ Ollama non disponible<br>
        <span style="font-size:11px;opacity:0.8">Lance Ollama puis rouvre ce menu</span>
      </div>`;
      return;
    }

    if (!options.length) {
      menu.innerHTML = `<div class="model-option-sub" style="padding:10px 12px;color:var(--text3)">
        Aucun modèle installé — <code style="font-size:10px">ollama pull llama3.2:1b</code>
      </div>`;
      return;
    }

    menu.innerHTML = options.map(opt => {
      const active = this.normModelId(opt.id) === this.normModelId(current);
      return `<button type="button" class="model-option${active ? ' active' : ''}" onclick="aria.pickModel(${JSON.stringify(opt.id)})">
        <span>${this.esc(opt.label)}</span>
        <span class="model-option-sub">${this.esc(opt.subtitle || opt.id)}</span>
      </button>`;
    }).join('');
  },

  async toggleModelMenu(event) {
    event?.stopPropagation();
    const picker = document.getElementById('model-picker');
    if (!picker) return;
    const willOpen = !picker.classList.contains('open');
    if (willOpen) {
      picker.classList.add('open');
      this.positionModelMenu();
      await this.loadModelPicker();
      this.positionModelMenu();
    } else {
      picker.classList.remove('open');
      this._restoreModelMenuHome();
    }
  },

  closeModelMenu() {
    document.getElementById('model-picker')?.classList.remove('open');
    this._restoreModelMenuHome();
  },

  async pickModel(modelId) {
    try {
      let raw = this.api('switch_model', modelId);
      if (raw?.then) raw = await raw;
      if (raw !== 'ok') {
        this.showToast('Erreur changement de modèle', 'error');
        return;
      }
      if (this._modelPickerData) this._modelPickerData.current = modelId;
      this.updateModelPickerLabel(modelId);
      this.setModel(modelId === 'auto' ? '' : modelId);
      const opt = (this._modelPickerData?.options || []).find(o => o.id === modelId);
      const name = opt?.label || (modelId === 'auto' ? 'Auto' : modelId);
      this.showToast(`Modèle : ${name}`, 'info', 2500);
      this.renderModelMenu(this._modelPickerData || { current: modelId, options: [] });
    } catch (e) {
      this.showToast('Erreur changement de modèle', 'error');
    } finally {
      this.closeModelMenu();
    }
  },

  setInputText(text) {
    const input = document.getElementById('text-input');
    if (!input) return;
    input.value = text;
    input.focus();
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    input.dispatchEvent(new Event('input'));
  },

  stopSpeaking() {
    this.api('stop_speaking');
    this.setStatus('idle');
  },

  toggleMic() {
    if (this._micActive) {
      this._micActive = false;
      this.api('stop_mic');
      document.getElementById('mic-btn')?.classList.remove('mic-listening', 'mic-speaking-detected', 'mic-emphasized');
      document.getElementById('mic-btn')?.classList.add('mic-idle');
      document.getElementById('mic-btn').textContent = '🎤';
      document.getElementById('input-mic-btn')?.classList.remove('mic-listening', 'mic-speaking-detected', 'mic-emphasized');
      document.getElementById('input-mic-btn')?.classList.add('mic-idle');
      this.setStatus('idle');
    } else {
      this._micActive = true;
      this.api('start_mic');
      document.getElementById('mic-btn')?.classList.remove('mic-idle');
      document.getElementById('mic-btn')?.classList.add('mic-listening');
      document.getElementById('mic-btn').textContent = '🎤';
      document.getElementById('input-mic-btn')?.classList.remove('mic-idle');
      document.getElementById('input-mic-btn')?.classList.add('mic-listening');
      this.setStatus('listening');
    }
    if (this.conversationMode === 'vocal') {
      this.micManuallyPaused = !this._micActive;
    }
  },

  startMic() {
    this.api('start_mic');
    this.micManuallyPaused = false;
  },

  showModeSelector() {
    const overlay = document.getElementById('mode-select-overlay');
    if (overlay) overlay.style.display = 'flex';
  },

  hideModeSelector() {
    const overlay = document.getElementById('mode-select-overlay');
    if (overlay) overlay.style.display = 'none';
  },

  addAriaBubble(text, scroll = true, modelName = '') {
    if (modelName) {
      this.hideThinkingBubble();
      const messages = document.getElementById('chat-messages');
      const outer = document.createElement('div');
      outer.className = 'bubble-wrap-outer' + (this.ariaAlign === 'center' ? ' center' : '') + (this.showAvatars ? '' : ' no-avatar');
      outer.innerHTML = `
        <div class="model-badge">via ${this.esc(modelName)}</div>
        <div class="bubble-aria-wrap${this.ariaAlign === 'center' ? ' center' : ''}${this.showAvatars ? '' : ' no-avatar'}">
          <div class="bubble-avatar">${this.logoAvatarHtml()}</div>
          <div class="bubble-body">
            <div class="bubble-content">${this.esc(text)}</div>
            <button type="button" class="copy-btn" onclick="aria.copyBubble(this)">Copier</button>
          </div>
        </div>`;
      messages.appendChild(outer);
      this.updateEmpty();
      if (scroll) this.scrollChat();
      return;
    }
    this.appendToken(text);
    this.finalizeMessage();
  },

  applyConversationModeUI(mode, { skipGreeting = false } = {}) {
    if (!this._isValidConversationMode(mode)) return;
    this.conversationMode = mode;
    this.ttsEnabledForSession = mode === 'vocal';
    const micBtn = document.getElementById('mic-btn');
    const inputMic = document.getElementById('input-mic-btn');
    if (mode === 'vocal') {
      micBtn?.classList.add('mic-emphasized');
      inputMic?.classList.add('mic-emphasized');
      if (!skipGreeting) {
        const greeting = "Mode vocal activé. Je t'écoute.";
        this.addAriaBubble(greeting);
        this.api('speak_text', greeting);
      }
    } else {
      this.micManuallyPaused = false;
      micBtn?.classList.remove('mic-emphasized');
      inputMic?.classList.remove('mic-emphasized');
      document.getElementById('text-input')?.focus();
    }
  },

  async selectConversationMode(mode) {
    let id = this.currentConversationId;
    if (!id) {
      id = this.api('get_current_conversation_id');
      if (id?.then) id = await id;
    }
    if (!id) return;

    this.currentConversationId = id;
    const p = this.api('set_conversation_mode', id, mode);
    if (p?.then) await p;
    this.hideModeSelector();
    this.conversationMode = mode;

    if (mode === 'vocal') {
      this.ttsEnabledForSession = true;
      document.getElementById('mic-btn')?.classList.add('mic-emphasized');
      document.getElementById('input-mic-btn')?.classList.add('mic-emphasized');
      const greeting = "Mode vocal activé. Appuie sur 🎤 pour parler.";
      this.addAriaBubble(greeting);
    } else {
      this.ttsEnabledForSession = false;
      this._micActive = false;
      await this.api('stop_mic');
      document.getElementById('mic-btn')?.classList.remove('mic-listening', 'mic-emphasized');
      document.getElementById('mic-btn')?.classList.add('mic-idle');
      document.getElementById('input-mic-btn')?.classList.remove('mic-listening', 'mic-emphasized');
      document.getElementById('input-mic-btn')?.classList.add('mic-idle');
      document.getElementById('text-input')?.focus();
    }
  },

  async syncConversationModeForConversation(convId) {
    this.currentConversationId = convId;
    let mode = this.api('get_conversation_mode', convId);
    if (mode?.then) mode = await mode;
    if (!this._isValidConversationMode(mode)) {
      this.conversationMode = null;
      this.ttsEnabledForSession = false;
      document.getElementById('mic-btn')?.classList.remove('mic-emphasized');
      document.getElementById('input-mic-btn')?.classList.remove('mic-emphasized');
      this.showModeSelector();
      return;
    }
    this.applyConversationModeUI(mode, { skipGreeting: true });
  },

  async syncConversationModeOnStartup() {
    let id = this.api('get_current_conversation_id');
    if (id?.then) id = await id;
    if (!id) return;
    await this.syncConversationModeForConversation(id);
  },

  onMicExternalToggle(isActive) {
    this._micActive = isActive;
    const micBtn = document.getElementById('mic-btn');
    const inputMic = document.getElementById('input-mic-btn');
    if (isActive) {
      micBtn?.classList.remove('mic-idle');
      micBtn?.classList.add('mic-listening');
      inputMic?.classList.remove('mic-idle');
      inputMic?.classList.add('mic-listening');
      this.setStatus('listening');
    } else {
      micBtn?.classList.remove('mic-listening', 'mic-speaking-detected', 'mic-emphasized');
      micBtn?.classList.add('mic-idle');
      inputMic?.classList.remove('mic-listening', 'mic-speaking-detected', 'mic-emphasized');
      inputMic?.classList.add('mic-idle');
      this.setStatus('idle');
    }
    if (this.conversationMode === 'vocal') {
      this.micManuallyPaused = !isActive;
    }
  },

  onTTSFinished() {
    // Le micro reste inactif après la réponse TTS — l'utilisateur appuie sur 🎤 pour reprendre.
  },

  sendText() {
    this._cancelCountdown();
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = '52px';
    this.addUserBubble(text);
    this.api('send_text', text);
    this.loadConversations();
  },

  askFilePrompt() {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:5000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
      overlay.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:480px;max-width:90vw">
          <div style="font-size:14px;font-weight:500;margin-bottom:6px;color:var(--text)">Que voulez-vous savoir ?</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Entrez votre question pour ces fichiers</div>
          <textarea id="file-prompt-input" placeholder="Ex: Corrige ce devoir, Explique ce graphique, Que montre cette image..."
            style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:inherit;font-size:14px;resize:none;height:80px;outline:none"></textarea>
          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
            <button id="file-prompt-cancel" style="background:transparent;border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit">Annuler</button>
            <button id="file-prompt-send" style="background:var(--accent);border:none;color:white;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500">Envoyer ➤</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const input = overlay.querySelector('#file-prompt-input');
      const sendBtn = overlay.querySelector('#file-prompt-send');
      const cancelBtn = overlay.querySelector('#file-prompt-cancel');

      setTimeout(() => input.focus(), 100);

      const confirm = () => {
        const val = input.value.trim();
        if (!val) { input.style.borderColor = 'var(--error)'; return; }
        overlay.remove();
        resolve(val);
      };

      const cancel = () => { overlay.remove(); resolve(null); };

      sendBtn.onclick = confirm;
      cancelBtn.onclick = cancel;
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); confirm(); }
        if (e.key === 'Escape') cancel();
      });
    });
  },

  async handleFiles(files) {
    const fileArray = Array.from(files);
    if (!fileArray.length) return;

    const inputEl = document.getElementById('text-input');
    let userPrompt = inputEl.value.trim();

    const hasImages = fileArray.some(f => f.type.startsWith('image/'));

    if (!userPrompt && !hasImages) {
      userPrompt = await this.askFilePrompt();
      if (!userPrompt) {
        document.getElementById('file-input').value = '';
        return;
      }
    } else if (!userPrompt && hasImages) {
      userPrompt = 'Analyse ces images et dis-moi ce que tu observes';
    }

    fileArray.forEach(file => {
      const type = file.type.startsWith('image/') ? 'image'
                 : file.type.startsWith('video/') ? 'video' : 'file';
      this.showFileBubble(file, type);
    });

    this.addUserBubble(userPrompt);
    inputEl.value = '';
    inputEl.style.height = '48px';

    const filesData = await Promise.all(fileArray.map(async file => ({
      b64: await this.fileToBase64(file),
      name: file.name,
      type: file.type,
    })));

    if (window.pywebview?.api) {
      window.pywebview.api.send_files_with_prompt(
        JSON.stringify(filesData),
        userPrompt
      ).catch(e => this.showToast('Erreur envoi fichiers', 'error'));
    }

    document.getElementById('file-input').value = '';
  },

  showFileBubble(file, type) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-user';
    if (type === 'image') {
      const url = URL.createObjectURL(file);
      wrap.innerHTML = `
        <img src="${url}" style="max-width:100%;max-height:300px;border-radius:8px;display:block;margin-bottom:8px" alt="">
        <div style="font-size:12px;color:var(--text3)">${this.esc(file.name)}</div>`;
    } else if (type === 'video') {
      const url = URL.createObjectURL(file);
      wrap.innerHTML = `
        <video src="${url}" controls style="max-width:100%;max-height:200px;border-radius:8px;display:block;margin-bottom:8px"></video>
        <div style="font-size:12px;color:var(--text3)">${this.esc(file.name)}</div>`;
    } else {
      wrap.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
          <span style="font-size:24px">${this.fileIcon(file.name)}</span>
          <div>
            <div style="font-size:13px;font-weight:500">${this.esc(file.name)}</div>
            <div style="font-size:11px;color:var(--text3)">${(file.size / 1024).toFixed(1)} KB</div>
          </div>
        </div>`;
    }
    document.getElementById('chat-messages').appendChild(wrap);
    this.scrollChat();
    this.updateEmpty();
  },

  fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = { pdf:'📄', py:'🐍', js:'⚡', html:'🌐', css:'🎨', json:'📋', md:'📝', csv:'📊', txt:'📃', yaml:'⚙️' };
    return icons[ext] || '📁';
  },

  fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  },

  showChat() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === 'chat'));
    this.toggleSettings(false);
  },

  async loadConversations() {
    try {
      let raw = this.api('get_conversations');
      if (raw?.then) raw = await raw;
      const convs = JSON.parse(raw || '[]');
      if (!this.currentConversationId) {
        let id = this.api('get_current_conversation_id');
        if (id?.then) id = await id;
        this.currentConversationId = id;
      }
      this.renderConversationList(convs);
    } catch (e) {
      console.warn('loadConversations', e);
    }
  },

  refreshConversationList() {
    return this.loadConversations();
  },

  renderConversationList(conversations) {
    const list = document.getElementById('conv-list');
    if (!list) return;

    if (!conversations || conversations.length === 0) {
      list.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text3)">Aucune conversation</div>';
      return;
    }

    list.innerHTML = conversations.slice(0, 20).map(conv => {
      const isActive = conv.id === this.currentConversationId;
      const title = this.esc(conv.title || 'Nouvelle conversation');
      const dateRaw = conv.updated_at || conv.date || '';
      const date = dateRaw ? new Date(dateRaw).toLocaleDateString('fr-FR') : '';
      const count = conv.count != null ? ` · ${conv.count} msgs` : '';

      return `
        <div
          class="conversation-item ${isActive ? 'active' : ''}"
          id="conv-item-${this.esc(conv.id)}"
          style="position:relative;display:flex;align-items:center;gap:6px;
                 padding:10px 12px;border-radius:10px;cursor:pointer;
                 margin-bottom:2px;transition:background 0.15s;
                 background:${isActive ? 'rgba(108,142,255,0.12)' : 'transparent'}"
          onmouseenter="this.querySelector('.conv-delete-btn').style.opacity='1'"
          onmouseleave="this.querySelector('.conv-delete-btn').style.opacity='0'"
        >
          <div onclick="aria.openConversation('${this.esc(conv.id)}')"
               style="flex:1;min-width:0;overflow:hidden">
            <div style="font-size:13px;color:var(--text);white-space:nowrap;
                        overflow:hidden;text-overflow:ellipsis">${title}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">${date}${count}</div>
          </div>
          <button
            type="button"
            class="conv-delete-btn"
            data-title="${title}"
            onclick="event.stopPropagation(); aria.deleteConversation('${this.esc(conv.id)}', this.dataset.title)"
            style="opacity:0;flex-shrink:0;background:rgba(239,68,68,0.15);
                   border:none;border-radius:6px;width:24px;height:24px;
                   color:#f87171;cursor:pointer;font-size:12px;
                   display:flex;align-items:center;justify-content:center;
                   transition:opacity 0.15s, background 0.15s;padding:0"
            title="Supprimer cette conversation"
          >✕</button>
        </div>
      `;
    }).join('');
  },

  async deleteConversation(convId, title) {
    const label = title || 'cette conversation';
    if (!confirm(`Supprimer "${label}" ?\n\nCette action est irréversible.`)) return;

    try {
      const fn = window.pywebview?.api?.delete_conversation;
      if (!fn) throw new Error('API indisponible');
      const raw = await Promise.resolve(fn(convId));
      const result = JSON.parse(raw || '{}');

      if (result.success) {
        document.getElementById(`conv-item-${convId}`)?.remove();
        this.showToast('Conversation supprimée', 'success');

        if (convId === this.currentConversationId) {
          const remaining = document.querySelectorAll('.conversation-item');
          if (remaining.length > 0) {
            const firstId = remaining[0].id.replace('conv-item-', '');
            await this.openConversation(firstId);
          } else {
            await this.startNewConversation();
          }
        } else {
          await this.refreshConversationList();
        }
      } else {
        this.showToast('Erreur lors de la suppression', 'error');
      }
    } catch (e) {
      this.showToast('Erreur: ' + (e.message || e), 'error');
    }
  },

  async deleteAllConversations() {
    const count = document.querySelectorAll('.conversation-item').length;
    if (!count) {
      this.showToast('Aucune conversation à supprimer', 'info');
      return;
    }
    if (!confirm(`Supprimer les ${count} conversation(s) ?\n\nCette action est irréversible.`)) return;

    try {
      const fn = window.pywebview?.api?.delete_all_conversations;
      if (!fn) throw new Error('API indisponible');
      const raw = await Promise.resolve(fn());
      const result = JSON.parse(raw || '{}');
      if (result.success) {
        this.showToast(`${result.count} conversation(s) supprimée(s)`, 'success');
        await this.startNewConversation();
        await this.refreshConversationList();
      }
    } catch (e) {
      this.showToast('Erreur: ' + (e.message || e), 'error');
    }
  },

  async openConversation(id) {
    let raw = this.api('load_conversation', id);
    if (raw?.then) raw = await raw;
    const messages = JSON.parse(raw || '[]');
    this.currentConversationId = id;
    document.querySelectorAll('.bubble-user,.bubble-aria-wrap').forEach(e => e.remove());
    this.updateEmpty();
    messages.forEach(m => {
      if (m.role === 'user') this.addUserBubble(m.text);
      else { this.appendToken(m.text); this.finalizeMessage(); }
    });
    await this.syncConversationModeForConversation(id);
    this.showToast('Conversation chargée', 'success');
  },

  async startNewConversation() {
    let convId = this.api('new_conversation');
    if (convId?.then) convId = await convId;
    this.currentConversationId = convId;
    this.conversationMode = null;
    this.ttsEnabledForSession = false;
    this.micManuallyPaused = false;
    document.getElementById('mic-btn')?.classList.remove('mic-emphasized');
    document.getElementById('input-mic-btn')?.classList.remove('mic-emphasized');
    document.querySelectorAll('.bubble-user,.bubble-aria-wrap').forEach(e => e.remove());
    this.updateEmpty();
    await this.loadConversations();
    this.showModeSelector();
  },

  toggleSettings(open) {
    if (open === undefined) open = !this.settingsOpen;
    this.settingsOpen = open;
    document.getElementById('settings-panel').classList.toggle('open', open);
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', open ? false : n.dataset.nav === 'chat'));
    if (open) {
      this.loadMemoryStats();
      this.loadTrainingStats();
      this.loadMobileConnectInfo();
      this.checkNexusStatus();
      this.loadWallpapers();
    }
  },

  loadMobileConnectInfo() {
    try {
      let raw = this.api('get_mobile_connect_info');
      const info = JSON.parse(raw || '{}');
      const status = document.getElementById('mobile-connect-status');
      const qr = document.getElementById('mobile-connect-qr');
      const hint = document.getElementById('mobile-connect-hint');
      if (!status) return;
      if (!info.ip) {
        status.textContent = 'Serveur mobile inactif';
        if (qr) qr.style.display = 'none';
        if (hint) hint.textContent = 'Active mobile_auto_start dans config.yaml ou lance start_mobile.bat';
        return;
      }
      status.textContent = info.running
        ? `🖥 ${info.pc_name || 'PC'} — ${info.ip}:${info.port}`
        : `Serveur arrêté (${info.ip}:${info.port})`;
      if (qr && info.qr_payload) {
        qr.src = `https://quickchart.io/qr?text=${encodeURIComponent(info.qr_payload)}&size=180&margin=1&dark=00D4FF&light=111116`;
        qr.style.display = 'block';
      }
      if (hint) {
        hint.textContent = 'Scanne avec l’app ARIA (même WiFi), puis entre le PIN configuré sur le PC.';
      }
    } catch (e) {
      /* ignore */
    }
  },

  async loadTrainingStats() {
    try {
      let raw = this.api('get_training_stats');
      if (raw?.then) raw = await raw;
      const s = JSON.parse(raw || '{}');
      document.getElementById('train-examples').textContent = s.total_examples ?? '—';
      document.getElementById('train-since-last').textContent = s.new_since_last ?? '—';
      document.getElementById('train-last-date').textContent = s.last_train_date ?? 'Jamais';
      document.getElementById('train-model').textContent = s.active_model ?? 'qwen3:14b';

      const progress = Math.min(100, ((s.new_since_last || 0) / 50) * 100);
      document.getElementById('train-progress-bar').style.width = progress + '%';
      document.getElementById('train-progress-text').textContent = `${s.new_since_last || 0}/50`;

      const switcher = document.getElementById('model-switcher');
      if (switcher) {
        switcher.style.display = s.custom_model_exists ? 'block' : 'none';
      }

      const activeIsCustom = s.active_model === 'aria-custom';
      document.getElementById('train-model').style.color = activeIsCustom ? 'var(--success)' : 'var(--accent)';
    } catch (e) {}
  },

  async switchToCustomModel() {
    try {
      let p = this.api('switch_model', 'aria-custom');
      if (p?.then) await p;
      document.getElementById('train-model').textContent = 'aria-custom';
      document.getElementById('train-model').style.color = 'var(--success)';
      this.setModel('aria-custom');
      this.showToast('🤖 Modèle aria-custom activé !', 'success', 4000);
      this.loadTrainingStats();
    } catch (e) {
      this.showToast('Erreur changement de modèle', 'error');
    }
  },

  async switchToBaseModel() {
    try {
      let p = this.api('switch_model', 'qwen3:14b');
      if (p?.then) await p;
      document.getElementById('train-model').textContent = 'qwen3:14b';
      document.getElementById('train-model').style.color = 'var(--accent)';
      this.setModel('qwen3:14b');
      this.showToast('↩ Modèle de base restauré', 'info');
      this.loadTrainingStats();
    } catch (e) {
      this.showToast('Erreur changement de modèle', 'error');
    }
  },

  async startTraining() {
    const examples = parseInt(document.getElementById('train-examples').textContent, 10);
    if (isNaN(examples) || examples < 10) {
      this.showToast(`Pas assez de données (${examples || 0}/10)`, 'warning');
      return;
    }

    if (!confirm("Lancer l'entraînement ? Cela prendra 2-4h et utilisera votre GPU.")) return;

    document.getElementById('btn-train-start').style.display = 'none';
    document.getElementById('btn-train-stop').style.display = 'block';
    const log = document.getElementById('train-log');
    log.style.display = 'block';
    log.textContent = "🚀 Démarrage de l'entraînement...\n";

    this.api('start_training');

    this.trainingInterval = setInterval(async () => {
      try {
        let raw = this.api('get_training_log');
        if (raw?.then) raw = await raw;
        const data = JSON.parse(raw || '{}');
        if (data.log) {
          log.textContent = data.log;
          log.scrollTop = log.scrollHeight;
        }
        if (data.status === 'done') {
          clearInterval(this.trainingInterval);
          this.trainingInterval = null;
          document.getElementById('btn-train-start').style.display = 'block';
          document.getElementById('btn-train-stop').style.display = 'none';
          this.showToast('✅ Entraînement terminé ! Modèle aria-custom disponible.', 'success', 6000);
          this.loadTrainingStats();
        } else if (data.status === 'error') {
          clearInterval(this.trainingInterval);
          this.trainingInterval = null;
          document.getElementById('btn-train-start').style.display = 'block';
          document.getElementById('btn-train-stop').style.display = 'none';
          this.showToast('❌ Erreur entraînement — voir les logs', 'error', 5000);
        }
      } catch (e) {}
    }, 2000);
  },

  stopTraining() {
    if (this.trainingInterval) clearInterval(this.trainingInterval);
    this.trainingInterval = null;
    this.api('stop_training');
    document.getElementById('btn-train-start').style.display = 'block';
    document.getElementById('btn-train-stop').style.display = 'none';
    this.showToast('Entraînement arrêté', 'warning');
  },

  async loadMemoryStats() {
    try {
      let raw = this.api('get_memory_stats');
      if (raw?.then) raw = await raw;
      const stats = JSON.parse(raw || '{}');
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val ?? '—'; };
      set('mem-sessions', stats.total_sessions ?? 0);
      set('mem-messages', stats.total_messages ?? 0);
      set('mem-top-app', stats.top_app || '—');
      set('mem-top-topic', stats.top_topic || '—');
      set('mem-satisfaction', stats.satisfaction || '—');
      set('mem-corrections', stats.corrections ?? 0);
      set('mem-finetune', stats.fine_tune_examples ?? 0);
      set('mem-convs', stats.conversations_saved ?? 0);
      set('mem-peak', stats.peak_hour != null ? `${stats.peak_hour}h` : '—');
      set('mem-shortcuts', stats.voice_shortcuts ?? 0);
    } catch (e) {}
  },

  async exportFineTune() {
    try {
      let path = this.api('export_fine_tune');
      if (path?.then) path = await path;
      this.showToast('Exporté: ' + (path || 'fine_tune_dataset.jsonl'), 'success');
    } catch (e) {
      this.showToast('Erreur export fine-tuning', 'error');
    }
  },

  confirmQuit() { document.getElementById('quit-modal').classList.add('open'); },

  activatePreset(key, label, evt) {
    const p = this.api('activate_preset', key);
    if (p?.then) p.then(msg => this.showToast(msg, 'success'));
    document.querySelectorAll('.preset-row, .navrow').forEach(r => r.classList.remove('active'));
    evt?.currentTarget?.classList.add('active');
    const pill = document.getElementById('active-preset-pill');
    if (pill) pill.textContent = label || key;
  },

  cycleTheme() {
    const i = this.themes.indexOf(this.theme);
    const next = this.themes[(i + 1) % this.themes.length];
    const sw = document.querySelector(`.theme-swatch[data-theme="${next}"]`);
    this.setTheme(next, sw);
    this.showToast('Thème : ' + next, 'info');
  },

  setTheme(name, el) {
    document.body.className = `theme-${name}` + (this.reducedMotion ? ' reduced-motion' : '');
    this.theme = name;
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
    (el || document.querySelector(`.theme-swatch[data-theme="${name}"]`))?.classList.add('active');
    this.saveSettings();
  },

  applyBubbleStyles() {
    const root = document.documentElement;
    const bg = document.getElementById('set-user-bg')?.value;
    const radius = document.getElementById('set-user-radius')?.value;
    const uFont = document.getElementById('set-user-font')?.value;
    const aFont = document.getElementById('set-aria-font')?.value;
    if (bg) root.style.setProperty('--user-bg', bg);
    if (radius) root.style.setProperty('--user-radius', radius + 'px');
    if (uFont) root.style.setProperty('--user-font', uFont + 'px');
    if (aFont) root.style.setProperty('--aria-font', aFont + 'px');
    this.showTimestamps = document.getElementById('set-timestamps')?.checked ?? true;
    this.showAvatars = document.getElementById('set-avatars')?.checked ?? true;
    this.ariaAlign = document.getElementById('set-aria-align')?.value || 'left';
  },

  collectSettings() {
    const rate = document.getElementById('set-tts-rate')?.value ?? 0;
    return {
      theme: this.theme,
      opacity: (document.getElementById('set-opacity')?.value ?? 100) / 100,
      reduced_motion: document.getElementById('set-reduced-motion')?.checked ?? false,
      liquid_glass: document.getElementById('set-liquid-glass')?.checked ?? true,
      glass_intensity: document.getElementById('set-glass-intensity')?.value ?? 60,
      wallpaper_type: this.wallpaperType || 'mesh-animated',
      wallpaper_path: this.wallpaperPath || '',
      wallpaper_url: this.wallpaperPath || '',
      wallpaper_filename: this.wallpaperFilename || '',
      user_bubble_bg: document.getElementById('set-user-bg')?.value,
      user_bubble_radius: document.getElementById('set-user-radius')?.value,
      user_bubble_font: document.getElementById('set-user-font')?.value,
      aria_bubble_font: document.getElementById('set-aria-font')?.value,
      show_timestamps: document.getElementById('set-timestamps')?.checked,
      show_avatars: document.getElementById('set-avatars')?.checked,
      aria_align: document.getElementById('set-aria-align')?.value,
      tts_voice: document.getElementById('set-voice')?.value,
      tts_rate: (rate >= 0 ? '+' : '') + rate + '%',
      tts_volume: +(document.getElementById('set-tts-vol')?.value ?? 90),
      tts_enabled: document.getElementById('set-tts-enabled')?.checked ?? false,
      sounds_enabled: document.getElementById('set-sounds')?.checked,
      assistant_name: document.getElementById('set-name')?.value?.trim(),
      response_length: document.querySelector('input[name=response-len]:checked')?.value ?? 'normal',
      memory_enabled: document.getElementById('set-memory')?.checked,
      model_fast: document.getElementById('set-model-fast')?.value,
      model_heavy: document.getElementById('set-model-heavy')?.value,
      auto_routing: document.getElementById('set-auto-route')?.checked,
      silence_threshold: document.getElementById('set-silence-th')?.value,
      silence_duration: document.getElementById('set-silence-dur')?.value,
      auto_mic: document.getElementById('set-auto-mic')?.checked,
      always_on_top: document.getElementById('set-always-top')?.checked,
      device_mode: this.currentDevice,
    };
  },

  setSetting(key, value) {
    let p = this.api('set_setting', key, value);
    if (p?.then) p.catch(() => {});
  },

  saveSettings() {
    this.applyBubbleStyles();
    const s = this.collectSettings();
    if (s.assistant_name) {
      document.getElementById('assistant-name').textContent = s.assistant_name;
      document.getElementById('header-title').textContent = this._formatBrandName(s.assistant_name);
    }
    document.body.style.opacity = s.opacity;
    this.reducedMotion = s.reduced_motion;
    document.body.classList.toggle('reduced-motion', this.reducedMotion);
    document.body.classList.toggle('no-glass', !s.liquid_glass);
    this.setGlassIntensity(s.glass_intensity ?? 60);
    this.api('save_settings', JSON.stringify(s));
    this.api('set_voice', s.tts_voice);
    this.api('set_tts_rate', s.tts_rate);
    this.api('set_tts_volume', s.tts_volume);
    this.api('set_tts_enabled', !!s.tts_enabled);
  },

  onTtsToggle(enabled) {
    if (window.pywebview?.api) {
      window.pywebview.api.set_tts_enabled(enabled);
    }
    this.showToast(enabled ? '🔊 Parole activée' : '🔇 Parole désactivée', 'info');
    this.saveSettings();
  },

  loadSettings() {
    const p = this.api('load_settings');
    if (!p?.then) return;
    p.then(raw => {
      try {
        const d = JSON.parse(raw || '{}');
        if (d.theme) this.setTheme(d.theme);
        if (d.opacity != null) {
          document.getElementById('set-opacity').value = Math.round(d.opacity * 100);
          document.body.style.opacity = d.opacity;
        }
        if (d.reduced_motion != null) {
          document.getElementById('set-reduced-motion').checked = d.reduced_motion;
          this.reducedMotion = d.reduced_motion;
          document.body.classList.toggle('reduced-motion', d.reduced_motion);
        }
        if (d.liquid_glass != null) {
          const g = document.getElementById('set-liquid-glass');
          if (g) g.checked = d.liquid_glass;
          document.body.classList.toggle('no-glass', !d.liquid_glass);
        }
        if (d.glass_intensity != null) {
          const gi = document.getElementById('set-glass-intensity');
          if (gi) gi.value = d.glass_intensity;
          this.setGlassIntensity(d.glass_intensity);
        } else {
          this.setGlassIntensity(60);
        }
        if (d.wallpaper_type) {
          if (d.wallpaper_type === 'custom') {
            const url = this._resolveCustomWallpaperUrl(d);
            if (url) {
              this.setWallpaper('custom', url, true);
              this.wallpaperFilename = d.wallpaper_filename
                || url.split('/').pop()?.split('?')[0]
                || '';
            }
          } else {
            this.setWallpaper(d.wallpaper_type, null, true);
          }
        } else {
          this.setWallpaper('mesh', '', true);
        }
        this.loadWallpapers();
        const fields = [
          ['user_bubble_bg','set-user-bg'], ['user_bubble_radius','set-user-radius'],
          ['user_bubble_font','set-user-font'], ['aria_bubble_font','set-aria-font'],
          ['tts_voice','set-voice'], ['tts_volume','set-tts-vol','number'],
          ['assistant_name','set-name'], ['model_fast','set-model-fast'],
          ['model_heavy','set-model-heavy'],
          ['silence_threshold','set-silence-th'], ['silence_duration','set-silence-dur'],
          ['aria_align','set-aria-align'],
        ];
        fields.forEach(([k, id]) => { if (d[k] != null) { const el = document.getElementById(id); if (el) el.value = d[k]; } });
        if (d.tts_rate) { const m = String(d.tts_rate).match(/(-?\d+)/); if (m) document.getElementById('set-tts-rate').value = m[1]; }
        if (d.tts_enabled != null) {
          document.getElementById('set-tts-enabled').checked = d.tts_enabled;
          if (window.pywebview?.api) window.pywebview.api.set_tts_enabled(d.tts_enabled);
        }
        if (d.response_length) {
          const r = document.querySelector(`input[name=response-len][value="${d.response_length}"]`);
          if (r) r.checked = true;
        }
        [['show_timestamps','set-timestamps'],['show_avatars','set-avatars'],['sounds_enabled','set-sounds'],
         ['memory_enabled','set-memory'],['auto_routing','set-auto-route'],['auto_mic','set-auto-mic'],
         ['always_on_top','set-always-top']].forEach(([k,id]) => {
          if (d[k] != null) { const el = document.getElementById(id); if (el) el.checked = d[k]; }
        });
        if (d.assistant_name) {
          document.getElementById('assistant-name').textContent = d.assistant_name;
          document.getElementById('header-title').textContent = this._formatBrandName(d.assistant_name);
        }
        if (d.device_mode) this.setDevice(d.device_mode, true);
        this.applyBubbleStyles();
      } catch (e) {}
    });
  },

  mergePresets(custom) {
    const m = {};
    this.presetKeys.forEach(k => { m[k] = { ...this.defaultPresets[k], ...(custom[k] || {}) }; });
    return m;
  },

  renderPresetSidebar(merged) {
    const list = document.getElementById('presets-list');
    list.innerHTML = '';
    this.presetKeys.forEach(k => {
      const p = merged[k];
      const row = document.createElement('div');
      row.className = 'preset-row navrow';
      row.textContent = `${p.icon} ${p.label}`;
      row.onclick = e => this.activatePreset(k, `${p.icon} ${p.label}`, e);
      list.appendChild(row);
    });
  },

  loadPresets() {
    const p = this.api('get_presets');
    const done = async custom => {
      this.presetsCustom = custom || {};
      const merged = this.mergePresets(this.presetsCustom);
      this.renderPresetSidebar(merged);
      await this.renderPresetEditors(merged);
    };
    if (p?.then) p.then(r => { try { done(JSON.parse(r || '{}')); } catch { done({}); } });
    else done({});
  },

  readPresetForm(key) {
    return {
      label: document.getElementById(`pre-${key}-label`)?.value?.trim(),
      icon: document.getElementById(`pre-${key}-icon`)?.value?.trim(),
      apps_open: this._appLists[`open-${key}`]?.selected || [],
      apps_close: this._appLists[`close-${key}`]?.selected || [],
      volume: parseInt(document.getElementById(`pre-${key}-vol`)?.value, 10),
      brightness: parseInt(document.getElementById(`pre-${key}-bri`)?.value, 10),
    };
  },

  savePreset(key) {
    const data = this.readPresetForm(key);
    this.api('save_settings', JSON.stringify({ presets: { [key]: data } }));
    this.presetsCustom[key] = { ...(this.presetsCustom[key] || {}), ...data };
    const merged = this.mergePresets(this.presetsCustom);
    this.renderPresetSidebar(merged);
    this.showToast(`Preset « ${data.label || key} » enregistré`, 'success');
  },

  csvToList(s) { return String(s || '').split(',').map(x => x.trim()).filter(Boolean); },
  listToCsv(a) { return Array.isArray(a) ? a.join(', ') : ''; },

  async checkNexusStatus() {
    let raw = this.api('check_nexus');
    if (raw?.then) raw = await raw;
    const status = JSON.parse(raw || '{}');
    const apply = (el, modelEl) => {
      if (!el) return;
      if (status.enabled && status.available) {
        el.textContent = '✓ Connecté';
        el.style.color = 'var(--success)';
        if (modelEl) {
          modelEl.textContent = '✓ Nexus actif';
          modelEl.style.color = 'var(--success)';
        }
      } else if (status.enabled) {
        el.textContent = '✗ Inaccessible';
        el.style.color = 'var(--error)';
        if (modelEl) {
          modelEl.textContent = '✗ Nexus inaccessible';
          modelEl.style.color = 'var(--error)';
        }
      } else {
        el.textContent = 'Non activé';
        el.style.color = 'var(--text3)';
        if (modelEl) {
          modelEl.textContent = 'En attente de Nexus';
          modelEl.style.color = 'var(--text3)';
        }
      }
    };
    apply(document.getElementById('nexus-status'), document.getElementById('nexus-model-status'));
  },

  async refreshInstalledApps() {
    try {
      let raw = this.api('refresh_installed_apps');
      if (raw?.then) raw = await raw;
      JSON.parse(raw || '[]');
      this.showToast('Liste des apps mise à jour', 'success');
      const merged = this.mergePresets(this.presetsCustom);
      await this.renderPresetEditors(merged);
    } catch (e) {
      this.showToast('Erreur scan apps', 'error');
    }
  },

  filterAppList(listId, query) {
    const resultsDiv = document.getElementById(`results-${listId}`);
    if (!query.trim()) {
      resultsDiv.innerHTML = '';
      resultsDiv.style.display = 'none';
      return;
    }

    const data = this._appLists[listId];
    const q = query.toLowerCase();
    const matches = data.all
      .filter(app => app.toLowerCase().includes(q) && !data.selected.includes(app))
      .slice(0, 8);

    resultsDiv.style.display = matches.length ? 'block' : 'none';
    resultsDiv.innerHTML = matches.map(app =>
      `<div class="app-result-item" onclick="aria.addAppChip(${JSON.stringify(listId)}, ${JSON.stringify(app)})">${this.esc(app)}</div>`
    ).join('');
  },

  addAppChip(listId, appName) {
    const data = this._appLists[listId];
    if (!data.selected.includes(appName)) data.selected.push(appName);
    this.renderChips(listId);
    const search = document.getElementById(`search-${listId}`);
    search.value = '';
    document.getElementById(`results-${listId}`).innerHTML = '';
    document.getElementById(`results-${listId}`).style.display = 'none';
  },

  removeAppChip(listId, appName) {
    const data = this._appLists[listId];
    data.selected = data.selected.filter(a => a !== appName);
    this.renderChips(listId);
  },

  renderChips(listId) {
    const data = this._appLists[listId];
    const container = document.getElementById(`chips-${listId}`);
    container.innerHTML = data.selected.map(app => `
      <span class="app-chip">
        ${this.esc(app)}
        <span class="chip-remove" onclick="aria.removeAppChip(${JSON.stringify(listId)}, ${JSON.stringify(app)})">✕</span>
      </span>
    `).join('');
  },

  async renderPresetEditors(merged) {
    const box = document.getElementById('settings-presets');
    if (!box) return;

    let appList = [];
    try {
      let raw = this.api('get_installed_apps');
      if (raw?.then) raw = await raw;
      appList = JSON.parse(raw || '[]');
    } catch (e) {}

    box.innerHTML = '';
    this.presetKeys.forEach(key => {
      const p = merged[key];
      const openApps = p.apps_open || [];
      const closeApps = p.apps_close || [];

      const ed = document.createElement('div');
      ed.className = 'preset-editor';
      ed.innerHTML = `
        <div class="preset-editor-title">${this.esc(p.icon)} ${this.esc(p.label)}</div>
        <div class="preset-field"><label>Nom</label><input id="pre-${key}-label" value="${this.esc(p.label)}"></div>
        <div class="preset-field"><label>Icône</label><input id="pre-${key}-icon" value="${this.esc(p.icon)}" maxlength="4"></div>

        <div class="preset-field">
          <label>Apps à ouvrir</label>
          <div id="chips-open-${key}" class="app-chips"></div>
          <input type="text" class="app-search" id="search-open-${key}" placeholder="Rechercher une app installée..."
            oninput="aria.filterAppList('open-${key}', this.value)" autocomplete="off">
          <div id="results-open-${key}" class="app-results"></div>
        </div>

        <div class="preset-field">
          <label>Apps à fermer</label>
          <div id="chips-close-${key}" class="app-chips"></div>
          <input type="text" class="app-search" id="search-close-${key}" placeholder="Rechercher une app installée..."
            oninput="aria.filterAppList('close-${key}', this.value)" autocomplete="off">
          <div id="results-close-${key}" class="app-results"></div>
        </div>

        <div class="setting-row"><label>Volume</label><input type="range" id="pre-${key}-vol" min="0" max="100" value="${p.volume ?? 50}"><span id="pre-${key}-vol-val">${p.volume ?? 50}%</span></div>
        <div class="setting-row"><label>Luminosité</label><input type="range" id="pre-${key}-bri" min="0" max="100" value="${p.brightness ?? 50}"></div>
        <button type="button" class="preset-save" onclick="aria.savePreset('${key}')">Enregistrer</button>`;
      box.appendChild(ed);

      this._appLists = this._appLists || {};
      this._appLists[`open-${key}`] = { all: appList, selected: [...openApps] };
      this._appLists[`close-${key}`] = { all: appList, selected: [...closeApps] };

      this.renderChips(`open-${key}`);
      this.renderChips(`close-${key}`);

      document.getElementById(`pre-${key}-vol`)?.addEventListener('input', function() {
        document.getElementById(`pre-${key}-vol-val`).textContent = this.value + '%';
      });
    });
  },

      <div class="settings-accordion">
        <div class="settings-accordion-header" onclick="aria.toggleAccordion('modeles')">
          🤖 Modèles IA <span id="chevron-modeles">▸</span>
        </div>
        <div class="settings-accordion-body collapsed" id="acc-modeles">
          <div id="model-settings">
            <div style="color:var(--text3);font-size:12px">Chargement...</div>
          </div>
          <button class="settings-btn" onclick="aria.loadModelSettings()" style="margin-top:8px">
            🔄 Rafraîchir
          </button>
          <div class="setting-row" style="margin-top:12px">
            <label>Routage auto</label>
            <input type="checkbox" id="set-auto-route" checked onchange="aria.saveSettings()">
          </div>
          <div class="setting-row">
            <label>Code (Nexus)</label>
            <span id="nexus-model-status" style="font-size:11px;color:var(--text3)">En attente de Nexus</span>
          </div>
        </div>
      </div>

      <div class="settings-accordion">
        <div class="settings-accordion-header" onclick="aria.toggleAccordion('micro')">
          🎤 Micro <span id="chevron-micro">▸</span>
        </div>
        <div class="settings-accordion-body collapsed" id="acc-micro">
          <div class="setting-row">
            <label>Device index</label>
            <input type="number" id="set-device-index" placeholder="auto" min="0" max="200"
              style="width:70px;background:var(--surface);border:1px solid var(--border);
                     border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px"
              onchange="aria.setDeviceIndex(this.value)">
          </div>
          <div class="setting-row">
            <label>Modèle Whisper</label>
            <select id="set-whisper-model" onchange="aria.setWhisperModel(this.value)"
              style="background:var(--surface);border:1px solid var(--border);border-radius:6px;
                     padding:4px 8px;color:var(--text);font-size:12px">
              <option value="tiny">Tiny (rapide)</option>
              <option value="base">Base</option>
              <option value="small">Small (recommandé)</option>
              <option value="medium">Medium (précis)</option>
            </select>
          </div>
          <div class="setting-row"><label>Seuil silence</label><input type="range" id="set-silence-th" min="100" max="2000" value="500" oninput="aria.saveSettings()"></div>
          <div class="setting-row"><label>Durée silence</label><input type="range" id="set-silence-dur" min="0.5" max="3" step="0.1" value="2" oninput="aria.saveSettings()"></div>
          <div class="setting-row"><label>Auto au démarrage</label><input type="checkbox" id="set-auto-mic" onchange="aria.saveSettings()"></div>
        </div>
      </div>

      <div class="settings-accordion">
        <div class="settings-accordion-header" onclick="aria.toggleAccordion('systeme')">
          ⚙️ Système <span id="chevron-systeme">▸</span>
        </div>
        <div class="settings-accordion-body collapsed" id="acc-systeme">
        <div class="setting-row">
          <label>Mode focus</label>
          <input type="checkbox" id="set-focus" onchange="aria.toggleFocusMode(this.checked)">
        </div>
        <div class="setting-row">
          <label>Nexus (local)</label>
          <span id="nexus-status" style="font-size:11px;color:var(--text3)">Non configuré</span>
        </div>
        <button class="settings-btn" onclick="aria.checkNexusStatus()">Vérifier Nexus</button>
        <div class="setting-row"><label>Toujours visible</label><input type="checkbox" id="set-always-top" onchange="aria.saveSettings()"></div>
        <div class="setting-row">
          <label>Quitter Ollama à la fermeture</label>
          <input type="checkbox" id="set-kill-ollama" checked onchange="aria.setSetting('kill_ollama_on_exit', this.checked)">
        </div>
        <button class="settings-btn" onclick="aria.api('open_file','config.yaml')">Ouvrir config.yaml</button>
        <button class="settings-btn" onclick="aria.api('open_file','assistant-vocal.log')">Voir les logs</button>
        <button class="settings-btn" onclick="aria.confirmQuit()">Quitter ARIA</button>
        <div class="setting-row" style="margin-top:8px"><span style="font-size:11px;color:var(--text3)">ARIA v2.0.0</span></div>

      <div class="settings-section">
        <div class="settings-title">Modes / Presets</div>
        <button type="button" class="settings-btn" style="margin-bottom:10px;width:100%" onclick="aria.refreshInstalledApps()">🔄 Rafraîchir la liste</button>
        <div id="settings-presets"></div>
      </div>

      <div class="settings-section">
        <div class="settings-title">Assistant</div>
        <div class="setting-row"><label>Nom</label><input type="text" id="set-name" value="ARIA" onchange="aria.saveSettings()"></div>
        <div class="radio-group" style="margin-bottom:10px">
          <label><input type="radio" name="response-len" value="short" onchange="aria.saveSettings()"> Courte</label>
          <label><input type="radio" name="response-len" value="normal" checked onchange="aria.saveSettings()"> Normale</label>
          <label><input type="radio" name="response-len" value="detailed" onchange="aria.saveSettings()"> Détaillée</label>
        </div>
        <div class="setting-row"><label>Mémoire</label><input type="checkbox" id="set-memory" checked onchange="aria.saveSettings()"></div>
        <button class="settings-btn" onclick="aria.api('open_file','data/memory.json')">Voir la mémoire</button>
        <button class="settings-btn" onclick="aria.showToast('Effacez via memory.json','info')">Effacer la mémoire</button>
        <button class="settings-btn" onclick="aria.clearHistory()">Effacer l'historique</button>
      </div>

      <div class="settings-section">
        <div class="settings-title">Mémoire &amp; Apprentissage</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div class="stat-card"><div class="stat-val" id="mem-sessions">—</div><div class="stat-label">Sessions</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-messages">—</div><div class="stat-label">Messages</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-top-app">—</div><div class="stat-label">App fav.</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-top-topic">—</div><div class="stat-label">Sujet fav.</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-satisfaction">—</div><div class="stat-label">Satisfaction</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-corrections">—</div><div class="stat-label">Corrections</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-finetune">—</div><div class="stat-label">Exemples IA</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-convs">—</div><div class="stat-label">Conversations</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-peak">—</div><div class="stat-label">Heure active</div></div>
          <div class="stat-card"><div class="stat-val" id="mem-shortcuts">—</div><div class="stat-label">Raccourcis</div></div>
        </div>
        <button class="settings-btn" onclick="aria.exportFineTune()">Exporter dataset fine-tuning</button>
        <button class="settings-btn" onclick="aria.api('open_file','data/user_profile.json')">Voir profil complet</button>
        <button class="settings-btn" onclick="aria.api('open_file','data/learned_patterns.json')">Voir patterns appris</button>
        <button class="settings-btn" style="color:var(--error);border-color:var(--error)"
          onclick="if(confirm('Effacer toute la mémoire ?')) { const p = aria.api('reset_memory'); if (p?.then) p.then(() => { aria.loadMemoryStats(); aria.showToast('Mémoire effacée','success'); }); else { aria.loadMemoryStats(); aria.showToast('Mémoire effacée','success'); } }">
          Réinitialiser la mémoire
        </button>
      </div>

      <div class="settings-section">
        <div class="settings-title">App mobile</div>
        <div id="mobile-connect-status" style="font-size:13px;color:var(--text);margin-bottom:8px">Chargement…</div>
        <img id="mobile-connect-qr" alt="QR connexion mobile" style="display:none;width:160px;height:160px;border-radius:8px;margin:0 auto 10px;border:1px solid var(--border)">
        <div id="mobile-connect-hint" style="font-size:11px;color:var(--text3);line-height:1.4"></div>
      </div>

      <div class="settings-section">
        <div class="settings-title">Entraînement IA</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
          <div class="stat-card">
            <div class="stat-val" id="train-examples">—</div>
            <div class="stat-label">Exemples collectés</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="train-since-last">—</div>
            <div class="stat-label">Depuis dernier entr.</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="train-last-date">—</div>
            <div class="stat-label">Dernier entraînement</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="train-model">—</div>
            <div class="stat-label">Modèle actif</div>
          </div>
        </div>

        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px">
            <span>Progression vers prochain entraînement</span>
            <span id="train-progress-text">0/50</span>
          </div>
          <div style="background:var(--card);border-radius:4px;height:6px;overflow:hidden">
            <div id="train-progress-bar" style="height:100%;background:var(--accent);border-radius:4px;width:0%;transition:width 0.3s"></div>
          </div>
        </div>

        <div id="train-log" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:11px;color:var(--text2);max-height:160px;overflow-y:auto;margin-bottom:12px;white-space:pre-wrap"></div>

        <button class="settings-btn" id="btn-train-start" onclick="aria.startTraining()"
          style="background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:500">
          🚀 Lancer l'entraînement
        </button>
        <button class="settings-btn" id="btn-train-stop" onclick="aria.stopTraining()" style="display:none;color:var(--error);border-color:var(--error)">
          ⏹ Arrêter l'entraînement
        </button>
        <button class="settings-btn" onclick="aria.loadTrainingStats()">
          🔄 Rafraîchir les stats
        </button>
        <button class="settings-btn" onclick="aria.api('open_file','data/fine_tune_dataset.jsonl')">
          📄 Voir le dataset
        </button>

        <div id="model-switcher" style="display:none;margin-top:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px">
          <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:8px">✅ Modèle aria-custom disponible</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:10px">Votre modèle personnalisé entraîné sur vos conversations est prêt.</div>
          <div style="display:flex;gap:8px">
            <button onclick="aria.switchToCustomModel()"
              style="flex:1;background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500">
              🤖 Utiliser aria-custom
            </button>
            <button onclick="aria.switchToBaseModel()"
              style="flex:1;background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px">
              ↩ Revenir au modèle de base
            </button>
          </div>
        </div>

        <div style="font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5">
          Minimum 10 exemples requis. L'entraînement prend 2-4h sur RTX 5080.
          Le nouveau modèle <code style="background:var(--card);padding:2px 4px;border-radius:3px">aria-custom</code> sera disponible dans Ollama.
        </div>
      </div>`;
  },

  clearHistory() {
    this.api('clear_history');
    document.querySelectorAll('.bubble-user, .bubble-aria-wrap').forEach(el => el.remove());
    this.updateEmpty();
    this.showToast('Historique effacé', 'success');
  },

  refreshClockLine() {
    const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    const w = this.weatherText;
    const el = document.getElementById('weather-clock');
    if (el) el.textContent = w ? `${w} · ${time}` : time;
  },

  startClock() {
    const tick = () => { this.refreshClockLine(); setTimeout(tick, 1000); };
    tick();
  },

  scrollChat() {
    const el = document.getElementById('chat-messages');
    el.scrollTop = el.scrollHeight;
  },

  toggleDevice() {
    if (this.currentDevice === 'pc') {
      this.setDevice('mobile');
    } else {
      this.setDevice('pc');
    }
  },

  setDevice(mode, silent = false) {
    this.currentDevice = mode;
    document.body.classList.remove('pc-mode', 'mobile-mode');
    document.body.classList.add(`${mode}-mode`);

    const btn = document.getElementById('device-toggle');
    if (btn) btn.textContent = mode === 'mobile' ? '🖥️' : '📱';

    if (!silent) this.saveSettings();

    if (!silent) {
      this.showToast(
        mode === 'mobile' ? '📱 Mode mobile activé' : '🖥️ Mode PC activé',
        'info',
        2000
      );
    }

    setTimeout(() => this.scrollChat(), 100);
  },

  mobileNav(tab, el) {
    document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
    el?.classList.add('active');

    if (tab === 'modes') {
      this.toggleMobilePresets();
    } else if (tab === 'chat') {
      this.closeMobilePresets();
      this.toggleSettings(false);
    }
  },

  toggleMobilePresets() {
    const sheet = document.getElementById('mobile-presets-sheet');
    if (sheet) sheet.classList.toggle('open');
  },

  closeMobilePresets() {
    const sheet = document.getElementById('mobile-presets-sheet');
    if (sheet) sheet.classList.remove('open');
    document.querySelectorAll('.mobile-nav-btn').forEach((b, i) => {
      b.classList.toggle('active', i === 0);
    });
  },

  detectDevice() {
    const isMobile = window.innerWidth < 768 || /Android|iPhone|iPad/i.test(navigator.userAgent);
    this.setDevice(isMobile ? 'mobile' : 'pc', true);
  },

  esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },
};

window.aria = aria;
window.addEventListener('pywebviewready', () => aria.init());
window.addEventListener('load', () => {
  if (!aria._initDone) aria.init();
});
</script>

<!-- MOBILE BOTTOM NAV -->
<div id="mobile-nav">
  <button type="button" class="mobile-nav-btn active" onclick="aria.mobileNav('chat', this)">
    💬 <span>Chat</span>
  </button>
  <button type="button" class="mobile-nav-btn" onclick="aria.toggleMic(); aria.mobileNav('mic', this)">
    🎤 <span>Micro</span>
  </button>
  <button type="button" class="mobile-nav-btn" onclick="aria.mobileNav('modes', this)">
    ⚡ <span>Modes</span>
  </button>
  <button type="button" class="mobile-nav-btn" onclick="aria.toggleSettings(); aria.mobileNav('settings', this)">
    ⚙️ <span>Réglages</span>
  </button>
</div>

<!-- MOBILE PRESETS SHEET -->
<div id="mobile-presets-sheet">
  <div style="width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px"></div>
  <div style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:12px;letter-spacing:0.5px">MODES</div>
  <div class="mobile-preset-row" onclick="aria.activatePreset('vol','✈ Vol');aria.closeMobilePresets()">✈️ <span>Vol</span></div>
  <div class="mobile-preset-row" onclick="aria.activatePreset('etude','📚 Étude');aria.closeMobilePresets()">📚 <span>Étude</span></div>
  <div class="mobile-preset-row" onclick="aria.activatePreset('gaming','🎮 Gaming');aria.closeMobilePresets()">🎮 <span>Gaming</span></div>
  <div class="mobile-preset-row" onclick="aria.activatePreset('detente','🎵 Détente');aria.closeMobilePresets()">🎵 <span>Détente</span></div>
  <div class="mobile-preset-row" onclick="aria.activatePreset('nuit','🌙 Nuit');aria.closeMobilePresets()">🌙 <span>Nuit</span></div>
</div>

</body>
</html>
