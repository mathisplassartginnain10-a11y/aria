<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0B0B0D;
      --surface: #141417;
      --card: #1A1A1E;
      --hover: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);
      --accent: #6E7BF2;
      --accent-2: #8E97F8;
      --accent-bg: rgba(110,123,242,0.12);
      --accent-glow: rgba(110,123,242,0.30);
      --text: #F4F4F6;
      --text2: #A4A4AD;
      --text3: #6A6A73;
      --success: #34D399;
      --warning: #FBBF24;
      --error: #F87171;
      --user-bg: #1E1F24;
      --user-radius: 16px;
      --user-font: 15px;
      --aria-font: 15px;
      --code-bg: #0E0E11;
      --radius: 14px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow-md: 0 6px 22px rgba(0,0,0,0.38);
      --shadow-lg: 0 18px 50px rgba(0,0,0,0.50);
    }

    body.theme-warm { --accent:#F59E0B; --accent-bg:rgba(245,158,11,0.12); }
    body.theme-forest { --accent:#4ADE80; --accent-bg:rgba(74,222,128,0.12); }
    body.theme-rose { --accent:#F472B6; --accent-bg:rgba(244,114,182,0.12); }
    body.theme-mono { --accent:#ECECEC; --accent-bg:rgba(255,255,255,0.08); }
    body.theme-contrast { --accent:#fff; --accent-bg:rgba(255,255,255,0.15); --text:#fff; --text2:#ccc; --border:rgba(255,255,255,0.2); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(900px 500px at 78% -8%, rgba(110,123,242,0.10), transparent 60%),
        radial-gradient(700px 600px at -5% 108%, rgba(110,123,242,0.06), transparent 55%),
        var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      letter-spacing: -0.01em;
    }

    /* Aurora vivante derrière le verre (Liquid Glass) */
    body::before {
      content: "";
      position: fixed;
      inset: -25%;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(38% 44% at 22% 18%, rgba(110,123,242,0.24), transparent 60%),
        radial-gradient(34% 40% at 82% 26%, rgba(142,151,248,0.18), transparent 62%),
        radial-gradient(46% 52% at 62% 96%, rgba(74,200,245,0.13), transparent 60%);
      filter: blur(30px) saturate(1.35);
      animation: auroraDrift 26s ease-in-out infinite alternate;
    }
    @keyframes auroraDrift {
      0%   { transform: translate3d(-3%, -2%, 0) scale(1.05) rotate(0deg); }
      50%  { transform: translate3d(4%, 3%, 0) scale(1.13) rotate(4deg); }
      100% { transform: translate3d(-2%, 4%, 0) scale(1.08) rotate(-3deg); }
    }

    /* Scrollbars premium (fines, discrètes) */
    *::-webkit-scrollbar { width: 9px; height: 9px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; }

    ::selection { background: var(--accent-glow); color: #fff; }

    body.reduced-motion * { animation: none !important; transition: none !important; }

    /* ===== Liquid Glass (iOS 26 / macOS Tahoe) — activable/désactivable ===== */
    body:not(.no-glass) #sidebar,
    body:not(.no-glass) #header,
    body:not(.no-glass) #input-bar,
    body:not(.no-glass) #settings-panel,
    body:not(.no-glass) .bubble-user,
    body:not(.no-glass) .hbtn,
    body:not(.no-glass) #quit-modal > div {
      /* vibrance : on tire la couleur de l'aurora à travers le verre */
      backdrop-filter: blur(50px) saturate(220%) brightness(1.12) contrast(1.05);
      -webkit-backdrop-filter: blur(50px) saturate(220%) brightness(1.12) contrast(1.05);
      /* fin reflet lumineux qui glisse du haut (lumière captée par le verre) */
      background-image: linear-gradient(180deg,
                          rgba(255,255,255,0.10) 0%,
                          rgba(255,255,255,0.025) 16%,
                          rgba(255,255,255,0) 42%);
      box-shadow:
        inset 0 1px 0.5px rgba(255,255,255,0.45),     /* liseré spéculaire haut */
        inset 0 0 0 0.5px rgba(255,255,255,0.08),       /* hairline border */
        inset 0 -14px 32px -16px rgba(0,0,0,0.34),      /* profondeur basse */
        0 16px 50px -12px rgba(0,0,0,0.50),             /* ombre ambiante portée */
        0 2px 10px -3px rgba(0,0,0,0.38);               /* ombre de contact */
    }
    /* Le liseré spéculaire suit le coin arrondi de chaque surface */
    body:not(.no-glass) .bubble-user { border: 0.5px solid rgba(255,255,255,0.10); }
    body:not(.no-glass) .hbtn:hover {
      background-image: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04) 50%, transparent);
    }

    /* OFF : verre désactivé partout (rendu plat, opaque) */
    body.no-glass *, body.no-glass *::before, body.no-glass *::after {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    body.no-glass #sidebar, body.no-glass #header,
    body.no-glass #input-bar, body.no-glass #settings-panel {
      background-image: none !important;
    }

    /* ===== Hover « touches » — micro-interactions Liquid Glass (spring) ===== */
    .hbtn { position: relative; overflow: hidden; }
    .hbtn, #send-btn, .file-btn, .theme-swatch, #presets-list > * {
      transition: transform .26s cubic-bezier(0.34, 1.45, 0.5, 1),
                  filter .22s ease, box-shadow .22s ease,
                  background .2s ease, border-color .2s ease, color .2s ease;
    }
    /* Boutons d'en-tête : soulèvement + halo accent + balayage de lumière */
    .hbtn:hover {
      transform: translateY(-2px) scale(1.06);
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45)) drop-shadow(0 0 11px var(--accent-glow));
    }
    .hbtn:active { transform: scale(0.93); transition-duration: .08s; }
    .hbtn::after {
      content: ""; position: absolute; top: 0; left: -80%;
      width: 55%; height: 100%; pointer-events: none; opacity: 0;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.50), transparent);
      transform: skewX(-18deg);
    }
    .hbtn:hover::after { animation: glassSheen .75s ease forwards; }
    @keyframes glassSheen {
      0%   { left: -80%; opacity: 0; }
      18%  { opacity: .9; }
      100% { left: 135%; opacity: 0; }
    }
    /* Bouton d'envoi : pop élastique + halo */
    #send-btn:hover {
      transform: translateY(-1px) scale(1.09);
      filter: brightness(1.1) saturate(1.1) drop-shadow(0 0 14px var(--accent-glow));
    }
    #send-btn:active { transform: scale(0.9); transition-duration: .08s; }
    .file-btn:hover { transform: translateY(-1px) scale(1.12); color: var(--accent); }
    /* Items de navigation / modes : glissement + teinte */
    .nav-item, #presets-list > *, .conv-item {
      transition: background .15s, color .15s,
                  transform .24s cubic-bezier(0.34, 1.4, 0.5, 1);
    }
    .nav-item:hover, #presets-list > *:hover, .conv-item:hover { transform: translateX(4px); }
    .nav-item:active, #presets-list > *:active { transform: translateX(2px) scale(0.99); }
    /* Échantillons de thème : pop lumineux */
    .theme-swatch:hover {
      transform: translateY(-2px) scale(1.07);
      box-shadow: 0 8px 22px rgba(0,0,0,0.45), 0 0 0 2px rgba(255,255,255,0.18);
    }
    .theme-swatch:active { transform: scale(0.95); }

    /* ── Sidebar ── */
    #sidebar {
      width: 264px;
      background: rgba(22,22,28,0.55);
      backdrop-filter: blur(40px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.08);
      border-right: 1px solid rgba(255,255,255,0.10);
      box-shadow: inset -1px 0 0 rgba(255,255,255,0.05), inset 1px 0 0 rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand {
      padding: 20px 18px 12px;
    }

    .sidebar-brand #assistant-name {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .sidebar-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    #orb-canvas {
      display: block;
      margin: 4px auto 0;
      opacity: 1;
    }

    #status-text {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      padding: 4px 12px 12px;
    }

    .sidebar-sep {
      height: 1px;
      background: var(--border);
      margin: 0 12px 8px;
    }

    .sidebar-nav {
      padding: 0 8px;
      flex: 1;
      overflow-y: auto;
    }

    .nav-item {
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .nav-item:hover, .nav-item.active {
      background: var(--hover);
      color: var(--text);
    }

    .nav-item.active { background: var(--accent-bg); color: var(--accent); }

    .conv-item { padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background 0.15s; }
    .conv-item:hover { background:var(--hover); }
    .conv-title { font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .conv-meta { font-size:10px;color:var(--text3);margin-top:2px; }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-val { font-size: 16px; font-weight: 600; color: var(--accent); }
    .stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .sidebar-section-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 8px 12px 4px;
    }

    .preset-row {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }

    .preset-row:hover { background: var(--hover); color: var(--text); }
    .preset-row.active { background: var(--accent-bg); color: var(--accent); }

    .sidebar-footer {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-footer button {
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 18px;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-footer button:hover { background: var(--hover); color: var(--text); }

    .sidebar-version {
      font-size: 11px;
      color: var(--text3);
    }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #header {
      height: 56px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 24px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(20,20,26,0.42);
      backdrop-filter: blur(24px) saturate(1.7);
      -webkit-backdrop-filter: blur(24px) saturate(1.7);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), var(--shadow-sm);
      z-index: 5;
    }

    #header-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text2);
      text-align: center;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-self: end;
    }

    .header-left {
      display: flex;
      align-items: center;
      justify-self: start;
    }

    .model-picker {
      position: relative;
    }

    .model-picker-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text2);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .model-picker-btn:hover,
    .model-picker.open .model-picker-btn {
      background: var(--hover);
      border-color: var(--border2);
      color: var(--text);
    }

    .model-picker-chevron {
      font-size: 10px;
      opacity: 0.7;
    }

    .model-picker-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 280px;
      max-width: min(360px, 90vw);
      max-height: 320px;
      overflow-y: auto;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      padding: 6px;
    }

    .model-picker.open .model-picker-menu {
      display: block;
    }

    .model-option {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }

    .model-option:hover {
      background: var(--hover);
    }

    .model-option.active {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .model-option-sub {
      font-size: 11px;
      color: var(--text3);
    }

    .model-option.active .model-option-sub {
      color: var(--accent-2);
      opacity: 0.85;
    }

    .hbtn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(16px) saturate(180%) brightness(1.1);
      -webkit-backdrop-filter: blur(16px) saturate(180%) brightness(1.1);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 1px 0.5px rgba(255,255,255,0.40), inset 0 -1px 1px rgba(0,0,0,0.15), 0 4px 14px rgba(0,0,0,0.22);
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }

    .hbtn:hover { background: var(--hover); border-color: var(--border2); color: var(--text); }
    .hbtn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

    #stop-btn {
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(248,113,113,0.15);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    #chat-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text3);
      margin: auto;
      padding: 40px 0;
    }

    #empty-state.hidden { display: none !important; }

    #empty-state .empty-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 10px 34px var(--accent-glow);
    }

    #empty-state .empty-title {
      font-size: 15px;
      color: var(--text2);
      font-weight: 500;
    }

    #empty-state .empty-sub {
      font-size: 13px;
      color: var(--text3);
    }

    /* ── Bubbles ── */
    .bubble-user {
      align-self: flex-end;
      max-width: 85%;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.045));
      backdrop-filter: blur(22px) saturate(180%) brightness(1.1);
      -webkit-backdrop-filter: blur(22px) saturate(180%) brightness(1.1);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--user-radius) var(--user-radius) 5px var(--user-radius);
      padding: 13px 17px;
      font-size: var(--user-font);
      line-height: 1.7;
      animation: fadeIn 0.34s cubic-bezier(0.32, 0.72, 0, 1);
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      box-shadow: inset 0 1.5px 1px rgba(255,255,255,0.40), inset 0 -1px 1px rgba(255,255,255,0.05), 0 8px 26px rgba(0,0,0,0.32);
    }

    .bubble-user.center { align-self: center; }

    .bubble-aria-wrap {
      align-self: flex-start;
      max-width: 100%;
      display: flex;
      gap: 14px;
      animation: fadeIn 0.34s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .bubble-aria-wrap.center { align-self: center; }
    .bubble-aria-wrap.no-avatar .bubble-avatar { display: none; }

    .bubble-avatar {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      color: #fff;
      margin-top: 2px;
      font-weight: 700;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .bubble-body { flex: 1; min-width: 0; }

    .bubble-content {
      font-size: var(--aria-font);
      line-height: 1.75;
      color: var(--text);
      padding-top: 2px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-content code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 13px;
    }

    .bubble-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 12px 0;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .bubble-time {
      font-size: 10px;
      color: var(--text3);
      margin-top: 8px;
    }

    .copy-btn {
      opacity: 0;
      transition: opacity 0.15s;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      margin-top: 8px;
      display: inline-block;
      font-family: inherit;
    }

    .bubble-aria-wrap:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); background: var(--hover); }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    /* ── Input bar ── */
    #input-bar {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--bg) 55%, rgba(11,11,13,0));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 20px 20px 24px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      flex-shrink: 0;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    #text-input {
      width: 100%;
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(20px) saturate(190%) brightness(1.12);
      -webkit-backdrop-filter: blur(20px) saturate(190%) brightness(1.12);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 16px 96px 16px 50px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 54px;
      max-height: 200px;
      line-height: 1.5;
      box-shadow:
        inset 0 1.5px 1px rgba(255,255,255,0.40),
        inset 0 -1px 1px rgba(255,255,255,0.05),
        0 10px 34px rgba(0,0,0,0.42);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    #text-input:focus {
      border-color: rgba(142,151,248,0.55);
      background: rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1.5px 1px rgba(255,255,255,0.50),
        0 10px 34px rgba(0,0,0,0.42),
        0 0 0 4px var(--accent-bg);
    }

    #text-input::placeholder { color: var(--text3); }

    #input-mic-btn {
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    #input-mic-btn:hover { color: var(--text); background: var(--hover); }
    #input-mic-btn.active { color: var(--accent); background: var(--accent-bg); }

    #send-btn {
      position: absolute;
      right: 10px;
      bottom: 11px;
      width: 34px;
      height: 34px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px var(--accent-glow);
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    #send-btn:hover { filter: brightness(1.08); box-shadow: 0 6px 22px var(--accent-glow); }
    #send-btn:active { transform: scale(0.94); }

    #file-btn {
      position: absolute;
      right: 48px;
      bottom: 10px;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    #file-btn:hover { color: var(--text); background: var(--hover); }

    /* ── Settings panel ── */
    #settings-panel {
      position: fixed;
      top: 0;
      right: -440px;
      width: 440px;
      height: 100vh;
      background: rgba(20,20,23,0.82);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border-left: 1px solid var(--border);
      z-index: 1000;
      transition: right 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      overflow-y: auto;
      padding: 20px;
    }

    #settings-panel.open { right: 0 !important; }

    .settings-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .settings-head h2 { font-size: 16px; font-weight: 600; }
    .settings-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .settings-section:last-child { border-bottom: none; }
    .settings-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 13px; color: var(--text2); }
    .setting-row input[type=range] { width: 120px; accent-color: var(--accent); }
    .setting-row select, .setting-row input[type=text], .setting-row input[type=color] {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
      color: var(--text); font-family: inherit; font-size: 12px; max-width: 160px;
    }
    .setting-row input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .theme-swatch { height: 32px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #fff; }
    .theme-swatch.active, .theme-swatch:hover { border-color: var(--text); }
    .settings-btn { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: inherit; font-size: 12px; cursor: pointer; margin-bottom: 6px; text-align: left; }
    .settings-btn:hover { background: var(--hover); }
    .preset-editor { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .preset-editor-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
    .preset-field { margin-bottom: 8px; }
    .preset-field label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 3px; }
    .preset-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: inherit; font-size: 12px; }
    .preset-save { width: 100%; margin-top: 6px; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,107,53,0.3); background: var(--accent-bg); color: var(--accent); font-family: inherit; font-size: 12px; cursor: pointer; font-weight: 500; }
    .app-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 0; }
    .app-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-bg); border: 1px solid rgba(108,142,255,0.25); color: var(--accent); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .chip-remove { cursor: pointer; opacity: 0.6; font-size: 10px; }
    .chip-remove:hover { opacity: 1; }
    .app-search { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: inherit; font-size: 12px; }
    .app-results { position: relative; max-height: 160px; overflow-y: auto; background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-top: 4px; display: none; }
    .app-result-item { padding: 8px 10px; font-size: 12px; cursor: pointer; color: var(--text2); }
    .app-result-item:hover { background: var(--hover); color: var(--text); }
    .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .radio-group label { font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }

    /* ── Modals & toasts ── */
    #quit-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    #quit-modal.open { display: flex !important; }

    .modal-box {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      max-width: 300px;
      box-shadow: inset 0 1.5px 1px rgba(255,255,255,0.40), 0 24px 60px rgba(0,0,0,0.55);
    }

    .toast {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px) saturate(180%) brightness(1.12);
      -webkit-backdrop-filter: blur(24px) saturate(180%) brightness(1.12);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 12px;
      color: var(--text);
      box-shadow: inset 0 1px 0.5px rgba(255,255,255,0.40), 0 10px 30px rgba(0,0,0,0.45);
      animation: toastIn 0.25s ease-out;
      max-width: 320px;
    }

    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--error); }
    .toast.warning { border-left: 3px solid var(--warning); }
    .toast.info { border-left: 3px solid var(--accent); }

    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 280px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* === MOBILE LAYOUT === */
    body.mobile-mode {
      font-size: 16px;
    }

    body.mobile-mode #sidebar {
      display: none;
    }

    body.mobile-mode #main {
      width: 100%;
    }

    body.mobile-mode #header {
      height: 56px;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    body.mobile-mode #chat-messages {
      padding: 16px;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    body.mobile-mode .bubble-user {
      max-width: 85%;
      font-size: 15px;
      padding: 10px 14px;
      border-radius: 18px 18px 4px 18px;
    }

    body.mobile-mode .bubble-aria-wrap {
      max-width: 90%;
    }

    body.mobile-mode .bubble-content {
      font-size: 15px;
      line-height: 1.6;
    }

    body.mobile-mode #input-bar {
      padding: 10px 12px;
      padding-bottom: env(safe-area-inset-bottom, 10px);
      position: sticky;
      bottom: 0;
      background: var(--bg);
      z-index: 100;
      gap: 8px;
    }

    body.mobile-mode #text-input {
      font-size: 16px;
      border-radius: 22px;
      padding: 12px 18px;
    }

    body.mobile-mode #send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    body.mobile-mode #active-images-indicator {
      padding: 8px 16px;
      font-size: 13px;
    }

    body.mobile-mode #mobile-nav {
      display: flex;
    }

    #mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      align-items: center;
      justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    body.mobile-mode #input-bar {
      margin-bottom: 56px;
    }

    .mobile-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--text3);
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.15s;
      font-size: 20px;
      border: none;
      background: transparent;
    }

    .mobile-nav-btn span {
      font-size: 10px;
      color: var(--text3);
    }

    .mobile-nav-btn.active {
      color: var(--accent);
    }
    .mobile-nav-btn.active span {
      color: var(--accent);
    }

    body.mobile-mode #stop-btn {
      padding: 6px 10px;
      font-size: 11px;
    }

    body.mobile-mode .hbtn {
      width: 36px;
      height: 36px;
      font-size: 16px;
    }

    body.pc-mode #sidebar { display: flex; }
    body.pc-mode #mobile-nav { display: none !important; }

    body.mobile-mode #orb-canvas { display: none; }

    #mobile-presets-sheet {
      display: none;
      position: fixed;
      bottom: 56px;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 16px;
      z-index: 199;
      animation: slideUp 0.25s ease-out;
    }

    #mobile-presets-sheet.open { display: block; }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .mobile-preset-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 15px;
      color: var(--text);
    }

    .mobile-preset-row:hover, .mobile-preset-row:active {
      background: var(--hover);
    }
  </style>
</head>
<body class="theme-slate">

<!-- Sidebar -->
<aside id="sidebar">
  <div class="sidebar-brand">
    <div id="assistant-name">ARIA</div>
    <div class="sidebar-sub">Assistant local</div>
  </div>

  <canvas id="orb-canvas" width="200" height="80"></canvas>
  <div id="status-text">En veille</div>

  <div class="sidebar-sep"></div>

  <div class="sidebar-nav">
    <button type="button" onclick="aria.startNewConversation()" style="margin:8px;width:calc(100% - 16px);padding:8px;background:var(--accent-bg);border:1px solid var(--accent);border-radius:8px;color:var(--accent);cursor:pointer;font-family:inherit;font-size:13px">
      ✏️ Nouvelle conversation
    </button>
    <div style="padding:0 8px;font-size:10px;color:var(--text3);letter-spacing:1px;margin:8px 0 4px">HISTORIQUE</div>
    <div id="conv-list" style="overflow-y:auto;max-height:180px;padding:0 8px"></div>
    <div class="sidebar-section-label">Modes</div>
    <div id="presets-list"></div>
  </div>

  <div class="sidebar-footer">
    <button type="button" title="Paramètres" onclick="aria.toggleSettings()">⚙</button>
    <span class="sidebar-version">v2.0.0</span>
  </div>
</aside>

<!-- Main -->
<main id="main">
  <header id="header">
    <div class="header-left">
      <div id="model-picker" class="model-picker">
        <button type="button" id="model-picker-btn" class="model-picker-btn" onclick="aria.toggleModelMenu(event)" title="Choisir le modèle">
          <span id="model-picker-label">Auto</span>
          <span class="model-picker-chevron">▾</span>
        </button>
        <div id="model-picker-menu" class="model-picker-menu"></div>
      </div>
    </div>
    <h1 id="header-title">ARIA</h1>
    <div class="header-actions">
      <span id="weather-clock" class="sr-only" aria-hidden="true"></span>
      <span id="model-display" class="sr-only" aria-hidden="true"></span>
      <button type="button" id="stop-btn" onclick="aria.stopSpeaking()">Stop</button>
      <button type="button" class="hbtn" id="device-toggle" onclick="aria.toggleDevice()" title="Basculer PC/Mobile">💻</button>
      <button type="button" class="hbtn" id="mic-btn" title="Micro" onclick="aria.toggleMic()">🎤</button>
    </div>
  </header>

  <div id="chat-column">
    <div id="chat-messages">
      <div id="empty-state">
        <div class="empty-icon">A</div>
        <div class="empty-title">Comment puis-je t'aider ?</div>
        <div class="empty-sub">Parle ou écris un message</div>
      </div>
    </div>

    <div id="input-bar">
      <div class="input-wrapper">
        <button type="button" id="input-mic-btn" title="Micro" onclick="aria.toggleMic()">🎤</button>
        <textarea id="text-input" rows="1" placeholder="Envoyer un message à ARIA…"></textarea>
        <label id="file-btn" title="Joindre des fichiers" style="width:42px;height:42px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all 0.15s">
          📎
          <input
            type="file"
            id="file-input"
            multiple
            accept="image/*,video/*,.pdf,.txt,.py,.js,.html,.css,.json,.yaml,.md,.csv,.xlsx,.docx"
            style="display:none"
            onchange="aria.handleFiles(this.files)"
          >
        </label>
        <button type="button" id="send-btn" title="Envoyer" onclick="aria.sendText()">↑</button>
      </div>
    </div>
  </div>
</main>

<div id="settings-panel"></div>

<div id="quit-modal">
  <div class="modal-box">
    <div style="font-size:15px;font-weight:500;margin-bottom:6px">Fermer ARIA ?</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Ollama sera arrêté.</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="window.pywebview.api.quit_aria()" style="background:rgba(248,113,113,0.15);border:1px solid var(--error);color:var(--error);padding:8px 20px;border-radius:8px;cursor:pointer;font-family:inherit">Fermer</button>
      <button onclick="document.getElementById('quit-modal').classList.remove('open')" style="background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);padding:8px 20px;border-radius:8px;cursor:pointer;font-family:inherit">Annuler</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const aria = {
  status: 'idle',
  theme: 'slate',
  themes: ['slate','warm','forest','rose','mono','contrast'],
  themeColors: { slate:'#FF6B35', warm:'#F59E0B', forest:'#4ADE80', rose:'#F472B6', mono:'#ECECEC', contrast:'#ffffff' },
  settingsOpen: false,
  trainingInterval: null,
  rms: 0, displayRms: 0,
  orbR: 14, targetOrbR: 14,
  arcA: 0, arcB: 0,
  orbCtx: null,
  reducedMotion: false,
  showTimestamps: true,
  showAvatars: true,
  ariaAlign: 'left',
  weatherText: '',
  streamingCursor: null,
  currentWrap: null,
  currentContent: null,
  presetKeys: ['vol','etude','gaming','detente','nuit'],
  defaultPresets: {
    vol: { label:'Vol', icon:'✈', apps_open:['msfs'], apps_close:['discord','spotify'], volume:50 },
    etude: { label:'Étude', icon:'📚', apps_open:['cursor'], apps_close:['discord','steam','spotify'], volume:30 },
    gaming: { label:'Gaming', icon:'🎮', apps_open:['steam','discord'], apps_close:[], volume:80 },
    detente: { label:'Détente', icon:'🎵', apps_open:['spotify','discord'], apps_close:[], volume:60 },
    nuit: { label:'Nuit', icon:'🌙', apps_open:[], apps_close:['discord','steam','spotify','chrome'], volume:15, brightness:20 },
  },
  presetsCustom: {},
  currentDevice: 'pc',
  _modelPickerData: null,

  async checkPin() {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.id = 'pin-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px';
      overlay.innerHTML = `
        <div style="font-size:24px;font-weight:600;color:var(--text);letter-spacing:4px">A R I A</div>
        <div style="font-size:13px;color:var(--text3)">Entrez votre code</div>
        <div id="pin-dots" style="display:flex;gap:12px;margin:8px 0">
          ${[0,1,2,3].map(i => `<div id="dot-${i}" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all 0.15s"></div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px">
          ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(n => `
            <button onclick="aria.pinPress('${n}')" style="padding:18px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;font-family:inherit;${n==='' ? 'visibility:hidden' : ''}">${n}</button>
          `).join('')}
        </div>
        <div id="pin-error" style="font-size:12px;color:var(--error);height:16px"></div>`;
      document.body.appendChild(overlay);

      window._pinResolve = resolve;
      window._pinBuffer = '';
    });
  },

  pinPress(key) {
    if (key === '') return;
    const CORRECT_PIN = '0000';

    if (key === '⌫') {
      window._pinBuffer = window._pinBuffer.slice(0, -1);
    } else if (window._pinBuffer.length < 4) {
      window._pinBuffer += key;
    }

    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById(`dot-${i}`);
      if (dot) {
        dot.style.background = i < window._pinBuffer.length ? 'var(--accent)' : 'transparent';
        dot.style.borderColor = i < window._pinBuffer.length ? 'var(--accent)' : 'var(--border2)';
      }
    }

    if (window._pinBuffer.length === 4) {
      if (window._pinBuffer === CORRECT_PIN) {
        document.getElementById('pin-overlay').style.opacity = '0';
        document.getElementById('pin-overlay').style.transition = 'opacity 0.3s';
        setTimeout(() => {
          document.getElementById('pin-overlay').remove();
          if (window._pinResolve) window._pinResolve(true);
        }, 300);
      } else {
        document.getElementById('pin-error').textContent = 'Code incorrect';
        document.getElementById('pin-dots').style.animation = 'shake 0.3s';
        setTimeout(() => {
          window._pinBuffer = '';
          for (let i = 0; i < 4; i++) {
            const dot = document.getElementById(`dot-${i}`);
            if (dot) { dot.style.background = 'transparent'; dot.style.borderColor = 'var(--border2)'; }
          }
          document.getElementById('pin-error').textContent = '';
        }, 600);
      }
    }
  },

  async init() {
    await this.checkPin();
    this.orbCtx = document.getElementById('orb-canvas').getContext('2d');
    this.buildSettingsPanel();
    this.loadSettings();
    this.detectDevice();
    this.loadPresets();
    this.loadConversations();
    this.loadModelPicker();
    this.setStatus('idle');
    this.startClock();
    document.getElementById('text-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendText(); }
    });
    document.getElementById('text-input').addEventListener('input', e => {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
    });

    const chat = document.getElementById('chat-messages');
    chat.addEventListener('dragover', e => { e.preventDefault(); chat.style.background = 'rgba(255,107,53,0.05)'; });
    chat.addEventListener('dragleave', () => { chat.style.background = ''; });
    chat.addEventListener('drop', e => {
      e.preventDefault();
      chat.style.background = '';
      if (e.dataTransfer?.files?.length) this.handleFiles(e.dataTransfer.files);
    });

    document.addEventListener('paste', e => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) this.handleFiles([file]);
        }
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') this.stopSpeaking();
    });

    const sheet = document.getElementById('mobile-presets-sheet');
    if (sheet) {
      let startY = 0;
      sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
      sheet.addEventListener('touchend', e => {
        if (e.changedTouches[0].clientY - startY > 50) this.closeMobilePresets();
      });
    }
    document.addEventListener('click', e => {
      const picker = document.getElementById('model-picker');
      if (picker?.classList.contains('open') && !picker.contains(e.target)) {
        picker.classList.remove('open');
      }
      const presetsSheet = document.getElementById('mobile-presets-sheet');
      if (presetsSheet?.classList.contains('open') && !presetsSheet.contains(e.target) &&
          !e.target.closest('.mobile-nav-btn')) {
        this.closeMobilePresets();
      }
    });

    requestAnimationFrame(() => this.drawOrb());
  },

  api(name, ...args) {
    const fn = window.pywebview?.api?.[name];
    return fn ? fn(...args) : null;
  },

  drawOrb() {
    if (!this.reducedMotion) {
      this.arcA += 0.013;
      this.arcB -= 0.008;
      const lvl = Math.min(1, this.rms / 1000);
      this.displayRms += (lvl - this.displayRms) * 0.1;
      const active = ['listening','thinking','speaking','transcribing'].includes(this.status);
      this.targetOrbR = active ? 22 : 14 + this.displayRms * 6;
      this.orbR += (this.targetOrbR - this.orbR) * 0.12;
    }
    const ctx = this.orbCtx;
    const W = 200, H = 80, cx = W / 2, cy = 40;
    ctx.clearRect(0, 0, W, H);
    const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#6E7BF2';
    const rgb = this.hexRgb(accent);
    const t = Math.min(1, this.displayRms * 1.4);
    const r = Math.round(rgb.r + (255 - rgb.r) * t);
    const g = Math.round(rgb.g + (255 - rgb.g) * t);
    const b = Math.round(rgb.b + (255 - rgb.b) * t);
    const active = ['listening','thinking','speaking','transcribing'].includes(this.status);

    // Bloom externe doux
    const bloom = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
    bloom.addColorStop(0, `rgba(${r},${g},${b},${active ? 0.24 : 0.12})`);
    bloom.addColorStop(1, 'transparent');
    ctx.fillStyle = bloom;
    ctx.fillRect(0, 0, W, H);

    // Anneau fin et élégant
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.14)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Arc d'activité qui tourne lentement
    if (active) {
      ctx.beginPath();
      ctx.arc(cx, cy, 30, this.arcA, this.arcA + Math.PI * 0.55);
      ctx.strokeStyle = `rgba(${r},${g},${b},0.85)`;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Cœur lumineux avec léger reflet
    const core = ctx.createRadialGradient(cx - 3, cy - 4, 1, cx, cy, this.orbR);
    core.addColorStop(0, `rgba(${Math.min(255,r+34)},${Math.min(255,g+34)},${Math.min(255,b+44)},0.98)`);
    core.addColorStop(1, `rgba(${r},${g},${b},0.32)`);
    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(cx, cy, this.orbR, 0, Math.PI * 2);
    ctx.fill();

    requestAnimationFrame(() => this.drawOrb());
  },

  hexRgb(hex) {
    const h = hex.replace('#', '');
    if (h.length < 6) return { r: 110, g: 123, b: 242 };
    return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
  },

  show() { document.body.style.display = 'flex'; },
  hide() { document.body.style.display = 'none'; },

  setStatus(state) {
    this.status = state;
    const labels = { idle:'En veille', inactive:'En veille', listening:'Écoute…', transcribing:'Transcription…', thinking:'Réflexion…', speaking:'ARIA parle…' };
    document.getElementById('status-text').textContent = labels[state] || 'En veille';
    const active = ['listening','thinking','speaking','transcribing'].includes(state);
    document.getElementById('mic-btn')?.classList.toggle('active', active);
    document.getElementById('input-mic-btn')?.classList.toggle('active', active);
    const stopBtn = document.getElementById('stop-btn');
    if (stopBtn) {
      stopBtn.style.display = ['speaking', 'thinking'].includes(state) ? 'inline-flex' : 'none';
    }
  },

  updateWaveform(rms) { this.rms = rms; },

  updateEmpty() {
    const has = document.querySelectorAll('.bubble-user, .bubble-aria-wrap').length > 0;
    document.getElementById('empty-state').classList.toggle('hidden', has);
  },

  ts() {
    return this.showTimestamps ? new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : '';
  },

  addUserBubble(text) {
    this.finalizeMessage();
    const el = document.createElement('div');
    el.className = 'bubble-user' + (this.ariaAlign === 'center' ? ' center' : '');
    el.textContent = text;
    if (this.showTimestamps) {
      const t = document.createElement('div');
      t.className = 'bubble-time';
      t.textContent = this.ts();
      el.appendChild(t);
    }
    document.getElementById('chat-messages').appendChild(el);
    this.updateEmpty();
    this.scrollChat();
  },

  appendToken(token) {
    if (!this.currentWrap) {
      const wrap = document.createElement('div');
      wrap.className = 'bubble-aria-wrap' + (this.ariaAlign === 'center' ? ' center' : '') + (this.showAvatars ? '' : ' no-avatar');
      const name = document.getElementById('assistant-name').textContent || 'A';
      wrap.innerHTML = `
        <div class="bubble-avatar">${this.esc(name[0])}</div>
        <div class="bubble-body">
          <div class="bubble-content"></div>
          <button type="button" class="copy-btn" onclick="aria.copyBubble(this)">Copier</button>
        </div>`;
      document.getElementById('chat-messages').appendChild(wrap);
      this.currentWrap = wrap;
      this.currentContent = wrap.querySelector('.bubble-content');
      this.streamingCursor = document.createElement('span');
      this.streamingCursor.className = 'cursor-blink';
      this.currentContent.appendChild(this.streamingCursor);
      this.updateEmpty();
    }
    this.streamingCursor?.insertAdjacentText('beforebegin', token);
    this.scrollChat();
  },

  finalizeMessage() {
    this.streamingCursor?.remove();
    this.streamingCursor = null;
    this.currentWrap = null;
    this.currentContent = null;
  },

  copyBubble(btn) {
    const text = btn.closest('.bubble-body')?.querySelector('.bubble-content')?.textContent?.trim() || '';
    if (!text) return;
    const orig = btn.textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copié';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => this.showToast('Copie impossible', 'error'));
  },

  showToast(msg, type = 'info', duration = 3000) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    if (c.children.length > 4) c.firstChild.remove();
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, duration);
  },

  showError(text) { this.showToast(text, 'error', 5000); },

  updateWeather(text) {
    this.weatherText = text || '';
    this.refreshClockLine();
  },

  setModel(name) {
    const el = document.getElementById('model-display');
    if (el) el.textContent = name ? name : '';
    this.updateModelPickerLabel(name || 'auto');
  },

  normModelId(id) {
    return String(id || '').replace(/:latest$/, '');
  },

  async loadModelPicker() {
    try {
      let raw = this.api('get_available_models');
      if (raw?.then) raw = await raw;
      const data = JSON.parse(raw || '{}');
      this._modelPickerData = data;
      this.renderModelMenu(data);
      this.updateModelPickerLabel(data.current || 'auto');
    } catch (e) {
      console.warn('loadModelPicker', e);
    }
  },

  updateModelPickerLabel(current) {
    const label = document.getElementById('model-picker-label');
    const btn = document.getElementById('model-picker-btn');
    if (!label) return;
    const cur = current || 'auto';
    if (cur === 'auto') {
      label.textContent = 'Auto';
      if (btn) btn.title = 'Auto — rapide + réflexion si besoin';
      return;
    }
    const options = this._modelPickerData?.options || [];
    const match = options.find(o => this.normModelId(o.id) === this.normModelId(cur));
    label.textContent = match?.label || this.normModelId(cur);
    if (btn) btn.title = match?.subtitle || cur;
  },

  renderModelMenu(data) {
    const menu = document.getElementById('model-picker-menu');
    if (!menu) return;
    const current = data.current || 'auto';
    const options = data.options || [];
    menu.innerHTML = options.map(opt => {
      const active = this.normModelId(opt.id) === this.normModelId(current);
      return `<button type="button" class="model-option${active ? ' active' : ''}" onclick="aria.pickModel(${JSON.stringify(opt.id)})">
        <span>${this.esc(opt.label)}</span>
        <span class="model-option-sub">${this.esc(opt.subtitle || opt.id)}</span>
      </button>`;
    }).join('');
  },

  toggleModelMenu(event) {
    event?.stopPropagation();
    document.getElementById('model-picker')?.classList.toggle('open');
  },

  closeModelMenu() {
    document.getElementById('model-picker')?.classList.remove('open');
  },

  async pickModel(modelId) {
    try {
      let raw = this.api('switch_model', modelId);
      if (raw?.then) raw = await raw;
      if (raw !== 'ok') {
        this.showToast('Erreur changement de modèle', 'error');
        return;
      }
      if (this._modelPickerData) this._modelPickerData.current = modelId;
      this.updateModelPickerLabel(modelId);
      this.setModel(modelId === 'auto' ? '' : modelId);
      const opt = (this._modelPickerData?.options || []).find(o => o.id === modelId);
      const name = opt?.label || (modelId === 'auto' ? 'Auto' : modelId);
      this.showToast(`Modèle : ${name}`, 'info', 2500);
      this.renderModelMenu(this._modelPickerData || { current: modelId, options: [] });
    } catch (e) {
      this.showToast('Erreur changement de modèle', 'error');
    } finally {
      this.closeModelMenu();
    }
  },

  setInputText(text) {
    const input = document.getElementById('text-input');
    if (!input) return;
    input.value = text;
    input.focus();
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    input.dispatchEvent(new Event('input'));
  },

  stopSpeaking() {
    this.api('stop_speaking');
    this.setStatus('idle');
  },

  toggleMic() { this.api('toggle_activation'); },

  sendText() {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = '52px';
    this.addUserBubble(text);
    this.api('send_text', text);
    this.loadConversations();
  },

  askFilePrompt() {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:5000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
      overlay.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:480px;max-width:90vw">
          <div style="font-size:14px;font-weight:500;margin-bottom:6px;color:var(--text)">Que voulez-vous savoir ?</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Entrez votre question pour ces fichiers</div>
          <textarea id="file-prompt-input" placeholder="Ex: Corrige ce devoir, Explique ce graphique, Que montre cette image..."
            style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:inherit;font-size:14px;resize:none;height:80px;outline:none"></textarea>
          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
            <button id="file-prompt-cancel" style="background:transparent;border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit">Annuler</button>
            <button id="file-prompt-send" style="background:var(--accent);border:none;color:white;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500">Envoyer ➤</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const input = overlay.querySelector('#file-prompt-input');
      const sendBtn = overlay.querySelector('#file-prompt-send');
      const cancelBtn = overlay.querySelector('#file-prompt-cancel');

      setTimeout(() => input.focus(), 100);

      const confirm = () => {
        const val = input.value.trim();
        if (!val) { input.style.borderColor = 'var(--error)'; return; }
        overlay.remove();
        resolve(val);
      };

      const cancel = () => { overlay.remove(); resolve(null); };

      sendBtn.onclick = confirm;
      cancelBtn.onclick = cancel;
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); confirm(); }
        if (e.key === 'Escape') cancel();
      });
    });
  },

  async handleFiles(files) {
    const fileArray = Array.from(files);
    if (!fileArray.length) return;

    const inputEl = document.getElementById('text-input');
    let userPrompt = inputEl.value.trim();

    const hasImages = fileArray.some(f => f.type.startsWith('image/'));

    if (!userPrompt && !hasImages) {
      userPrompt = await this.askFilePrompt();
      if (!userPrompt) {
        document.getElementById('file-input').value = '';
        return;
      }
    } else if (!userPrompt && hasImages) {
      userPrompt = 'Analyse ces images et dis-moi ce que tu observes';
    }

    fileArray.forEach(file => {
      const type = file.type.startsWith('image/') ? 'image'
                 : file.type.startsWith('video/') ? 'video' : 'file';
      this.showFileBubble(file, type);
    });

    this.addUserBubble(userPrompt);
    inputEl.value = '';
    inputEl.style.height = '48px';

    const filesData = await Promise.all(fileArray.map(async file => ({
      b64: await this.fileToBase64(file),
      name: file.name,
      type: file.type,
    })));

    if (window.pywebview?.api) {
      window.pywebview.api.send_files_with_prompt(
        JSON.stringify(filesData),
        userPrompt
      ).catch(e => this.showToast('Erreur envoi fichiers', 'error'));
    }

    document.getElementById('file-input').value = '';
  },

  showFileBubble(file, type) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-user';
    if (type === 'image') {
      const url = URL.createObjectURL(file);
      wrap.innerHTML = `
        <img src="${url}" style="max-width:100%;max-height:300px;border-radius:8px;display:block;margin-bottom:8px" alt="">
        <div style="font-size:12px;color:var(--text3)">${this.esc(file.name)}</div>`;
    } else if (type === 'video') {
      const url = URL.createObjectURL(file);
      wrap.innerHTML = `
        <video src="${url}" controls style="max-width:100%;max-height:200px;border-radius:8px;display:block;margin-bottom:8px"></video>
        <div style="font-size:12px;color:var(--text3)">${this.esc(file.name)}</div>`;
    } else {
      wrap.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
          <span style="font-size:24px">${this.fileIcon(file.name)}</span>
          <div>
            <div style="font-size:13px;font-weight:500">${this.esc(file.name)}</div>
            <div style="font-size:11px;color:var(--text3)">${(file.size / 1024).toFixed(1)} KB</div>
          </div>
        </div>`;
    }
    document.getElementById('chat-messages').appendChild(wrap);
    this.scrollChat();
    this.updateEmpty();
  },

  fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = { pdf:'📄', py:'🐍', js:'⚡', html:'🌐', css:'🎨', json:'📋', md:'📝', csv:'📊', txt:'📃', yaml:'⚙️' };
    return icons[ext] || '📁';
  },

  fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  },

  showChat() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === 'chat'));
    this.toggleSettings(false);
  },

  async loadConversations() {
    try {
      let raw = this.api('get_conversations');
      if (raw?.then) raw = await raw;
      const convs = JSON.parse(raw || '[]');
      const list = document.getElementById('conv-list');
      if (!list) return;
      list.innerHTML = convs.slice(0, 20).map(c => `
        <div class="conv-item" onclick="aria.openConversation('${this.esc(c.id)}')" title="${this.esc(c.title)}">
          <div class="conv-title">${this.esc(c.title)}</div>
          <div class="conv-meta">${this.esc(c.date)} · ${c.count} msgs</div>
        </div>
      `).join('');
    } catch (e) {}
  },

  async openConversation(id) {
    let raw = this.api('load_conversation', id);
    if (raw?.then) raw = await raw;
    const messages = JSON.parse(raw || '[]');
    document.querySelectorAll('.bubble-user,.bubble-aria-wrap').forEach(e => e.remove());
    this.updateEmpty();
    messages.forEach(m => {
      if (m.role === 'user') this.addUserBubble(m.text);
      else { this.appendToken(m.text); this.finalizeMessage(); }
    });
    this.showToast('Conversation chargée', 'success');
  },

  async startNewConversation() {
    let p = this.api('new_conversation');
    if (p?.then) await p;
    document.querySelectorAll('.bubble-user,.bubble-aria-wrap').forEach(e => e.remove());
    this.updateEmpty();
    await this.loadConversations();
    this.showToast('Nouvelle conversation', 'info');
  },

  toggleSettings(open) {
    if (open === undefined) open = !this.settingsOpen;
    this.settingsOpen = open;
    document.getElementById('settings-panel').classList.toggle('open', open);
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', open ? false : n.dataset.nav === 'chat'));
    if (open) {
      this.loadMemoryStats();
      this.loadTrainingStats();
      this.loadMobileConnectInfo();
    }
  },

  loadMobileConnectInfo() {
    try {
      let raw = this.api('get_mobile_connect_info');
      const info = JSON.parse(raw || '{}');
      const status = document.getElementById('mobile-connect-status');
      const qr = document.getElementById('mobile-connect-qr');
      const hint = document.getElementById('mobile-connect-hint');
      if (!status) return;
      if (!info.ip) {
        status.textContent = 'Serveur mobile inactif';
        if (qr) qr.style.display = 'none';
        if (hint) hint.textContent = 'Active mobile_auto_start dans config.yaml ou lance start_mobile.bat';
        return;
      }
      status.textContent = info.running
        ? `🖥 ${info.pc_name || 'PC'} — ${info.ip}:${info.port}`
        : `Serveur arrêté (${info.ip}:${info.port})`;
      if (qr && info.qr_payload) {
        qr.src = `https://quickchart.io/qr?text=${encodeURIComponent(info.qr_payload)}&size=180&margin=1&dark=00D4FF&light=111116`;
        qr.style.display = 'block';
      }
      if (hint) {
        hint.textContent = 'Scanne avec l’app ARIA (même WiFi), puis entre le PIN configuré sur le PC.';
      }
    } catch (e) {
      /* ignore */
    }
  },

  async loadTrainingStats() {
    try {
      let raw = this.api('get_training_stats');
      if (raw?.then) raw = await raw;
      const s = JSON.parse(raw || '{}');
      document.getElementById('train-examples').textContent = s.total_examples ?? '—';
      document.getElementById('train-since-last').textContent = s.new_since_last ?? '—';
      document.getElementById('train-last-date').textContent = s.last_train_date ?? 'Jamais';
      document.getElementById('train-model').textContent = s.active_model ?? 'qwen3:14b';

      const progress = Math.min(100, ((s.new_since_last || 0) / 50) * 100);
      document.getElementById('train-progress-bar').style.width = progress + '%';
      document.getElementById('train-progress-text').textContent = `${s.new_since_last || 0}/50`;

      const switcher = document.getElementById('model-switcher');
      if (switcher) {
        switcher.style.display = s.custom_model_exists ? 'block' : 'none';
      }

      const activeIsCustom = s.active_model === 'aria-custom';
      document.getElementById('train-model').style.color = activeIsCustom ? 'var(--success)' : 'var(--accent)';
    } catch (e) {}
  },

  async switchToCustomModel() {
    try {
      let p = this.api('switch_model', 'aria-custom');
      if (p?.then) await p;
      document.getElementById('train-model').textContent = 'aria-custom';
      document.getElementById('train-model').style.color = 'var(--success)';
      this.setModel('aria-custom');
      this.showToast('🤖 Modèle aria-custom activé !', 'success', 4000);
      this.loadTrainingStats();
    } catch (e) {
      this.showToast('Erreur changement de modèle', 'error');
    }
  },

  async switchToBaseModel() {
    try {
      let p = this.api('switch_model', 'qwen3:14b');
      if (p?.then) await p;
      document.getElementById('train-model').textContent = 'qwen3:14b';
      document.getElementById('train-model').style.color = 'var(--accent)';
      this.setModel('qwen3:14b');
      this.showToast('↩ Modèle de base restauré', 'info');
      this.loadTrainingStats();
    } catch (e) {
      this.showToast('Erreur changement de modèle', 'error');
    }
  },

  async startTraining() {
    const examples = parseInt(document.getElementById('train-examples').textContent, 10);
    if (isNaN(examples) || examples < 10) {
      this.showToast(`Pas assez de données (${examples || 0}/10)`, 'warning');
      return;
    }

    if (!confirm("Lancer l'entraînement ? Cela prendra 2-4h et utilisera votre GPU.")) return;

    document.getElementById('btn-train-start').style.display = 'none';
    document.getElementById('btn-train-stop').style.display = 'block';
    const log = document.getElementById('train-log');
    log.style.display = 'block';
    log.textContent = "🚀 Démarrage de l'entraînement...\n";

    this.api('start_training');

    this.trainingInterval = setInterval(async () => {
      try {
        let raw = this.api('get_training_log');
        if (raw?.then) raw = await raw;
        const data = JSON.parse(raw || '{}');
        if (data.log) {
          log.textContent = data.log;
          log.scrollTop = log.scrollHeight;
        }
        if (data.status === 'done') {
          clearInterval(this.trainingInterval);
          this.trainingInterval = null;
          document.getElementById('btn-train-start').style.display = 'block';
          document.getElementById('btn-train-stop').style.display = 'none';
          this.showToast('✅ Entraînement terminé ! Modèle aria-custom disponible.', 'success', 6000);
          this.loadTrainingStats();
        } else if (data.status === 'error') {
          clearInterval(this.trainingInterval);
          this.trainingInterval = null;
          document.getElementById('btn-train-start').style.display = 'block';
          document.getElementById('btn-train-stop').style.display = 'none';
          this.showToast('❌ Erreur entraînement — voir les logs', 'error', 5000);
        }
      } catch (e) {}
    }, 2000);
  },

  stopTraining() {
    if (this.trainingInterval) clearInterval(this.trainingInterval);
    this.trainingInterval = null;
    this.api('stop_training');
    document.getElementById('btn-train-start').style.display = 'block';
    document.getElementById('btn-train-stop').style.display = 'none';
    this.showToast('Entraînement arrêté', 'warning');
  },

  async loadMemoryStats() {
    try {
      let raw = this.api('get_memory_stats');
      if (raw?.then) raw = await raw;
      const stats = JSON.parse(raw || '{}');
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val ?? '—'; };
      set('mem-sessions', stats.total_sessions ?? 0);
      set('mem-messages', stats.total_messages ?? 0);
      set('mem-top-app', stats.top_app || '—');
      set('mem-top-topic', stats.top_topic || '—');
      set('mem-satisfaction', stats.satisfaction || '—');
      set('mem-corrections', stats.corrections ?? 0);
      set('mem-finetune', stats.fine_tune_examples ?? 0);
      set('mem-convs', stats.conversations_saved ?? 0);
      set('mem-peak', stats.peak_hour != null ? `${stats.peak_hour}h` : '—');
      set('mem-shortcuts', stats.voice_shortcuts ?? 0);
    } catch (e) {}
  },

  async exportFineTune() {
    try {
      let path = this.api('export_fine_tune');
      if (path?.then) path = await path;
      this.showToast('Exporté: ' + (path || 'fine_tune_dataset.jsonl'), 'success');
    } catch (e) {
      this.showToast('Erreur export fine-tuning', 'error');
    }
  },

  confirmQuit() { document.getElementById('quit-modal').classList.add('open'); },

  activatePreset(key, label, evt) {
    const p = this.api('activate_preset', key);
    if (p?.then) p.then(msg => this.showToast(msg, 'success'));
    document.querySelectorAll('.preset-row').forEach(r => r.classList.remove('active'));
    evt?.currentTarget?.classList.add('active');
  },

  cycleTheme() {
    const i = this.themes.indexOf(this.theme);
    const next = this.themes[(i + 1) % this.themes.length];
    const sw = document.querySelector(`.theme-swatch[data-theme="${next}"]`);
    this.setTheme(next, sw);
    this.showToast('Thème : ' + next, 'info');
  },

  setTheme(name, el) {
    document.body.className = `theme-${name}` + (this.reducedMotion ? ' reduced-motion' : '');
    this.theme = name;
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
    (el || document.querySelector(`.theme-swatch[data-theme="${name}"]`))?.classList.add('active');
    this.saveSettings();
  },

  applyBubbleStyles() {
    const root = document.documentElement;
    const bg = document.getElementById('set-user-bg')?.value;
    const radius = document.getElementById('set-user-radius')?.value;
    const uFont = document.getElementById('set-user-font')?.value;
    const aFont = document.getElementById('set-aria-font')?.value;
    if (bg) root.style.setProperty('--user-bg', bg);
    if (radius) root.style.setProperty('--user-radius', radius + 'px');
    if (uFont) root.style.setProperty('--user-font', uFont + 'px');
    if (aFont) root.style.setProperty('--aria-font', aFont + 'px');
    this.showTimestamps = document.getElementById('set-timestamps')?.checked ?? true;
    this.showAvatars = document.getElementById('set-avatars')?.checked ?? true;
    this.ariaAlign = document.getElementById('set-aria-align')?.value || 'left';
  },

  collectSettings() {
    const rate = document.getElementById('set-tts-rate')?.value ?? 0;
    return {
      theme: this.theme,
      opacity: (document.getElementById('set-opacity')?.value ?? 100) / 100,
      reduced_motion: document.getElementById('set-reduced-motion')?.checked ?? false,
      liquid_glass: document.getElementById('set-liquid-glass')?.checked ?? true,
      user_bubble_bg: document.getElementById('set-user-bg')?.value,
      user_bubble_radius: document.getElementById('set-user-radius')?.value,
      user_bubble_font: document.getElementById('set-user-font')?.value,
      aria_bubble_font: document.getElementById('set-aria-font')?.value,
      show_timestamps: document.getElementById('set-timestamps')?.checked,
      show_avatars: document.getElementById('set-avatars')?.checked,
      aria_align: document.getElementById('set-aria-align')?.value,
      tts_voice: document.getElementById('set-voice')?.value,
      tts_rate: (rate >= 0 ? '+' : '') + rate + '%',
      tts_volume: +(document.getElementById('set-tts-vol')?.value ?? 90),
      tts_enabled: document.getElementById('set-tts-enabled')?.checked ?? false,
      sounds_enabled: document.getElementById('set-sounds')?.checked,
      assistant_name: document.getElementById('set-name')?.value?.trim(),
      response_length: document.querySelector('input[name=response-len]:checked')?.value ?? 'normal',
      memory_enabled: document.getElementById('set-memory')?.checked,
      model_fast: document.getElementById('set-model-fast')?.value,
      model_heavy: document.getElementById('set-model-heavy')?.value,
      model_code: document.getElementById('set-model-code')?.value,
      auto_routing: document.getElementById('set-auto-route')?.checked,
      silence_threshold: document.getElementById('set-silence-th')?.value,
      silence_duration: document.getElementById('set-silence-dur')?.value,
      auto_mic: document.getElementById('set-auto-mic')?.checked,
      always_on_top: document.getElementById('set-always-top')?.checked,
      device_mode: this.currentDevice,
    };
  },

  saveSettings() {
    this.applyBubbleStyles();
    const s = this.collectSettings();
    if (s.assistant_name) {
      document.getElementById('assistant-name').textContent = s.assistant_name;
      document.getElementById('header-title').textContent = s.assistant_name;
    }
    document.body.style.opacity = s.opacity;
    this.reducedMotion = s.reduced_motion;
    document.body.classList.toggle('reduced-motion', this.reducedMotion);
    document.body.classList.toggle('no-glass', !s.liquid_glass);
    this.api('save_settings', JSON.stringify(s));
    this.api('set_voice', s.tts_voice);
    this.api('set_tts_rate', s.tts_rate);
    this.api('set_tts_volume', s.tts_volume);
    this.api('set_tts_enabled', !!s.tts_enabled);
  },

  onTtsToggle(enabled) {
    if (window.pywebview?.api) {
      window.pywebview.api.set_tts_enabled(enabled);
    }
    this.showToast(enabled ? '🔊 Parole activée' : '🔇 Parole désactivée', 'info');
    this.saveSettings();
  },

  loadSettings() {
    const p = this.api('load_settings');
    if (!p?.then) return;
    p.then(raw => {
      try {
        const d = JSON.parse(raw || '{}');
        if (d.theme) this.setTheme(d.theme);
        if (d.opacity != null) {
          document.getElementById('set-opacity').value = Math.round(d.opacity * 100);
          document.body.style.opacity = d.opacity;
        }
        if (d.reduced_motion != null) {
          document.getElementById('set-reduced-motion').checked = d.reduced_motion;
          this.reducedMotion = d.reduced_motion;
          document.body.classList.toggle('reduced-motion', d.reduced_motion);
        }
        if (d.liquid_glass != null) {
          const g = document.getElementById('set-liquid-glass');
          if (g) g.checked = d.liquid_glass;
          document.body.classList.toggle('no-glass', !d.liquid_glass);
        }
        const fields = [
          ['user_bubble_bg','set-user-bg'], ['user_bubble_radius','set-user-radius'],
          ['user_bubble_font','set-user-font'], ['aria_bubble_font','set-aria-font'],
          ['tts_voice','set-voice'], ['tts_volume','set-tts-vol','number'],
          ['assistant_name','set-name'], ['model_fast','set-model-fast'],
          ['model_heavy','set-model-heavy'], ['model_code','set-model-code'],
          ['silence_threshold','set-silence-th'], ['silence_duration','set-silence-dur'],
          ['aria_align','set-aria-align'],
        ];
        fields.forEach(([k, id]) => { if (d[k] != null) { const el = document.getElementById(id); if (el) el.value = d[k]; } });
        if (d.tts_rate) { const m = String(d.tts_rate).match(/(-?\d+)/); if (m) document.getElementById('set-tts-rate').value = m[1]; }
        if (d.tts_enabled != null) {
          document.getElementById('set-tts-enabled').checked = d.tts_enabled;
          if (window.pywebview?.api) window.pywebview.api.set_tts_enabled(d.tts_enabled);
        }
        if (d.response_length) {
          const r = document.querySelector(`input[name=response-len][value="${d.response_length}"]`);
          if (r) r.checked = true;
        }
        [['show_timestamps','set-timestamps'],['show_avatars','set-avatars'],['sounds_enabled','set-sounds'],
         ['memory_enabled','set-memory'],['auto_routing','set-auto-route'],['auto_mic','set-auto-mic'],
         ['always_on_top','set-always-top']].forEach(([k,id]) => {
          if (d[k] != null) { const el = document.getElementById(id); if (el) el.checked = d[k]; }
        });
        if (d.assistant_name) {
          document.getElementById('assistant-name').textContent = d.assistant_name;
          document.getElementById('header-title').textContent = d.assistant_name;
        }
        if (d.device_mode) this.setDevice(d.device_mode, true);
        this.applyBubbleStyles();
      } catch (e) {}
    });
  },

  mergePresets(custom) {
    const m = {};
    this.presetKeys.forEach(k => { m[k] = { ...this.defaultPresets[k], ...(custom[k] || {}) }; });
    return m;
  },

  renderPresetSidebar(merged) {
    const list = document.getElementById('presets-list');
    list.innerHTML = '';
    this.presetKeys.forEach(k => {
      const p = merged[k];
      const row = document.createElement('div');
      row.className = 'preset-row';
      row.textContent = `${p.icon} ${p.label}`;
      row.onclick = e => this.activatePreset(k, `${p.icon} ${p.label}`, e);
      list.appendChild(row);
    });
  },

  loadPresets() {
    const p = this.api('get_presets');
    const done = async custom => {
      this.presetsCustom = custom || {};
      const merged = this.mergePresets(this.presetsCustom);
      this.renderPresetSidebar(merged);
      await this.renderPresetEditors(merged);
    };
    if (p?.then) p.then(r => { try { done(JSON.parse(r || '{}')); } catch { done({}); } });
    else done({});
  },

  readPresetForm(key) {
    return {
      label: document.getElementById(`pre-${key}-label`)?.value?.trim(),
      icon: document.getElementById(`pre-${key}-icon`)?.value?.trim(),
      apps_open: this._appLists[`open-${key}`]?.selected || [],
      apps_close: this._appLists[`close-${key}`]?.selected || [],
      volume: parseInt(document.getElementById(`pre-${key}-vol`)?.value, 10),
      brightness: parseInt(document.getElementById(`pre-${key}-bri`)?.value, 10),
    };
  },

  savePreset(key) {
    const data = this.readPresetForm(key);
    this.api('save_settings', JSON.stringify({ presets: { [key]: data } }));
    this.presetsCustom[key] = { ...(this.presetsCustom[key] || {}), ...data };
    const merged = this.mergePresets(this.presetsCustom);
    this.renderPresetSidebar(merged);
    this.showToast(`Preset « ${data.label || key} » enregistré`, 'success');
  },

  csvToList(s) { return String(s || '').split(',').map(x => x.trim()).filter(Boolean); },
  listToCsv(a) { return Array.isArray(a) ? a.join(', ') : ''; },

  async checkNexusStatus() {
    let raw = this.api('check_nexus');
    if (raw?.then) raw = await raw;
    const status = JSON.parse(raw || '{}');
    const el = document.getElementById('nexus-status');
    if (!el) return;
    if (status.enabled && status.available) {
      el.textContent = '✓ Connecté';
      el.style.color = 'var(--success)';
    } else if (status.enabled) {
      el.textContent = '✗ Inaccessible';
      el.style.color = 'var(--error)';
    } else {
      el.textContent = 'Non activé';
      el.style.color = 'var(--text3)';
    }
  },

  async refreshInstalledApps() {
    try {
      let raw = this.api('refresh_installed_apps');
      if (raw?.then) raw = await raw;
      JSON.parse(raw || '[]');
      this.showToast('Liste des apps mise à jour', 'success');
      const merged = this.mergePresets(this.presetsCustom);
      await this.renderPresetEditors(merged);
    } catch (e) {
      this.showToast('Erreur scan apps', 'error');
    }
  },

  filterAppList(listId, query) {
    const resultsDiv = document.getElementById(`results-${listId}`);
    if (!query.trim()) {
      resultsDiv.innerHTML = '';
      resultsDiv.style.display = 'none';
      return;
    }

    const data = this._appLists[listId];
    const q = query.toLowerCase();
    const matches = data.all
      .filter(app => app.toLowerCase().includes(q) && !data.selected.includes(app))
      .slice(0, 8);

    resultsDiv.style.display = matches.length ? 'block' : 'none';
    resultsDiv.innerHTML = matches.map(app =>
