<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Liquid Glass iOS 26 — playground defaults */
      --glass-blur: 22px;
      --glass-saturate: 180%;
      --glass-alpha: 0.10;
      --glass-tint: 255,255,255;
      --glass-radius: 26px;
      --glass-rim: 0.55;
      --accent: #7B6CF6;
      --accent-2: #00D4FF;
      --text: #F4F6FF;
      --text-dim: rgba(244,246,255,0.62);

      /* Legacy aliases (JS / settings) */
      --bg: #0a0a18;
      --surface: rgba(255,255,255,0.06);
      --card: rgba(255,255,255,0.08);
      --hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255, calc(var(--glass-rim) * 0.2));
      --border2: rgba(255,255,255, calc(var(--glass-rim) * 0.34));
      --accent-bg: rgba(123,108,246,0.18);
      --accent-glow: rgba(0,212,255,0.35);
      --text2: var(--text-dim);
      --text3: rgba(244,246,255,0.42);
      --success: #34D399;
      --warning: #FBBF24;
      --error: #F87171;
      --user-bg: rgba(var(--glass-tint), calc(var(--glass-alpha) + 0.06));
      --user-radius: 18px;
      --user-font: 14px;
      --aria-font: 14px;
      --code-bg: rgba(0,0,0,0.35);
      --radius: var(--glass-radius);
      --shadow-sm: 0 4px 14px rgba(0,0,0,0.22);
      --shadow-md: 0 10px 34px rgba(0,0,0,0.30);
      --shadow-lg: 0 18px 50px rgba(0,0,0,0.45);
      --surface-solid: rgba(10,10,24,0.88);
    }

    body.theme-warm { --accent:#F59E0B; --accent-bg:rgba(245,158,11,0.12); }
    body.theme-forest { --accent:#4ADE80; --accent-bg:rgba(74,222,128,0.12); }
    body.theme-rose { --accent:#F472B6; --accent-bg:rgba(244,114,182,0.12); }
    body.theme-mono { --accent:#ECECEC; --accent-bg:rgba(255,255,255,0.08); }
    body.theme-contrast { --accent:#fff; --accent-bg:rgba(255,255,255,0.15); --text:#fff; --text2:#ccc; --border:rgba(255,255,255,0.2); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      background: transparent;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Wallpaper (playground) ── */
    #wallpaper-layer {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    #wallpaper-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: background 0.5s;
    }
    #wallpaper-overlay { display: none; }

    .wp-mesh, .wp-mesh-animated {
      background:
        radial-gradient(at 18% 22%, #5b2bd6 0px, transparent 45%),
        radial-gradient(at 82% 18%, #00d4ff 0px, transparent 42%),
        radial-gradient(at 75% 82%, #ff3d8b 0px, transparent 45%),
        radial-gradient(at 22% 78%, #1c2bff 0px, transparent 45%),
        #0a0a18;
    }
    .wp-aurora {
      background:
        radial-gradient(at 30% 30%, #00ffa3 0px, transparent 40%),
        radial-gradient(at 70% 35%, #00a3ff 0px, transparent 45%),
        radial-gradient(at 50% 80%, #7b2bff 0px, transparent 50%),
        #04060f;
    }
    .wp-sunset {
      background:
        radial-gradient(at 25% 80%, #ff7a18 0px, transparent 45%),
        radial-gradient(at 80% 70%, #ff2d7e 0px, transparent 45%),
        radial-gradient(at 60% 15%, #5b2bd6 0px, transparent 50%),
        #160820;
    }
    .wp-dark, .wp-mono, .wp-midnight { background: #0b0b12; }
    .wp-photo, .wp-forest {
      background: linear-gradient(135deg, #1f2937, #0f172a 40%, #312e81 75%, #0f172a);
    }
    .wp-mesh-animated {
      background-size: 200% 200%;
      animation: meshShift 30s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0%   { background-position: 0% 0%, 100% 0%, 50% 100%, 30% 70%; }
      100% { background-position: 30% 20%, 70% 30%, 60% 80%, 10% 90%; }
    }

    /* ── Liquid Glass material (playground iOS 26) ── */
    .glass {
      position: relative;
      background: rgba(var(--glass-tint), var(--glass-alpha));
      backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) brightness(1.08);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) brightness(1.08);
      border: 1px solid rgba(255,255,255, calc(var(--glass-rim) * 0.34));
      border-radius: var(--glass-radius);
      box-shadow:
        inset 0 1px 0 0 rgba(255,255,255, calc(var(--glass-rim) * 0.9)),
        inset 0 -1px 1px 0 rgba(0,0,0,0.18),
        inset 0 0 22px 0 rgba(255,255,255, calc(var(--glass-rim) * 0.07)),
        0 10px 34px rgba(0,0,0,0.30);
      overflow: hidden;
    }
    /* Header : laisser le menu modèles dépasser (sinon invisible) */
    #header.glass,
    #header .header-left,
    .model-picker {
      overflow: visible;
    }
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(135deg,
        rgba(255,255,255, calc(var(--glass-rim) * 0.22)) 0%,
        rgba(255,255,255,0) 42%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255, calc(var(--glass-rim) * 0.10)) 100%);
      mix-blend-mode: screen;
    }
    .ontop { position: relative; z-index: 1; }

    /* ── Stage layout (playground) ── */
    #app-stage.stage {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 22px;
      gap: 16px;
      min-height: 0;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      flex-shrink: 0;
    }
    .topbar-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      background: radial-gradient(circle at 35% 30%, var(--accent-2), var(--accent));
      box-shadow: 0 0 18px var(--accent-2);
    }
    .topbar-brand .brand {
      font-weight: 600;
      letter-spacing: 4px;
      font-size: 15px;
    }
    .topbar-brand .sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .spacer { flex: 1; }
    .pill {
      padding: 7px 13px;
      border-radius: 14px;
      font-size: 12px;
      white-space: nowrap;
    }
    .body-row {
      flex: 1;
      display: flex;
      gap: 16px;
      min-height: 0;
    }
    .dock {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 12px;
      flex-shrink: 0;
    }
    .gbtn {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s;
      border: none;
      color: var(--text);
      font-family: inherit;
    }
    .gbtn:hover { transform: translateY(-3px) scale(1.05); }
    .gbtn.active { color: var(--accent-2); }
    .wallpaper-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .wp-thumb { height: 60px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
    .wp-thumb:hover, .wp-thumb.active { border-color: var(--accent); }

    /* Scrollbars premium (fines, discrètes) */
    *::-webkit-scrollbar { width: 9px; height: 9px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; }

    ::selection { background: var(--accent-glow); color: #fff; }

    body.reduced-motion * { animation: none !important; transition: none !important; }

    /* ===== Liquid Glass (iOS 26/27) — activable/désactivable ===== */
    body.no-glass *, body.no-glass *::before, body.no-glass *::after {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    body.no-glass #sidebar, body.no-glass #header,
    body.no-glass #chat-column, body.no-glass #input-zone,
    body.no-glass #dock, body.no-glass #settings-panel {
      background: var(--surface-solid) !important;
      background-image: none !important;
    }
    body.no-glass .glass::before { display: none; }

    .glass-btn {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      transition: all 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .glass-btn:hover {
      background: rgba(255,255,255,0.14);
      transform: scale(1.03);
    }
    .glass-btn:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.18);
    }

    /* ===== Hover « touches » — micro-interactions Liquid Glass (spring) ===== */
    .hbtn { position: relative; overflow: hidden; }
    .hbtn, #send-btn, .file-btn, .theme-swatch, #presets-list > * {
      transition: transform .26s cubic-bezier(0.34, 1.45, 0.5, 1),
                  filter .22s ease, box-shadow .22s ease,
                  background .2s ease, border-color .2s ease, color .2s ease;
    }
    /* Boutons d'en-tête : soulèvement + halo accent + balayage de lumière */
    .hbtn:hover {
      transform: translateY(-2px) scale(1.06);
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45)) drop-shadow(0 0 11px var(--accent-glow));
    }
    .hbtn:active { transform: scale(0.93); transition-duration: .08s; }
    .hbtn::after {
      content: ""; position: absolute; top: 0; left: -80%;
      width: 55%; height: 100%; pointer-events: none; opacity: 0;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.50), transparent);
      transform: skewX(-18deg);
    }
    .hbtn:hover::after { animation: glassSheen .75s ease forwards; }
    @keyframes glassSheen {
      0%   { left: -80%; opacity: 0; }
      18%  { opacity: .9; }
      100% { left: 135%; opacity: 0; }
    }
    /* Bouton d'envoi : pop élastique + halo */
    #send-btn:hover {
      transform: translateY(-1px) scale(1.09);
      filter: brightness(1.1) saturate(1.1) drop-shadow(0 0 14px var(--accent-glow));
    }
    #send-btn:active { transform: scale(0.9); transition-duration: .08s; }
    .file-btn:hover { transform: translateY(-1px) scale(1.12); color: var(--accent); }
    /* Items de navigation / modes : glissement + teinte */
    .nav-item, #presets-list > *, .conv-item {
      transition: background .15s, color .15s,
                  transform .24s cubic-bezier(0.34, 1.4, 0.5, 1);
    }
    .nav-item:hover, #presets-list > *:hover, .conv-item:hover { transform: translateX(4px); }
    .nav-item:active, #presets-list > *:active { transform: translateX(2px) scale(0.99); }
    /* Échantillons de thème : pop lumineux */
    .theme-swatch:hover {
      transform: translateY(-2px) scale(1.07);
      box-shadow: 0 8px 22px rgba(0,0,0,0.45), 0 0 0 2px rgba(255,255,255,0.18);
    }
    .theme-swatch:active { transform: scale(0.95); }

    /* ── Sidebar panel ── */
    #sidebar {
      width: 236px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
      min-height: 0;
      border-right: none;
      background: rgba(18, 18, 26, 0.6);
      backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    }
    #sidebar > .ontop {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-brand { display: none; }

    #orb-canvas { display: none; }

    /* ── Logo JARVIS (v14) ── */
    #aria-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 8px rgba(108,142,255,0.3));
      flex-shrink: 0;
    }
    .logo-arc-1 { transform-origin: 32px 32px; animation: logoRotate 12s linear infinite; }
    .logo-arc-2 { transform-origin: 32px 32px; animation: logoRotate 8s linear infinite reverse; }
    .logo-arc-3 { transform-origin: 32px 32px; animation: logoRotate 5s linear infinite; }
    @keyframes logoRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .logo-core { animation: logoPulse 3s ease-in-out infinite; transform-origin: 32px 32px; }
    @keyframes logoPulse { 0%,100% { opacity:0.85; transform:scale(1); } 50% { opacity:1; transform:scale(1.08); } }
    .logo-scan { transform-origin: 32px 32px; animation: logoScan 6s linear infinite; opacity:0.8; }
    @keyframes logoScan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .tick { stroke: rgba(108,142,255,0.25); stroke-width:1.5; stroke-linecap:round; animation: tickGlow 4s ease-in-out infinite; animation-delay: calc(var(--i) * 0.3s); }
    @keyframes tickGlow { 0%,80%,100% { stroke: rgba(108,142,255,0.15); } 10% { stroke: rgba(108,142,255,0.8); } }
    .logo-listening .logo-arc-1 { animation-duration: 4s; }
    .logo-listening .logo-arc-2 { animation-duration: 3s; }
    .logo-listening .logo-arc-3 { animation-duration: 2s; }
    .logo-listening { filter: drop-shadow(0 0 12px rgba(0,212,255,0.45)) !important; }
    .logo-thinking .logo-arc-1 { animation-duration: 2s; }
    .logo-thinking .logo-arc-2 { animation-duration: 1.6s; animation-direction: normal; }
    .logo-thinking .logo-arc-3 { animation-duration: 1.2s; }
    .logo-thinking { filter: drop-shadow(0 0 14px rgba(167,139,250,0.5)) !important; }
    .logo-speaking .logo-core { animation: logoPulseFast 0.6s ease-in-out infinite; fill: #4ADE80; }
    @keyframes logoPulseFast { 0%,100% { opacity:0.8; transform:scale(1); } 50% { opacity:1; transform:scale(1.15); } }
    .logo-speaking { filter: drop-shadow(0 0 14px rgba(74,222,128,0.45)) !important; }

    .mic-emphasized {
      animation: micEmphasize 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(108,142,255,0.4) !important;
    }
    @keyframes micEmphasize {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108,142,255,0.3); transform: scale(1); }
      50%      { box-shadow: 0 0 0 8px rgba(108,142,255,0); transform: scale(1.04); }
    }

    #mode-select-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
    }

    .sidebar-sep {
      height: 1px;
      background: var(--border);
      margin: 0 12px 8px;
    }

    .sidebar-nav {
      padding: 0 8px;
      flex: 1;
      overflow-y: auto;
    }

    .nav-item {
      padding: 9px 11px;
      border-radius: 13px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(var(--glass-tint), calc(var(--glass-alpha) + 0.08));
      color: var(--text);
      border: 1px solid rgba(255,255,255, calc(var(--glass-rim) * 0.3));
    }

    .nav-item.active { color: var(--text); }

    .conv-item { padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background 0.15s; }
    .conv-item:hover { background:var(--hover); }
    .conv-title { font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .conv-meta { font-size:10px;color:var(--text3);margin-top:2px; }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-val { font-size: 16px; font-weight: 600; color: var(--accent); }
    .stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .sidebar-section-label, .panel h3 {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      padding: 8px 0 4px;
    }

    .navrow, .preset-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 11px;
      border-radius: 13px;
      font-size: 13px;
      color: var(--text-dim);
      width: 100%;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 2px;
      border: 1px solid transparent;
      background: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .nav-item:hover, .navrow:hover, .preset-row:hover {
      color: var(--text);
      background: rgba(var(--glass-tint), calc(var(--glass-alpha) + 0.04));
    }
    .nav-item.active, .navrow.active, .preset-row.active {
      background: rgba(var(--glass-tint), calc(var(--glass-alpha) + 0.08));
      border: 1px solid rgba(255,255,255, calc(var(--glass-rim) * 0.3));
      color: var(--text);
    }
    .nav-dot, .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 12px 16px 16px;
      border-top: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-footer button {
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 18px;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-footer button:hover { background: var(--hover); color: var(--text); }

    .sidebar-version {
      font-size: 11px;
      color: var(--text3);
    }

    .body-row #main {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: transparent;
    }

    #header {
      height: auto;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      flex-shrink: 0;
      border-bottom: none;
      background: transparent;
      backdrop-filter: none;
      box-shadow: 0 1px 20px rgba(0,0,0,0.08);
      z-index: 5;
    }

    #header-title, #assistant-name {
      font-weight: 600;
      letter-spacing: 4px;
      font-size: 15px;
      color: var(--text);
      text-align: left;
    }

    #status-text {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .header-left { display: flex; align-items: center; gap: 8px; }

    #header .header-actions .hbtn,
    #header #mic-btn,
    #header #device-toggle,
    #header #stop-btn { display: none; }

    .model-picker {
      position: relative;
    }

    .model-picker-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text2);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .model-picker-btn:hover,
    .model-picker.open .model-picker-btn {
      background: var(--hover);
      border-color: var(--border2);
      color: var(--text);
    }

    .model-picker-chevron {
      font-size: 10px;
      opacity: 0.7;
    }

    .model-picker-menu {
      display: none;
      position: fixed;
      min-width: 280px;
      max-width: min(360px, 90vw);
      max-height: min(420px, 60vh);
      overflow-y: auto;
      background: rgba(18, 18, 28, 0.96);
      backdrop-filter: blur(calc(var(--glass-blur) + 8px)) saturate(var(--glass-saturate));
      -webkit-backdrop-filter: blur(calc(var(--glass-blur) + 8px)) saturate(var(--glass-saturate));
      border: 1px solid rgba(255,255,255, calc(var(--glass-rim) * 0.34));
      border-radius: calc(var(--glass-radius) - 4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
      z-index: 20000;
      padding: 8px;
    }

    .model-picker.open .model-picker-menu {
      display: block;
    }

    .model-option {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }

    .model-option:hover {
      background: var(--hover);
    }

    .model-option.active {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .model-option-sub {
      font-size: 11px;
      color: var(--text3);
    }

    .model-option.active .model-option-sub {
      color: var(--accent-2);
      opacity: 0.85;
    }

    /* Cartes de résultats de recherche (spec v20) */
    .search-results-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 10px;
      font-size: 13px;
    }

    .search-source-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .badge-web { background: rgba(108,142,255,0.15); color: #6C8EFF; }
    .badge-wikipedia { background: rgba(74,222,128,0.15); color: #4ADE80; }
    .badge-youtube { background: rgba(239,68,68,0.15); color: #F87171; }
    .badge-news { background: rgba(245,158,11,0.15); color: #F59E0B; }

    .search-result-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .search-result-item:last-child { border-bottom: none; }

    .search-result-title {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 3px;
    }

    .search-result-snippet {
      font-size: 11px;
      color: var(--text3);
      line-height: 1.5;
    }

    .search-result-url {
      font-size: 10px;
      color: var(--accent);
      margin-top: 3px;
      cursor: pointer;
      text-decoration: none;
    }

    .gdoc-link-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 12px;
      margin-top: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .gdoc-link-card:hover { background: rgba(74,222,128,0.14); }
    .gdoc-link-icon { font-size: 20px; }
    .gdoc-link-text { font-size: 13px; color: var(--text); }
    .gdoc-link-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* Bulle de réflexion (thinking) */
    .thinking-wrap {
      align-self: flex-start;
      opacity: 0.95;
    }

    .thinking-content {
      background: rgba(255,255,255,0.04);
      border-radius: 4px 18px 18px 18px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 280px;
    }

    .model-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.3px;
      opacity: 0.7;
    }

    .action-log {
      font-size: 11px;
      color: var(--accent);
      opacity: 0.8;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.2s;
    }

    .action-log::before {
      content: '⟳';
      display: inline-block;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .action-flash { opacity: 1 !important; }

    .thinking-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      height: 16px;
    }

    .thinking-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(108,142,255,0.5);
      animation: thinkDot 1.4s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes thinkDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    .bubble-wrap-outer {
      display: flex;
      flex-direction: column;
      align-self: flex-start;
      max-width: 74%;
    }

    .bubble-wrap-outer.center { align-self: center; }

    .model-badge {
      font-size: 10px;
      color: var(--text3);
      margin-left: 34px;
      margin-bottom: 3px;
      opacity: 0.6;
      letter-spacing: 0.2px;
    }

    .bubble-wrap-outer.no-avatar .model-badge {
      margin-left: 4px;
    }

    .hbtn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255,255,255,0.12);
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 0;
    }

    #mic-btn.listening, #input-mic-btn.listening {
      background: rgba(108,142,255,0.25);
      color: var(--accent);
      box-shadow: 0 0 0 0 rgba(108,142,255,0.4);
      animation: glassPulse 2s ease-in-out infinite;
    }
    @keyframes glassPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108,142,255,0.3); }
      50%      { box-shadow: 0 0 0 12px rgba(108,142,255,0); }
    }
    #mic-btn.speaking, #input-mic-btn.speaking {
      background: rgba(74,222,128,0.25);
      border-color: rgba(74,222,128,0.4);
      color: var(--success);
    }

    /* Orbe micro réactif (zone input) */
    #mic-orb-container {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .mic-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(108,142,255,0.4);
      opacity: 0;
      transform: scale(1);
      transition: none;
      pointer-events: none;
    }

    #input-mic-btn {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text3);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, color 0.3s;
      padding: 0;
    }

    #input-mic-btn:hover { color: var(--text); background: rgba(255,255,255,0.14); }
    #input-mic-btn.active { color: var(--accent); background: var(--accent-bg); }

    #input-mic-btn.mic-idle,
    #mic-btn.mic-idle {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.1);
    }

    #input-mic-btn.mic-listening,
    #mic-btn.mic-listening {
      background: rgba(108,142,255,0.15);
      border-color: rgba(108,142,255,0.4);
      box-shadow: 0 0 0 0 rgba(108,142,255,0.3);
      color: var(--accent);
      animation: micIdlePulse 2.5s ease-in-out infinite;
    }

    #input-mic-btn.mic-speaking-detected,
    #mic-btn.mic-speaking-detected {
      background: rgba(74,222,128,0.15);
      border-color: rgba(74,222,128,0.5);
      box-shadow: 0 0 12px rgba(74,222,128,0.3);
      color: var(--success);
      animation: none;
    }

    @keyframes micIdlePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108,142,255,0.2); }
      50%       { box-shadow: 0 0 0 6px rgba(108,142,255,0); }
    }

    @keyframes ringExpand {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .mic-ring.ring-active {
      animation: ringExpand 0.6s ease-out forwards;
    }

    .hbtn:hover { background: var(--hover); border-color: var(--border2); color: var(--text); }
    .hbtn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

    #stop-btn {
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(248,113,113,0.15);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    #chat-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
      min-height: 0;
      max-width: none;
      width: 100%;
      margin: 0;
      padding: 18px;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px 20px;
      min-height: 0;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text3);
      margin: auto;
      padding: 40px 0;
    }

    #empty-state.hidden { display: none !important; }

    #empty-state .empty-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, var(--accent-2), var(--accent));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 0 18px var(--accent-2);
    }

    #empty-state .empty-title {
      font-size: 15px;
      color: var(--text2);
      font-weight: 500;
    }

    #empty-state .empty-sub {
      font-size: 13px;
      color: var(--text3);
    }

    /* ── Bubbles (playground) ── */
    .bubble-user {
      align-self: flex-end;
      max-width: 74%;
      padding: 14px 18px;
      border-radius: 18px 18px 4px 18px;
      font-size: var(--user-font);
      line-height: 1.45;
      animation: glassMorphIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      background: rgba(108,142,255,0.12);
      border: none;
      box-shadow: 0 2px 12px rgba(108,142,255,0.1);
      backdrop-filter: none;
    }

    .bubble-user.accent-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      box-shadow: 0 6px 22px rgba(0,0,0,0.25);
    }

    .bubble-aria-wrap {
      align-self: flex-start;
      max-width: 74%;
      display: flex;
      gap: 10px;
      animation: glassMorphIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    .bubble-aria-wrap.no-avatar .bubble-avatar { display: none; }

    .bubble-content {
      font-size: var(--aria-font);
      line-height: 1.45;
      color: var(--text);
      padding: 14px 18px;
      border-radius: 4px 18px 18px 18px;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(255,255,255,0.04);
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) brightness(1.08);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate)) brightness(1.08);
    }

    .bubble-avatar {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      border: 0.5px solid rgba(255,255,255,0.1);
    }
    .bubble-avatar svg { width: 20px; height: 20px; }

    .bubble-body { flex: 1; min-width: 0; }

    .bubble-user.center, .bubble-aria-wrap.center { align-self: center; }

    .bubble-content code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 13px;
    }

    .bubble-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 12px 0;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .bubble-time {
      font-size: 10px;
      color: var(--text3);
      margin-top: 8px;
    }

    .copy-btn {
      opacity: 0;
      transition: opacity 0.15s;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      margin-top: 8px;
      display: inline-block;
      font-family: inherit;
    }

    .bubble-aria-wrap:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); background: var(--hover); }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    /* ── Input zone ── */
    #input-bar {
      position: relative;
      background: transparent;
      padding: 0;
      max-width: none;
      margin: 0;
      width: 100%;
      flex-shrink: 0;
    }

    #input-zone {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 6px 6px 6px 16px;
      margin: 8px 16px 16px;
      box-shadow: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input-zone:focus-within {
      border-color: rgba(108,142,255,0.35);
      box-shadow: 0 0 0 3px rgba(108,142,255,0.08);
      transform: none;
    }

    #text-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 10px 4px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 38px;
      max-height: 200px;
      line-height: 1.5;
      box-shadow: none;
    }

    #text-input:focus {
      border: none;
      background: transparent;
      box-shadow: none;
    }

    #text-input::placeholder { color: var(--text3); }

    #send-btn {
      position: static;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 6px 22px rgba(0,0,0,0.25);
      transition: filter 0.15s, transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1), box-shadow 0.15s;
    }

    #send-btn:hover { filter: brightness(1.08); transform: scale(1.03); box-shadow: 0 6px 22px var(--accent-glow); }
    #send-btn:active { transform: scale(0.97); }

    #file-btn {
      position: static;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.1);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    #file-btn:hover { color: var(--accent); background: rgba(255,255,255,0.12); transform: scale(1.03); }

    /* ── Settings panel ── */
    #settings-panel {
      position: fixed;
      top: 0;
      right: -440px;
      width: 440px;
      height: 100vh;
      background: rgba(18,18,26, calc(var(--glass-alpha) + 0.08));
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-left: 0.5px solid rgba(255,255,255,0.1);
      box-shadow: -8px 0 40px rgba(0,0,0,0.3);
      z-index: 1000;
      transition: right 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      overflow-y: auto;
      padding: 20px;
    }

    #settings-panel.open { right: 0 !important; }

    .settings-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .settings-head h2 { font-size: 16px; font-weight: 600; }
    .settings-section { margin-bottom: 20px; padding-bottom: 0; border-bottom: none; }
    .settings-section:last-child { border-bottom: none; }
    .settings-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; padding: 6px 0; font-size: 13px; color: var(--text2); border-bottom: none; }
    .settings-accordion { margin-bottom: 8px; }
    .settings-accordion-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: rgba(255,255,255,0.04); border-radius: 10px;
      cursor: pointer; margin-bottom: 4px; font-size: 13px; font-weight: 500;
      color: var(--text2); transition: background 0.15s;
    }
    .settings-accordion-header:hover { background: rgba(255,255,255,0.07); }
    .settings-accordion-body { padding: 8px 14px 12px; overflow: hidden; transition: max-height 0.25s ease; }
    .settings-accordion-body.collapsed { max-height: 0; overflow: hidden; padding: 0 14px; }
    .setting-row input[type=range] { width: 120px; accent-color: var(--accent); }
    .setting-row select, .setting-row input[type=text], .setting-row input[type=color] {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
      color: var(--text); font-family: inherit; font-size: 12px; max-width: 160px;
    }
    .setting-row input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .theme-swatch { height: 32px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #fff; }
    .theme-swatch.active, .theme-swatch:hover { border-color: var(--text); }
    .settings-btn { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: inherit; font-size: 12px; cursor: pointer; margin-bottom: 6px; text-align: left; }
    .settings-btn:hover { background: var(--hover); }
    .preset-editor { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .preset-editor-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
    .preset-field { margin-bottom: 8px; }
    .preset-field label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 3px; }
    .preset-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: inherit; font-size: 12px; }
    .preset-save { width: 100%; margin-top: 6px; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,107,53,0.3); background: var(--accent-bg); color: var(--accent); font-family: inherit; font-size: 12px; cursor: pointer; font-weight: 500; }
    .app-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 0; }
    .app-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-bg); border: 1px solid rgba(108,142,255,0.25); color: var(--accent); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .chip-remove { cursor: pointer; opacity: 0.6; font-size: 10px; }
    .chip-remove:hover { opacity: 1; }
    .app-search { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: inherit; font-size: 12px; }
    .app-results { position: relative; max-height: 160px; overflow-y: auto; background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-top: 4px; display: none; }
    .app-result-item { padding: 8px 10px; font-size: 12px; cursor: pointer; color: var(--text2); }
    .app-result-item:hover { background: var(--hover); color: var(--text); }
    .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .radio-group label { font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }

    /* ── Modals & toasts ── */
    #quit-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #quit-modal.open { display: flex !important; }

    .modal-box {
      background: rgba(30,30,38,0.7);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      max-width: 300px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    .toast {
      background: rgba(40,40,50,0.5);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 11px 16px;
      font-size: 12px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: toastDropIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
      max-width: 320px;
    }

    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--error); }
    .toast.warning { border-left: 3px solid var(--warning); }
    .toast.info { border-left: 3px solid var(--accent); }

    #toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 2000;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes glassMorphIn {
      from { opacity: 0; transform: translateY(20px) scale(0.92); backdrop-filter: blur(0px); }
      to { opacity: 1; transform: translateY(0) scale(1); backdrop-filter: blur(16px); }
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes toastDropIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* === MOBILE LAYOUT === */
    body.mobile-mode {
      font-size: 16px;
    }

    body.mobile-mode #sidebar {
      display: none;
    }

    body.mobile-mode #main {
      width: 100%;
    }

    body.mobile-mode #header {
      height: 56px;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    body.mobile-mode #chat-messages {
      padding: 16px;

    body.mobile-mode .bubble-user {

    body.mobile-mode #input-bar {
      padding: 10px 0;

      background: linear-gradient(to top, rgba(11,11,13,0.9) 60%, transparent);

    }

    body.mobile-mode #input-zone {

    body.mobile-mode #send-btn {

    body.mobile-mode #active-images-indicator {

      font-size: 13px;
    }

    body.mobile-mode #mobile-nav {
      display: flex;
    }

    #mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);

    .mobile-nav-btn {

<script>
const aria = {
  _focusActive: false,
  _partialTranscription: false,
  status: 'idle',
  theme: 'slate',
  themes: ['slate','warm','forest','rose','mono','contrast'],
  themeColors: { slate:'#FF6B35', warm:'#F59E0B', forest:'#4ADE80', rose:'#F472B6', mono:'#ECECEC', contrast:'#ffffff' },
  settingsOpen: false,
  trainingInterval: null,
  rms: 0, displayRms: 0,
  orbR: 14, targetOrbR: 14,
  arcA: 0, arcB: 0,
  orbCtx: null,
  reducedMotion: false,
  showTimestamps: true,
  showAvatars: false,
  ariaAlign: 'left',
  weatherText: '',
  conversationMode: null,
  currentConversationId: null,
  ttsEnabledForSession: false,
  micManuallyPaused: false,
  _ttsFinishTimer: null,
  _micRestartCooldown: false,
  _vocalCountdownTimer: null,
  _originalTranscription: '',
  _countdownActive: false,
  _injectingSTT: false,
  _vocalCountdownListeners: null,
  _micRmsHistory: [],
  _lastRingTime: 0,
  _speechDetected: false,

  _isValidConversationMode(mode) {
    return mode === 'ecrit' || mode === 'vocal';
  },
  streamingCursor: null,
  currentWrap: null,
  currentOuter: null,
  currentContent: null,
  presetKeys: ['vol','etude','gaming','detente','nuit'],
  defaultPresets: {
    vol: { label:'Vol', icon:'✈', apps_open:['msfs'], apps_close:['discord','spotify'], volume:50 },
    etude: { label:'Étude', icon:'📚', apps_open:['cursor'], apps_close:['discord','steam','spotify'], volume:30 },
    gaming: { label:'Gaming', icon:'🎮', apps_open:['steam','discord'], apps_close:[], volume:80 },
    detente: { label:'Détente', icon:'🎵', apps_open:['spotify','discord'], apps_close:[], volume:60 },
    nuit: { label:'Nuit', icon:'🌙', apps_open:[], apps_close:['discord','steam','spotify','chrome'], volume:15, brightness:20 },
  },
  presetsCustom: {},
  wallpaperType: 'mesh-animated',
  wallpaperPath: '',
  wallpaperFilename: '',
  _staticPort: 8765,
  WALLPAPER_STATIC_PORT: 8765,
  glassIntensity: 60,
  currentDevice: 'pc',
  _modelPickerData: null,
  _initDone: false,
  _pinUnlocking: false,
  _pinUnlocked: false,
  _pinCorrect: '0000',
  _pinKeyHandler: null,

  async loadAppPin() {
    try {
      let raw = this.api('get_app_pin');
      if (raw?.then) raw = await raw;
      this._pinCorrect = String(raw || '0000').replace(/\D/g, '').padStart(4, '0').slice(-4);
    } catch (e) {
      this._pinCorrect = '0000';
    }
  },

  _updatePinDots() {
    const len = (window._pinBuffer || '').length;
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById(`dot-${i}`);
      if (dot) {
        dot.style.background = i < len ? 'var(--accent)' : 'transparent';
        dot.style.borderColor = i < len ? 'var(--accent)' : 'var(--border2)';
      }
    }
    const input = document.getElementById('pin-input');
    if (input && input.value !== window._pinBuffer) input.value = window._pinBuffer || '';
  },

  _teardownPinListeners() {
    if (this._pinKeyHandler) {
      document.removeEventListener('keydown', this._pinKeyHandler, true);
      this._pinKeyHandler = null;
    }
  },

  _validatePin(overlay) {
    if (window._pinBuffer === this._pinCorrect) {
      this._pinUnlocking = true;
      this._pinUnlocked = true;
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.3s';
      this._teardownPinListeners();
      setTimeout(() => {
        overlay.remove();
        const resolve = window._pinResolve;
        window._pinResolve = null;
        window._pinBuffer = '';
        this._pinUnlocking = false;
        if (resolve) resolve(true);
      }, 300);
      return;
    }
    const pinError = document.getElementById('pin-error');
    const pinDots = document.getElementById('pin-dots');
    if (pinError) pinError.textContent = 'Code incorrect';
    if (pinDots) {
      pinDots.style.animation = 'none';
      void pinDots.offsetWidth;
      pinDots.style.animation = 'shake 0.3s';
    }
    setTimeout(() => {
      window._pinBuffer = '';
      this._updatePinDots();
      const input = document.getElementById('pin-input');
      if (input) input.focus();
      if (pinError) pinError.textContent = '';
    }, 600);
  },

  pinPress(key) {
    const overlay = document.getElementById('pin-overlay');
    if (!overlay || this._pinUnlocking || this._pinUnlocked) return;

    if (key === 'back') {
      window._pinBuffer = (window._pinBuffer || '').slice(0, -1);
    } else if (/^\d$/.test(String(key)) && (window._pinBuffer || '').length < 4) {
      window._pinBuffer = (window._pinBuffer || '') + String(key);
    } else {
      return;
    }

    this._updatePinDots();
    if (window._pinBuffer.length === 4) {
      this._validatePin(overlay);
    }
  },

  async checkPin() {
    if (this._pinUnlocked) return;
    if (document.getElementById('pin-overlay')) {
      return new Promise(resolve => { window._pinResolve = resolve; });
    }

    await this.loadAppPin();

    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.id = 'pin-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px';
      overlay.innerHTML = `
        <div style="font-size:24px;font-weight:600;color:var(--text);letter-spacing:4px">A R I A</div>
        <div style="font-size:13px;color:var(--text3)">Entrez votre code PIN</div>
        <div id="pin-dots" style="display:flex;gap:12px;margin:4px 0">
          ${[0, 1, 2, 3].map(i => `<div id="dot-${i}" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all 0.15s"></div>`).join('')}
        </div>
        <input id="pin-input" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="one-time-code"
          placeholder="••••"
          aria-label="Code PIN à 4 chiffres"
          style="width:148px;padding:12px 16px;text-align:center;letter-spacing:12px;font-size:22px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;outline:none">
        <div id="pin-keypad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;margin-top:4px">
          ${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => `
            <button type="button" data-key="${n}" class="pin-key" style="padding:18px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;font-family:inherit">${n}</button>
          `).join('')}
          <button type="button" data-key="back" class="pin-key" aria-label="Effacer" style="padding:18px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text3);font-size:16px;cursor:pointer;font-family:inherit">⌫</button>
          <button type="button" data-key="0" class="pin-key" style="padding:18px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;font-family:inherit">0</button>
          <button type="button" data-key="clear" class="pin-key" aria-label="Tout effacer" style="padding:18px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text3);font-size:13px;cursor:pointer;font-family:inherit">C</button>
        </div>
        <div style="font-size:11px;color:var(--text3)">Clavier ou pavé numérique</div>
        <div id="pin-error" style="font-size:12px;color:var(--error);height:16px"></div>`;
      document.body.appendChild(overlay);

      window._pinResolve = resolve;
      window._pinBuffer = '';

      const keypad = overlay.querySelector('#pin-keypad');
      keypad.addEventListener('click', e => {
        const btn = e.target.closest('[data-key]');
        if (!btn) return;
        e.preventDefault();
        const k = btn.getAttribute('data-key');
        if (k === 'clear') {
          window._pinBuffer = '';
          this._updatePinDots();
          document.getElementById('pin-input')?.focus();
        } else {
          this.pinPress(k === 'back' ? 'back' : k);
        }
      });

      const input = overlay.querySelector('#pin-input');
      input.addEventListener('input', () => {
        window._pinBuffer = input.value.replace(/\D/g, '').slice(0, 4);
        input.value = window._pinBuffer;
        this._updatePinDots();
        if (window._pinBuffer.length === 4) this._validatePin(overlay);
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && window._pinBuffer.length === 4) {
          e.preventDefault();
          this._validatePin(overlay);
        }
      });

      this._pinKeyHandler = e => {
        if (!document.getElementById('pin-overlay') || this._pinUnlocking) return;
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (/^\d$/.test(e.key)) {
          e.preventDefault();
          this.pinPress(e.key);
          return;
        }
        if (e.key === 'Backspace' || e.key === 'Delete') {
          e.preventDefault();
          this.pinPress('back');
          return;
        }
        if (e.key === 'Enter' && window._pinBuffer.length === 4) {
          e.preventDefault();
          this._validatePin(overlay);
        }
      };
      document.addEventListener('keydown', this._pinKeyHandler, true);

      overlay.addEventListener('click', e => {
        if (e.target === overlay) input.focus();
      });
      setTimeout(() => input.focus(), 150);
    });
  },

  async init() {
    if (this._initDone) return;
    this._initDone = true;
    await this.checkPin();
    try {
      let port = this.api('get_static_port');
      if (port?.then) port = await port;
      this._staticPort = Number(port) || 8765;
      this.WALLPAPER_STATIC_PORT = this._staticPort;
    } catch (e) {
      this._staticPort = 8765;
      this.WALLPAPER_STATIC_PORT = 8765;
    }
    this.setGlassIntensity(60);
    this.orbCtx = document.getElementById('orb-canvas').getContext('2d');
    this.buildSettingsPanel();
    this.loadSettings();
    await this.restoreWallpaper();
    await this.loadWallpapers();
    this.detectDevice();
    this.loadPresets();
    this.loadConversations();
    await this.loadModelPicker();
    this.setStatus('idle');
    this._micActive = false;
    document.getElementById('mic-btn')?.classList.add('mic-idle');
    document.getElementById('mic-btn').textContent = '🎤';
    this.startClock();
    document.getElementById('text-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendText(); }
    });
    document.getElementById('text-input').addEventListener('input', e => {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
    });

    const chat = document.getElementById('chat-messages');
    chat.addEventListener('dragover', e => { e.preventDefault(); chat.style.background = 'rgba(255,107,53,0.05)'; });
    chat.addEventListener('dragleave', () => { chat.style.background = ''; });
    chat.addEventListener('drop', e => {
      e.preventDefault();
      chat.style.background = '';
      if (e.dataTransfer?.files?.length) this.handleFiles(e.dataTransfer.files);
    });

    document.addEventListener('paste', e => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) this.handleFiles([file]);
        }
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') this.stopSpeaking();
    });

    const sheet = document.getElementById('mobile-presets-sheet');
    if (sheet) {
      let startY = 0;
      sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
      sheet.addEventListener('touchend', e => {
        if (e.changedTouches[0].clientY - startY > 50) this.closeMobilePresets();
      });
    }
    document.addEventListener('click', e => {
      const picker = document.getElementById('model-picker');
      const menu = document.getElementById('model-picker-menu');
      const inPicker = picker?.contains(e.target) || menu?.contains(e.target);
      if (picker?.classList.contains('open') && !inPicker) {
        picker.classList.remove('open');
        this._restoreModelMenuHome();
      }
      const presetsSheet = document.getElementById('mobile-presets-sheet');
      if (presetsSheet?.classList.contains('open') && !presetsSheet.contains(e.target) &&
          !e.target.closest('.mobile-nav-btn')) {
        this.closeMobilePresets();
      }
    });
    window.addEventListener('resize', () => {
      if (document.getElementById('model-picker')?.classList.contains('open')) {
        this.positionModelMenu();
      }
    });

    requestAnimationFrame(() => this.drawOrb());
    this.loadConfigFlags();
    this.refreshFocusState();
    setInterval(() => this.refreshFocusState(), 15000);

    document.querySelectorAll('.mode-select-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.getAttribute('data-mode');
        if (mode) this.selectConversationMode(mode);
      });
    });

    await this.syncConversationModeOnStartup();
  },

  api(name, ...args) {
    const fn = window.pywebview?.api?.[name];
    return fn ? fn(...args) : null;
  },

  drawOrb() {
    if (!this.reducedMotion) {
      this.arcA += 0.013;
      this.arcB -= 0.008;
      const lvl = Math.min(1, this.rms > 1 ? this.rms / 1000 : this.rms * 10);
      this.displayRms += (lvl - this.displayRms) * 0.1;
      const active = ['listening','thinking','speaking','transcribing'].includes(this.status);
      this.targetOrbR = active ? 22 : 14 + this.displayRms * 6;
      this.orbR += (this.targetOrbR - this.orbR) * 0.12;
    }
    const ctx = this.orbCtx;
    const W = 200, H = 80, cx = W / 2, cy = 40;
    ctx.clearRect(0, 0, W, H);
    const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#6E7BF2';
    const rgb = this.hexRgb(accent);
    const t = Math.min(1, this.displayRms * 1.4);
    const r = Math.round(rgb.r + (255 - rgb.r) * t);
    const g = Math.round(rgb.g + (255 - rgb.g) * t);
    const b = Math.round(rgb.b + (255 - rgb.b) * t);
    const active = ['listening','thinking','speaking','transcribing'].includes(this.status);

    // Bloom externe doux
    const bloom = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
    bloom.addColorStop(0, `rgba(${r},${g},${b},${active ? 0.24 : 0.12})`);
    bloom.addColorStop(1, 'transparent');
    ctx.fillStyle = bloom;
    ctx.fillRect(0, 0, W, H);

    // Anneau fin et élégant
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.14)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Arc d'activité qui tourne lentement
    if (active) {
      ctx.beginPath();
      ctx.arc(cx, cy, 30, this.arcA, this.arcA + Math.PI * 0.55);
      ctx.strokeStyle = `rgba(${r},${g},${b},0.85)`;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Cœur lumineux avec léger reflet
    const core = ctx.createRadialGradient(cx - 3, cy - 4, 1, cx, cy, this.orbR);
    core.addColorStop(0, `rgba(${Math.min(255,r+34)},${Math.min(255,g+34)},${Math.min(255,b+44)},0.98)`);
    core.addColorStop(1, `rgba(${r},${g},${b},0.32)`);
    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(cx, cy, this.orbR, 0, Math.PI * 2);
    ctx.fill();

    requestAnimationFrame(() => this.drawOrb());
  },

  hexRgb(hex) {
    const h = hex.replace('#', '');
    if (h.length < 6) return { r: 110, g: 123, b: 242 };
    return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
  },

  show() { document.body.style.display = 'block'; },
  hide() { document.body.style.display = 'none'; },

  _formatBrandName(name) {
    const n = (name || 'ARIA').trim().toUpperCase().replace(/\s+/g, '');
    return n.split('').join(' ');
  },

  setStatus(state) {
    this.status = state;
    const labels = { idle:'Liquid Glass · prêt', inactive:'Liquid Glass · prêt', listening:'Écoute…', transcribing:'Transcription…', thinking:'Réflexion…', speaking:'ARIA parle…' };
    document.getElementById('status-text').textContent = labels[state] || 'Liquid Glass · prêt';

    const micLabels = { idle:'prêt', inactive:'prêt', listening:'actif', transcribing:'transcrit', thinking:'prêt', speaking:'parle' };
    const micLbl = document.getElementById('sidebar-mic-label');
    if (micLbl) micLbl.textContent = micLabels[state] || 'prêt';

    const dockMic = document.getElementById('dock-mic');
    if (dockMic) dockMic.classList.toggle('active', state === 'listening' || state === 'transcribing');

    const micStateMap = {
      idle: 'idle',
      inactive: 'idle',
      listening: 'listening',
      transcribing: 'transcribing',
      thinking: 'idle',
      speaking: 'idle',
    };
    this.setMicState(micStateMap[state] || 'idle');

    const logo = document.getElementById('aria-logo');
    if (logo) {
      logo.classList.remove('logo-idle', 'logo-listening', 'logo-thinking', 'logo-speaking');
      const map = { idle:'logo-idle', inactive:'logo-idle', listening:'logo-listening', transcribing:'logo-listening', thinking:'logo-thinking', speaking:'logo-speaking' };
      logo.classList.add(map[state] || 'logo-idle');
    }
    const stopBtn = document.getElementById('stop-btn');
    if (stopBtn) {
      stopBtn.style.display = ['speaking', 'thinking'].includes(state) ? 'inline-flex' : 'none';
    }
  },

  setMicState(state) {
    const inputBtn = document.getElementById('input-mic-btn');
    const headerBtn = document.getElementById('mic-btn');
    const dockBtn = document.getElementById('dock-mic');
    const buttons = [inputBtn, headerBtn, dockBtn].filter(Boolean);

    buttons.forEach(btn => {
      btn.classList.remove('mic-idle', 'mic-listening', 'mic-speaking-detected', 'active', 'listening', 'speaking');
      btn.style.transform = 'scale(1)';
    });

    this._micRmsHistory = [];
    this._speechDetected = false;

    const icons = { idle: '🎤', listening: '🎙', transcribing: '⏳', paused: '⏸️' };
    const dockIcons = { idle: '🎙', listening: '🎙', transcribing: '⏳', paused: '⏸️' };
    buttons.forEach(btn => {
      const isDock = btn.id === 'dock-mic';
      btn.textContent = isDock ? (dockIcons[state] || '🎙') : (icons[state] || '🎤');
    });

    if (state === 'listening') {
      buttons.forEach(btn => btn.classList.add('mic-listening'));
    } else {
      buttons.forEach(btn => btn.classList.add('mic-idle'));
    }
  },

  _triggerRing() {
    const rings = document.querySelectorAll('.mic-ring');
    rings.forEach((ring, i) => {
      ring.classList.remove('ring-active');
      setTimeout(() => {
        ring.style.animationDelay = `${i * 80}ms`;
        ring.classList.add('ring-active');
        setTimeout(() => ring.classList.remove('ring-active'), 700);
      }, 10);
    });
  },

  updateWaveform(rms) {
    this._micRmsHistory.push(rms);
    if (this._micRmsHistory.length > 8) this._micRmsHistory.shift();
    const smoothRms = this._micRmsHistory.reduce((a, b) => a + b, 0) / this._micRmsHistory.length;
    this.rms = smoothRms;

    const btn = document.getElementById('input-mic-btn');
    if (!btn) return;

    const SPEECH_THRESHOLD = 0.02;
    const isSpeaking = smoothRms > SPEECH_THRESHOLD;

    if (isSpeaking && !this._speechDetected) {
      this._speechDetected = true;
      btn.classList.remove('mic-idle', 'mic-listening');
      btn.classList.add('mic-speaking-detected');
      btn.textContent = '🎙️';
      const headerBtn = document.getElementById('mic-btn');
      if (headerBtn) {
        headerBtn.classList.remove('mic-idle', 'mic-listening');
        headerBtn.classList.add('mic-speaking-detected');
        headerBtn.textContent = '🎙️';
      }
    } else if (!isSpeaking && this._speechDetected) {
      this._speechDetected = false;
      btn.classList.remove('mic-speaking-detected');
      if (this.status === 'listening' || this.status === 'transcribing') {
        btn.classList.add('mic-listening');
      } else {
        btn.classList.add('mic-idle');
      }
      btn.textContent = this.status === 'transcribing' ? '⏳' : '🎤';
      const headerBtn = document.getElementById('mic-btn');
      if (headerBtn) {
        headerBtn.classList.remove('mic-speaking-detected');
        headerBtn.classList.add(this.status === 'listening' || this.status === 'transcribing' ? 'mic-listening' : 'mic-idle');
        headerBtn.textContent = this.status === 'transcribing' ? '⏳' : '🎤';
      }
    }

    const scale = isSpeaking ? 1 + Math.min(smoothRms * 3, 0.25) : 1;
    btn.style.transform = `scale(${scale.toFixed(3)})`;

    const now = Date.now();
    if (isSpeaking && smoothRms > 0.04 && now - this._lastRingTime > 400) {
      this._lastRingTime = now;
      this._triggerRing();
    }
  },

  logoAvatarHtml() {
    return `<svg viewBox="0 0 64 64" width="20" height="20" aria-hidden="true">
      <circle cx="32" cy="32" r="29" fill="none" stroke="#6C8EFF" stroke-width="1.5" stroke-dasharray="100 82"/>
      <circle cx="32" cy="32" r="17" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
      <circle cx="32" cy="32" r="9" fill="#6C8EFF"/>
      <path d="M32 26 L37 38 L34 38 L32.5 34 L31.5 34 L30 38 L27 38 Z" fill="rgba(12,12,15,0.9)"/>
    </svg>`;
  },

  setGlassIntensity(value) {
    const v = Math.max(0, Math.min(100, Number(value) || 60));
    const ratio = v / 60;
    document.documentElement.style.setProperty('--glass-blur', `${Math.round(22 * ratio)}px`);
    document.documentElement.style.setProperty('--glass-alpha', (0.10 * ratio).toFixed(3));
    document.documentElement.style.setProperty('--glass-saturate', `${Math.round(180 * ratio)}%`);
    document.documentElement.style.setProperty('--glass-rim', (0.55 * ratio).toFixed(2));
    document.documentElement.style.setProperty('--glass-radius', `${Math.round(26 * ratio)}px`);
    this.glassIntensity = v;
  },

  _wallpaperHttpUrl(filename) {
    const port = this._staticPort || this.WALLPAPER_STATIC_PORT || 8765;
    return `http://127.0.0.1:${port}/wallpapers/${encodeURIComponent(filename)}`;
  },

  _resolveCustomWallpaperUrl(s) {
    if (!s || s.wallpaper_type !== 'custom') return null;
    const filename = s.wallpaper_filename
      || (s.wallpaper_url || s.wallpaper_path || '').split('/').pop()?.split('?')[0];
    if (filename) return this._wallpaperHttpUrl(decodeURIComponent(filename));
    const raw = s.wallpaper_url || s.wallpaper_path;
    if (raw && raw.startsWith('http://')) return raw;
    return null;
  },

  setWallpaper(type, url = null, skipSave) {
    const layer = document.getElementById('wallpaper-image');
    if (!layer) return;

    layer.className = layer.className
      .split(' ')
      .filter(c => c && !c.startsWith('wp-'))
      .join(' ');

    if (type === 'custom' && url) {
      layer.style.background = '';
      layer.style.backgroundImage = `url("${url}")`;
      layer.style.backgroundSize = 'cover';
      layer.style.backgroundPosition = 'center';
      layer.style.backgroundRepeat = 'no-repeat';
    } else {
      layer.style.backgroundImage = '';
      layer.style.background = '';
      if (type) layer.classList.add(`wp-${type}`);
    }

    this.wallpaperType = type || 'mesh-animated';
    this.wallpaperPath = url || '';
    this.wallpaperFilename = (type === 'custom' && url)
      ? (url.split('/').pop()?.split('?')[0] || '')
      : '';

    document.querySelectorAll('.wp-thumb').forEach(t => {
      t.classList.toggle('active', type !== 'custom' && t.dataset.wp === this.wallpaperType);
    });

    if (!skipSave) this.saveSettings();
  },

  restoreWallpaper() {
    return new Promise(resolve => {
      const p = this.api('load_settings');
      if (!p?.then) { resolve(); return; }
      p.then(raw => {
        try {
          const s = JSON.parse(raw || '{}');
          if (!s.wallpaper_type) { resolve(); return; }

          if (s.wallpaper_type === 'custom') {
            const url = this._resolveCustomWallpaperUrl(s);
            if (url) {
              this.setWallpaper('custom', url, true);
              this.wallpaperFilename = s.wallpaper_filename
                || url.split('/').pop()?.split('?')[0]
                || '';
            }
          } else {
            this.setWallpaper(s.wallpaper_type, null, true);
          }
        } catch (e) {
          console.warn('restoreWallpaper', e);
        }
        resolve();
      }).catch(() => resolve());
    });
  },

  async loadWallpapers() {
    try {
      let raw = this.api('get_wallpapers');
      if (raw?.then) raw = await raw;
      const wallpapers = JSON.parse(raw || '[]');
      this.renderWallpaperGrid(wallpapers);
    } catch (e) {
      console.warn('loadWallpapers', e);
    }
  },

  renderWallpaperGrid(customWallpapers) {
    const grid = document.getElementById('wallpaper-custom-grid');
    if (!grid) return;

    grid.innerHTML = '';

    if (!customWallpapers.length) {
      grid.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px">Aucune image importée</div>';
      return;
    }

    customWallpapers.forEach(wp => {
      const item = document.createElement('div');
      item.className = 'wp-custom-item';
      item.style.cssText = 'position:relative;width:80px;height:56px;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s;flex-shrink:0';

      const img = document.createElement('img');
      img.src = wp.url;
      img.alt = wp.filename || 'wallpaper';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover';
      img.onclick = () => this.setWallpaper('custom', wp.url);

      if (wp.filename) {
        img.onerror = () => {
          img.src = this._wallpaperHttpUrl(wp.filename);
        };
      }

      const del = document.createElement('button');
      del.type = 'button';
      del.textContent = '✕';
      del.style.cssText = 'position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1';
      del.onclick = (e) => {
        e.stopPropagation();
        this.deleteWallpaper(wp.filename);
      };

      item.appendChild(img);
      item.appendChild(del);
      grid.appendChild(item);
    });
  },

  async uploadWallpaper(file) {
    if (!file) return;

    if (!file.type.startsWith('image/')) {
      this.showToast('Fichier non supporté — utilise une image (jpg, png, webp)', 'error');
      return;
    }

    this.showToast('Import en cours...', 'info');

    try {
      const b64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      let raw = this.api('save_wallpaper', b64, file.name);
      if (raw?.then) raw = await raw;
      const result = JSON.parse(raw || '{}');

      if (result.success) {
        this.showToast('Image importée ✓', 'success');
        if (result.port) {
          this._staticPort = result.port;
          this.WALLPAPER_STATIC_PORT = result.port;
        }
        this.setWallpaper('custom', result.url);
        this.wallpaperFilename = result.filename || '';
        if (!this.wallpaperFilename && result.url) {
          this.wallpaperFilename = result.url.split('/').pop()?.split('?')[0] || '';
        }
        this.saveSettings();
        await this.loadWallpapers();
      } else {
        this.showToast('Erreur import: ' + (result.error || 'inconnue'), 'error');
      }
    } catch (e) {
      this.showToast('Erreur import image', 'error');
      console.error('uploadWallpaper error:', e);
    }
  },

  async deleteWallpaper(filename) {
    try {
      let raw = this.api('delete_wallpaper', filename);
      if (raw?.then) raw = await raw;
      const result = JSON.parse(raw || '{}');
      if (result.success) {
        this.showToast('Image supprimée', 'success');
        if (this.wallpaperType === 'custom') {
          this.setWallpaper('midnight');
        }
        await this.loadWallpapers();
      } else {
        this.showToast(result.error || 'Suppression impossible', 'error');
      }
    } catch (e) {
      this.showToast('Erreur suppression image', 'error');
    }
  },

  updateEmpty() {
    const has = document.querySelectorAll('.bubble-user, .bubble-aria-wrap').length > 0;
    document.getElementById('empty-state').classList.toggle('hidden', has);
  },

  ts() {
    return this.showTimestamps ? new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : '';
  },

  addUserBubble(text) {
    this.finalizeMessage();
    const el = document.createElement('div');
    el.className = 'bubble-user' + (this.ariaAlign === 'center' ? ' center' : '');
    el.textContent = text;
    if (this.showTimestamps) {
      const t = document.createElement('div');
      t.className = 'bubble-time';
      t.textContent = this.ts();
      el.appendChild(t);
    }
    document.getElementById('chat-messages').appendChild(el);
    this.updateEmpty();
    this.scrollChat();
  },

  appendToken(token) {
    this.hideThinkingBubble();
    if (!this.currentWrap) {
      const outer = document.createElement('div');
      outer.className = 'bubble-wrap-outer' + (this.ariaAlign === 'center' ? ' center' : '') + (this.showAvatars ? '' : ' no-avatar');
      const wrap = document.createElement('div');
      wrap.className = 'bubble-aria-wrap' + (this.ariaAlign === 'center' ? ' center' : '') + (this.showAvatars ? '' : ' no-avatar');
      wrap.innerHTML = `
        <div class="bubble-avatar">${this.logoAvatarHtml()}</div>
        <div class="bubble-body">
          <div class="bubble-content"></div>
          <button type="button" class="copy-btn" onclick="aria.copyBubble(this)">Copier</button>
        </div>`;
      outer.appendChild(wrap);
      document.getElementById('chat-messages').appendChild(outer);
      this.currentOuter = outer;
      this.currentWrap = wrap;
      this.currentContent = wrap.querySelector('.bubble-content');
      this.streamingCursor = document.createElement('span');
      this.streamingCursor.className = 'cursor-blink';
      this.currentContent.appendChild(this.streamingCursor);
      this.updateEmpty();
    }
    this.streamingCursor?.insertAdjacentText('beforebegin', token);
    this.scrollChat();
  },

  finalizeMessage(modelName = '') {
    this.streamingCursor?.remove();
    if (modelName && this.currentWrap && this.currentOuter) {
      const badge = document.createElement('div');
      badge.className = 'model-badge';
      badge.textContent = `via ${modelName}`;
      this.currentOuter.insertBefore(badge, this.currentOuter.firstChild);
    } else if (modelName && this.currentWrap && !this.currentOuter) {
      const outer = document.createElement('div');
      outer.className = 'bubble-wrap-outer' + (this.ariaAlign === 'center' ? ' center' : '') + (this.showAvatars ? '' : ' no-avatar');
      const badge = document.createElement('div');
      badge.className = 'model-badge';
      badge.textContent = `via ${modelName}`;
      const parent = this.currentWrap.parentNode;
      parent.insertBefore(outer, this.currentWrap);
      outer.appendChild(badge);
      outer.appendChild(this.currentWrap);
      this.currentOuter = outer;
    }
    this.streamingCursor = null;
    this.currentWrap = null;
    this.currentContent = null;
    this.currentOuter = null;
  },

  finalizeAssistantMessage(modelName = '') {
    this.finalizeMessage(modelName);
  },

  showThinkingBubble(modelName = '', action = '') {

        <div class="action-log" id="thinking-action">${this.esc(action || 'Réflexion...')}</div>

  copyBubble(btn) {

    if (!text) return;
    const orig = btn.textContent;
    navigator.clipboard.writeText(text).then(() => {

      setTimeout(() => { btn.textContent = orig; }, 2000);

    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, duration);
