<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ARIA — Lancement</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#04080F;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}

/* Fond animé */
#bg{
  position:fixed;inset:0;z-index:0;
  background:#04080F;
}
#bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 60% at 50% 50%,rgba(8,18,65,0) 0%,rgba(4,8,20,0) 100%);
  animation:bgPulse 4s ease-in-out infinite;
}
@keyframes bgPulse{
  0%,100%{background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(8,18,80,0.6) 0%,transparent 70%),#04080F}
  50%{background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(12,25,110,0.8) 0%,transparent 70%),#04080F}
}

/* Particules */
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;
  background:rgba(108,142,255,0.7);
  animation:particleFly var(--dur) ease-in-out infinite;
  animation-delay:var(--delay);
  left:var(--x);top:var(--y);
  width:var(--size);height:var(--size);
}
@keyframes particleFly{
  0%{opacity:0;transform:translate(0,0) scale(0)}
  20%{opacity:1;transform:translate(var(--dx1),var(--dy1)) scale(1)}
  80%{opacity:0.5;transform:translate(var(--dx2),var(--dy2)) scale(0.6)}
  100%{opacity:0;transform:translate(var(--dx3),var(--dy3)) scale(0)}
}

/* Container principal */
#splash{
  position:relative;z-index:10;
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
}

/* ══ ORBE ══ */
#orbe-wrap{
  position:relative;
  width:260px;height:260px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  animation:orbeFadeIn 1s cubic-bezier(0.34,1.2,0.64,1) 0.3s forwards;
}
@keyframes orbeFadeIn{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(1)}
}

/* Halos */
.halo{position:absolute;border-radius:50%;pointer-events:none}
.h1{inset:-60px;background:radial-gradient(circle,rgba(40,80,220,0.08) 0%,transparent 60%)}
.h2{inset:-20px;background:radial-gradient(circle,rgba(80,130,255,0.12) 0%,transparent 55%)}
.h3{inset:10px;background:radial-gradient(circle,rgba(120,160,255,0.18) 0%,transparent 50%)}

/* Ticks */
.ticks{
  position:absolute;inset:-28px;border-radius:50%;
  border:1px solid rgba(140,175,255,0.15);
  animation:orbR 40s linear infinite;
}
.ticks2{
  position:absolute;inset:-18px;border-radius:50%;
  border:1px dotted rgba(120,155,255,0.20);
  animation:orbR 28s linear infinite reverse;
}

/* Anneaux */
.ring{position:absolute;border-radius:50%;pointer-events:none}
.r1{
  inset:20px;border:2px solid rgba(110,170,255,0.85);
  animation:orbR 7s linear infinite;
  box-shadow:0 0 12px rgba(90,160,255,0.4),0 0 25px rgba(70,140,255,0.2);
}
.r2{
  inset:8px;
  border-top:2.5px solid rgba(70,155,255,0.95);
  border-right:2.5px solid rgba(70,155,255,0.95);
  border-bottom:2px solid rgba(70,155,255,0.20);
  border-left:2px solid transparent;
  animation:orbR 5s linear infinite;
  box-shadow:0 0 16px rgba(50,140,255,0.5);
}
.r3{
  inset:8px;
  border-top:2px solid transparent;
  border-right:2.5px solid rgba(155,75,255,0.9);
  border-bottom:2px solid rgba(155,75,255,0.35);
  border-left:2px solid transparent;
  animation:orbR 9s linear infinite reverse;
  box-shadow:0 0 16px rgba(130,55,255,0.4);
}
.r4{inset:36px;border:1px dashed rgba(95,140,255,0.40);animation:orbR 14s linear infinite reverse}
.r5{
  inset:50px;border:1.5px solid rgba(170,200,255,0.70);
  animation:orbR 4.5s linear infinite;
  box-shadow:0 0 8px rgba(150,185,255,0.6);
}
@keyframes orbR{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Scans */
.scan{position:absolute;border-radius:50%;mix-blend-mode:screen;pointer-events:none}
.sc1{
  inset:8px;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(90,185,255,0.7) 11deg,rgba(90,185,255,0.3) 20deg,transparent 33deg);
  animation:orbR 2.2s linear infinite;
}
.sc2{
  inset:20px;
  background:conic-gradient(from 110deg,transparent 0deg,rgba(145,90,255,0.55) 11deg,rgba(145,90,255,0.20) 20deg,transparent 33deg);
  animation:orbR 3.5s linear infinite reverse;
}

/* Crosshair */
.cross{position:absolute;inset:18px;z-index:2;pointer-events:none}
.cross::before,.cross::after{
  content:'';position:absolute;
  background:linear-gradient(transparent 0%,rgba(70,185,255,0.42) 35%,rgba(70,185,255,0.42) 65%,transparent 100%);
}
.cross::before{left:50%;top:0;width:1px;height:100%;transform:translateX(-50%)}
.cross::after{top:50%;left:0;height:1px;width:100%;transform:translateY(-50%)}

/* Core avec logo */
.core{
  width:90px;height:90px;border-radius:50%;
  position:relative;z-index:3;
  overflow:hidden;
  box-shadow:
    0 0 25px rgba(110,170,255,1.0),
    0 0 55px rgba(85,150,255,0.75),
    0 0 95px rgba(60,120,240,0.45),
    0 0 150px rgba(40,90,220,0.22);
  animation:corePulse 3s ease-in-out infinite;
}
.core img{width:100%;height:100%;object-fit:cover}
@keyframes corePulse{
  0%,100%{box-shadow:0 0 25px rgba(110,170,255,1.0),0 0 55px rgba(85,150,255,0.75),0 0 95px rgba(60,120,240,0.45)}
  50%{box-shadow:0 0 35px rgba(110,170,255,1.0),0 0 75px rgba(85,150,255,0.9),0 0 125px rgba(60,120,240,0.6)}
}

/* ══ TEXTES ══ */
#title-wrap{
  text-align:center;
  margin-top:32px;
  opacity:0;
  animation:textFadeIn 0.8s ease 1.2s forwards;
}
@keyframes textFadeIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

#title{
  font-size:52px;font-weight:900;
  letter-spacing:8px;
  background:linear-gradient(135deg,#fff 0%,#a0c4ff 35%,#7b9fff 60%,#c084fc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
  filter:drop-shadow(0 0 30px rgba(108,142,255,0.5));
}

#subtitle{
  font-size:13px;font-weight:400;
  color:rgba(255,255,255,0.35);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:8px;
}

/* ══ BARRE DE CHARGEMENT ══ */
#loader-wrap{
  margin-top:48px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;
  animation:textFadeIn 0.6s ease 1.8s forwards;
}

#loader-track{
  width:220px;height:2px;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  overflow:hidden;
  position:relative;
}

#loader-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#4060FF,#7B9FFF,#C084FC);
  border-radius:999px;
  box-shadow:0 0 8px rgba(108,142,255,0.6);
  animation:loaderFill 3s cubic-bezier(0.4,0,0.2,1) 2s forwards;
}
@keyframes loaderFill{
  0%{width:0%}
  30%{width:45%}
  60%{width:72%}
  85%{width:88%}
  100%{width:100%}
}

/* Point de scan mobile sur la barre */
#loader-scan{
  position:absolute;top:0;left:0;width:40px;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.8),transparent);
  animation:scanMove 1.5s ease-in-out 2s 2 forwards;
}
@keyframes scanMove{
  from{left:-40px}to{left:100%}
}

#loader-text{
  font-size:11px;
  color:rgba(255,255,255,0.28);
  letter-spacing:1.5px;
  text-transform:uppercase;
  animation:loaderTextCycle 3s ease 2s forwards;
}
@keyframes loaderTextCycle{
  0%{opacity:1}28%{opacity:0}30%{opacity:1}58%{opacity:0}60%{opacity:1}88%{opacity:0}90%{opacity:1}100%{opacity:0}
}

/* Version */
#version{
  position:fixed;bottom:24px;right:28px;
  font-size:11px;color:rgba(255,255,255,0.18);
  letter-spacing:1px;
  opacity:0;
  animation:textFadeIn 0.5s ease 2s forwards;
}

/* ══ FADE OUT FINAL ══ */
#splash.fadeout{
  animation:splashOut 0.8s cubic-bezier(0.4,0,1,1) forwards;
}
@keyframes splashOut{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.08)}
}

/* Overlay final */
#finish-overlay{
  position:fixed;inset:0;z-index:100;
  background:#04080F;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
#finish-overlay.active{opacity:1;pointer-events:all}
</style>
</head>
<body>

<div id="bg"></div>
<div id="particles"></div>
<div id="finish-overlay"></div>

<div id="splash">
  <div id="orbe-wrap">
    <div class="halo h1"></div>
    <div class="halo h2"></div>
    <div class="halo h3"></div>
    <div class="ticks"></div>
    <div class="ticks2"></div>
    <div class="ring r4"></div>
    <div class="ring r5"></div>
    <div class="ring r3"></div>
    <div class="ring r2"></div>
    <div class="ring r1"></div>
    <div class="scan sc2"></div>
    <div class="scan sc1"></div>
    <div class="cross"></div>
    <div class="core">
      <img data-aria-logo id="splash-logo-img" alt="ARIA"
        style="width:100%;height:100%;object-fit:cover;border-radius:50%">
    </div>
  </div>

  <div id="title-wrap">
    <div id="title">ARIA</div>
    <div id="subtitle">Assistant Personnel IA</div>
  </div>

  <div id="loader-wrap">
    <div id="loader-track">
      <div id="loader-fill"></div>
      <div id="loader-scan"></div>
    </div>
    <div id="loader-text">Initialisation...</div>
  </div>

  <div id="scan-section" style="
    margin-top: 24px;
    width: 340px;
    opacity: 0;
    animation: textFadeIn 0.5s ease 2.5s forwards;
  ">
    <div style="
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 10px;
    ">Scan des applications</div>

    <div style="
      width: 100%; height: 1px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    ">
      <div id="scan-bar" style="
        height: 100%; width: 0%;
        background: linear-gradient(90deg, rgba(108,142,255,0.6), rgba(167,139,250,0.6));
        border-radius: 999px;
        transition: width 0.4s ease;
        box-shadow: 0 0 6px rgba(108,142,255,0.4);
      "></div>
    </div>

    <div id="scan-log" style="
      height: 80px;
      overflow: hidden;
      position: relative;
    ">
      <div id="scan-log-inner" style="
        display: flex;
        flex-direction: column;
        gap: 3px;
        transition: transform 0.3s ease;
      "></div>
    </div>

    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <div id="scan-label" style="font-size:10px;color:rgba(255,255,255,0.28);letter-spacing:0.5px">
        Initialisation...
      </div>
      <div id="scan-count" style="font-size:10px;color:rgba(108,142,255,0.5);font-weight:600">
        0 apps
      </div>
    </div>
  </div>
</div>

<div id="version">v1.0 — Local AI</div>

<script>
// Particules
const container = document.getElementById('particles');
const colors = ['rgba(108,142,255,0.7)','rgba(167,139,250,0.6)','rgba(96,165,250,0.65)','rgba(200,220,255,0.5)'];
for(let i=0;i<28;i++){
  const p=document.createElement('div');
  p.className='particle';
  const size=(Math.random()*3+1.5)+'px';
  const x=Math.random()*100;
  const y=Math.random()*100;
  const dur=(Math.random()*6+4)+'s';
  const delay=(Math.random()*5)+'s';
  const dx1=(Math.random()-0.5)*120+'px';
  const dy1=(Math.random()-0.5)*120+'px';
  const dx2=(Math.random()-0.5)*200+'px';
  const dy2=(Math.random()-0.5)*200+'px';
  const dx3=(Math.random()-0.5)*280+'px';
  const dy3=(Math.random()-0.5)*280+'px';
  const color=colors[Math.floor(Math.random()*colors.length)];
  p.style.cssText=`
    --size:${size};--x:${x}%;--y:${y}%;--dur:${dur};--delay:${delay};
    --dx1:${dx1};--dy1:${dy1};--dx2:${dx2};--dy2:${dy2};--dx3:${dx3};--dy3:${dy3};
    width:${size};height:${size};background:${color};
  `;
  container.appendChild(p);
}

// Textes de chargement cycliques
const texts = [
  'Initialisation...',
  'Chargement des modèles...',
  'Connexion WebSocket...',
  "Préparation de l'interface...",
  'Prêt.',
];
let ti=0;
const textEl=document.getElementById('loader-text');
if (textEl) {
  const interval=setInterval(()=>{
    ti++;
    if(ti<texts.length){
      textEl.style.opacity='0';
      setTimeout(()=>{textEl.textContent=texts[ti];textEl.style.opacity='1';},200);
    } else {
      clearInterval(interval);
    }
  },700);
}

// Fade out après 5.2s (si utilisé comme vrai splash)
// setTimeout(()=>{
//   document.getElementById('splash').classList.add('fadeout');
//   setTimeout(()=>{document.getElementById('finish-overlay').classList.add('active')},800);
// },5200);

function applySplashLogo() {
  if (window.__ARIA_ICON__) {
    document.querySelectorAll('[data-aria-logo]').forEach((img) => {
      img.src = window.__ARIA_ICON__;
    });
  } else {
    setTimeout(applySplashLogo, 100);
  }
}
applySplashLogo();

const scanLines = [];
const MAX_VISIBLE_LINES = 5;

function bindSplashScanEvents() {
  if (!window.ARIA) {
    setTimeout(bindSplashScanEvents, 150);
    return;
  }
  window.ARIA.on('splash_scan', (data) => {
    const bar = document.getElementById('scan-bar');
    const label = document.getElementById('scan-label');
    const count = document.getElementById('scan-count');
    const inner = document.getElementById('scan-log-inner');
    if (!bar || !label || !count || !inner) return;

    bar.style.width = (data.pct || 0) + '%';
    label.textContent = data.label || '';
    count.textContent = (data.count || 0) + ' apps';

    const line = document.createElement('div');
    line.style.cssText = `
      font-size: 10px;
      color: rgba(108,142,255,${data.done ? '0.8' : '0.45'});
      font-family: monospace;
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: fadeIn 0.2s ease;
      padding: 1px 0;
    `;
    const prefix = data.done ? '✓ ' : '→ ';
    line.textContent = prefix + (data.label || '');
    inner.appendChild(line);

    scanLines.push(line);
    if (scanLines.length > MAX_VISIBLE_LINES) {
      const overflow = scanLines.length - MAX_VISIBLE_LINES;
      inner.style.transform = `translateY(-${overflow * 18}px)`;
    }

    if (data.done) {
      bar.style.background =
        'linear-gradient(90deg, rgba(74,222,128,0.6), rgba(52,211,153,0.6))';
      count.style.color = 'rgba(74,222,128,0.7)';
    }
  });
}
bindSplashScanEvents();
</script>
</body>
</html>
