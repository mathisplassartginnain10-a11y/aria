<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ARIA — Zone principale exacte</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#04080F;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 70% at 50% 35%, rgba(8,18,65,0.95) 0%, rgba(4,8,20,0) 70%),
    radial-gradient(ellipse 50% 40% at 80% 10%, rgba(12,28,110,0.7) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 15% 85%, rgba(6,15,55,0.6) 0%, transparent 55%),
    #04080F;
  z-index:0;
}

/* ══ CARD LIQUID GLASS ══ */
.card{
  position:relative;z-index:1;
  width:560px;min-height:640px;
  border-radius:38px;
  overflow:hidden;
  display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse 110% 85% at 50% 28%, rgba(10,20,75,0.80) 0%, rgba(5,9,28,0.88) 100%);
  backdrop-filter:blur(55px) saturate(185%) brightness(0.88);
  -webkit-backdrop-filter:blur(55px) saturate(185%) brightness(0.88);
  border:1px solid rgba(255,255,255,0.10);
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.10),
    inset 1px 0 0 rgba(255,255,255,0.04),
    inset -1px 0 0 rgba(255,255,255,0.04),
    0 60px 180px rgba(0,0,25,0.92),
    0 0 120px rgba(8,25,140,0.22);
}
/* Reflet haut */
.card::before{
  content:'';position:absolute;
  top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,
    transparent 0%,rgba(255,255,255,0.16) 25%,
    rgba(255,255,255,0.30) 50%,rgba(255,255,255,0.16) 75%,transparent 100%);
  z-index:10;pointer-events:none;
}
/* Coin highlight haut-gauche */
.card::after{
  content:'';position:absolute;
  top:0;left:0;
  width:120px;height:120px;
  background:radial-gradient(ellipse at top left,rgba(255,255,255,0.04) 0%,transparent 60%);
  border-radius:38px 0 0 0;
  pointer-events:none;z-index:9;
}

/* ══ HEADER ══ */
.hdr{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:24px 26px 0;flex-shrink:0;
}
.hdr-spacer{width:44px}
.mode-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 20px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:999px;
  font-size:13px;color:rgba(255,255,255,0.78);
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.10),0 4px 16px rgba(0,0,50,0.3);
}
.mode-pill:hover{background:rgba(255,255,255,0.10)}
.mic-hdr-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.68);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
  font-size:16px;
}
.mic-hdr-btn svg{pointer-events:none}

/* ══ ORBE ══ */
.orbe-zone{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:28px;padding:16px 30px 0;
}
.orbe-wrap{
  position:relative;width:220px;height:220px;
  display:flex;align-items:center;justify-content:center;
}

/* Halos */
.halo{position:absolute;border-radius:50%;pointer-events:none}
.halo-far{inset:-55px;background:radial-gradient(circle,rgba(35,75,220,0.06) 0%,transparent 62%)}
.halo-mid{inset:-18px;background:radial-gradient(circle,rgba(70,120,255,0.09) 0%,transparent 58%)}
.halo-near{inset:8px;background:radial-gradient(circle,rgba(110,160,255,0.13) 0%,transparent 52%)}

/* Ticks externes */
.ticks-outer{
  position:absolute;inset:-20px;border-radius:50%;
  border:1px solid rgba(130,165,255,0.14);
  animation:orbR 45s linear infinite;
}
.ticks-inner{
  position:absolute;inset:-11px;border-radius:50%;
  border:1px dotted rgba(110,150,255,0.18);
  animation:orbR 32s linear infinite reverse;
}

/* Anneaux */
.ring{position:absolute;border-radius:50%;pointer-events:none}
.r1{/* Anneau bleu solide externe */
  inset:20px;
  border:2px solid rgba(110,170,255,0.82);
  animation:orbR 7.5s linear infinite;
  box-shadow:0 0 10px rgba(90,160,255,0.35);
}
.r2{/* Arc bleu clair haut+droite */
  inset:8px;
  border-top:2.5px solid rgba(70,155,255,0.92);
  border-right:2.5px solid rgba(70,155,255,0.92);
  border-bottom:2px solid rgba(70,155,255,0.25);
  border-left:2px solid transparent;
  animation:orbR 5s linear infinite;
  box-shadow:0 0 14px rgba(50,140,255,0.45);
}
.r3{/* Arc violet droite+bas */
  inset:8px;
  border-top:2px solid transparent;
  border-right:2.5px solid rgba(155,75,255,0.88);
  border-bottom:2px solid rgba(155,75,255,0.40);
  border-left:2px solid transparent;
  animation:orbR 9.5s linear infinite reverse;
  box-shadow:0 0 14px rgba(130,55,255,0.38);
}
.r4{/* Tirets fin interne */
  inset:36px;
  border:1px dashed rgba(95,140,255,0.42);
  animation:orbR 15s linear infinite reverse;
}
.r5{/* Cercle fin proche du core */
  inset:52px;
  border:1.5px solid rgba(170,200,255,0.65);
  animation:orbR 4.5s linear infinite;
  box-shadow:0 0 7px rgba(150,185,255,0.55);
}
@keyframes orbR{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Scan lines */
.scan{position:absolute;border-radius:50%;mix-blend-mode:screen;pointer-events:none}
.sc1{
  inset:8px;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(90,180,255,0.65) 10deg,rgba(90,180,255,0.28) 20deg,transparent 32deg);
  animation:orbR 2.3s linear infinite;
}
.sc2{
  inset:20px;
  background:conic-gradient(from 100deg,transparent 0deg,rgba(145,90,255,0.52) 10deg,rgba(145,90,255,0.20) 20deg,transparent 32deg);
  animation:orbR 3.8s linear infinite reverse;
}

/* Crosshair */
.cross{position:absolute;inset:16px;z-index:2;pointer-events:none}
.cross::before,.cross::after{
  content:'';position:absolute;
  background:linear-gradient(transparent 0%,rgba(70,180,255,0.40) 35%,rgba(70,180,255,0.40) 65%,transparent 100%);
}
.cross::before{left:50%;top:0;width:1px;height:100%;transform:translateX(-50%)}
.cross::after{top:50%;left:0;height:1px;width:100%;transform:translateY(-50%)}

/* ══ NOYAU — vrai logo ARIA ══ */
.core{
  width:82px;height:82px;border-radius:50%;
  position:relative;z-index:3;
  display:flex;align-items:center;justify-content:center;
  /* Fond lumineux bleu-blanc autour du logo */
  background:radial-gradient(circle,
    rgba(230,240,255,0.92) 0%,
    rgba(150,200,255,0.80) 22%,
    rgba(70,140,255,0.68) 50%,
    rgba(25,75,225,0.82) 78%,
    rgba(8,38,190,0.90) 100%);
  box-shadow:
    0 0 22px rgba(100,170,255,1.0),
    0 0 50px rgba(80,150,255,0.72),
    0 0 90px rgba(55,120,240,0.42),
    0 0 140px rgba(35,90,220,0.20),
    inset 0 0 22px rgba(200,220,255,0.28);
  animation:corePulse 3.2s ease-in-out infinite;
  overflow:hidden;
}
/* Image logo dans le noyau */
.core img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:50%;
  filter:brightness(1.05) contrast(1.05);
}
@keyframes corePulse{
  0%,100%{box-shadow:0 0 22px rgba(100,170,255,1.0),0 0 50px rgba(80,150,255,0.72),0 0 90px rgba(55,120,240,0.42),0 0 140px rgba(35,90,220,0.20)}
  50%{box-shadow:0 0 32px rgba(100,170,255,1.0),0 0 68px rgba(80,150,255,0.85),0 0 115px rgba(55,120,240,0.55),0 0 180px rgba(35,90,220,0.28)}
}

/* Textes */
.hello{
  font-size:40px;font-weight:800;
  color:#3B82F6;text-align:center;
  letter-spacing:-0.5px;
  text-shadow:0 0 35px rgba(59,130,246,0.65),0 0 70px rgba(59,130,246,0.28);
}
.sub{
  font-size:15px;color:rgba(255,255,255,0.40);
  text-align:center;margin-top:8px;letter-spacing:0.1px;
}

/* ══ INPUT ZONE ══ */
.inp-area{padding:24px 22px 20px;flex-shrink:0}
.inp-zone{
  background:rgba(18,26,75,0.44);
  backdrop-filter:blur(30px) saturate(165%);
  -webkit-backdrop-filter:blur(30px) saturate(165%);
  border:1px solid rgba(90,115,225,0.20);
  border-radius:22px;padding:14px 18px 12px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.07),
    inset 0 -1px 0 rgba(255,255,255,0.03),
    0 8px 36px rgba(0,0,55,0.38);
}
.inp-r1{margin-bottom:12px}
.inp-field{
  width:100%;background:transparent;border:none;outline:none;
  color:rgba(255,255,255,0.55);font-size:14px;font-family:inherit;
}
.inp-field::placeholder{color:rgba(255,255,255,0.22)}
.inp-r2{
  display:flex;align-items:center;gap:10px;
  border-top:1px solid rgba(255,255,255,0.06);
  padding-top:11px;
}
.plus-btn{
  width:32px;height:32px;border-radius:9px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.55);font-size:20px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background 0.15s;
}
.plus-btn:hover{background:rgba(255,255,255,0.11)}
.agent-sel{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:8px 18px;
  background:rgba(32,48,175,0.28);
  border:1px solid rgba(75,115,255,0.24);
  border-radius:999px;font-size:12px;
  color:rgba(255,255,255,0.62);cursor:pointer;
  backdrop-filter:blur(10px);transition:background 0.15s;
}
.agent-sel:hover{background:rgba(45,65,205,0.36)}
.agent-dot{
  width:16px;height:16px;border-radius:5px;
  background:rgba(100,140,255,0.5);
  display:flex;align-items:center;justify-content:center;font-size:10px;
}
.mic-inp{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#3E4ED5 0%,#5568EE 50%,#6878FF 100%);
  border:none;color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 0 20px rgba(78,98,255,0.58),0 0 45px rgba(58,78,240,0.32);
  transition:transform 0.15s,box-shadow 0.15s;
}
.mic-inp:hover{transform:scale(1.07);box-shadow:0 0 28px rgba(78,98,255,0.75),0 0 60px rgba(58,78,240,0.42)}

/* Footer */
.footer{
  text-align:center;font-size:11px;
  color:rgba(255,255,255,0.20);
  padding:0 20px 18px;flex-shrink:0;
  letter-spacing:0.1px;
}
</style>
</head>
